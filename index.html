"jp":"渡辺さん、日本語を教えてください。","reading":"わたなべさん、にほんごをおしえてください。","ko":"와타나베 씨, 일본어를 가르쳐 주세요."},{"jp":"暑いですから窓を開けてもいいですか。","reading":"あついですからまどをあけてもいいですか。","ko":"더우니까 창문을 열어도 됩니까?"}]}],"mistakes":[{"wrong":"帰て","right":"帰って","note":"帰る(かえる)는 る 앞이 'え(에)' 소리라 2그룹처럼 보이지만 사실은 1그룹 예외예요. 그래서 る만 떼는 게 아니라 って가 붙어요. 教科書 예문도 帰って(かえって)로 나와요. 같은 함정 동사로 入る(はいる), 走る(はしる), 切る(きる), 知る(しる)가 있어요 — 전부 1그룹이에요."},{"wrong":"行いて","right":"行って","note":"行く(いく)는 끝이 く라서 규칙대로면 行いて가 돼야 하지만, 딱 이 동사만 예외로 行って(いって)가 돼요. た형도 行った(いった)예요. 교과서가 별표(※)로 콕 집어 강조하는 만큼 통째로 외우세요."},{"wrong":"","right":"","note":"乗る(のる)를 2그룹으로 착각하기 쉬워요. る로 끝나긴 하지만 앞이 'の(노)' = お단이라 1그룹이에요. 그래서 乗って·乗った(のって·のった)로 변해요. 2그룹 조건은 'る 앞이 이 또는 에 소리'라는 걸 꼭 기억하세요."},{"wrong":"買あない","right":"買わない","note":"1그룹 ない형에서 う로 끝나는 동사는 あ가 아니라 わ로 바뀌어요. 買う(かう)→買わない(かわない), 会う(あう)→会わない(あわない). '아'가 아니라 '와'인 점이 초보자가 자주 틀리는 부분이에요."}],"tips":["그룹 판별 순서를 고정하세요: ① する·来る이면 3그룹 → ② る로 끝나고 앞이 '이·에' 소리면 2그룹 → ③ 그 외 전부 1그룹.","2그룹 = '이에루(い·え+る)' 그룹으로 기억하면 見る(みる)·食べる(たべる)가 바로 떠올라요.","1그룹 て형 음편 암기송: '우·츠·루→って / 부·무·누→んで / す→して / く→いて / ぐ→いで'. た형은 여기서 て를 た로만 바꾸면 끝이에요."],"related":["05 동사 1"]},{"id":"masu","title":"동사 ます형 만들기","summary":"동사를 정중한 \"~합니다\"로 바꾸려면, 먼저 동사가 몇 그룹인지 판별하고 그룹에 맞게 어미를 바꿔 ます를 붙인다.","intro":"ます형은 일본어에서 가장 먼저 배우는 정중한 말투예요. 반말인 기본형(사전형)을 \"~합니다/~합니까?\"처럼 예의 바른 표현으로 바꿔 주는 형태라, 처음 일본어로 문장을 만들 때 거의 다 이 형태를 씁니다.\n핵심은 두 단계예요. (1) 이 동사가 1·2·3그룹 중 어디에 속하는지 먼저 판별하고, (2) 그룹마다 정해진 규칙대로 어미를 바꿔 ます를 붙이는 거예요.\n그룹만 정확히 나누면 나머지는 기계적으로 만들 수 있으니, 그룹 판별이 제일 중요합니다.","sections":[{"heading":"0단계: 동사 그룹부터 나누기","body":"일본어 동사의 기본형(사전형)은 반드시 う단(う·く·ぐ·す·つ·ぬ·ぶ·む·る) 소리로 끝나요. 그중에서 세 그룹으로 나뉩니다.\n\n3그룹은 딱 두 개, 来(く)る(오다)와 する(하다)뿐이라 그냥 외우면 됩니다.\n2그룹은 기본형이 る로 끝나면서, る 바로 앞 글자가 い단(い·き·し…)이나 え단(え·け·せ…) 소리인 동사예요. 見(み)る, 食(た)べる처럼요.\n1그룹은 나머지 전부입니다. る로 끝나지 않는 동사(買う·書く·話す 등)와, る로 끝나더라도 앞 글자가 あ·う·お단인 동사(売る·撮る)가 여기 속해요.\n\n주의할 점은 '예외 1그룹'이에요. 帰(かえ)る·入(はい)る·走(はし)る·知(し)る·切(き)る처럼 겉모습은 2그룹(る 앞이 い단·え단)인데 실제로는 1그룹으로 활용하는 동사들이 있습니다. 이건 통째로 외워 둬야 해요.","table":{"columns":["그룹","판별 기준","예"],"rows":[["1그룹 (5단동사)","る로 끝나지 않거나, る 앞이 あ·う·お단","買(か)う, 書(か)く, 話(はな)す, 売(う)る, 撮(と)る"],["예외 1그룹","모양은 2그룹인데 1그룹 활용","帰(かえ)る, 入(はい)る, 走(はし)る, 知(し)る, 切(き)る"],["2그룹 (1단동사)","る로 끝나고 る 앞이 い단·え단","見(み)る, 起(お)きる, 食(た)べる, 寝(ね)る"],["3그룹 (변격동사)","딱 두 개, 그냥 암기","来(く)る, する"]]}},{"heading":"그룹별 ます형 만드는 법","body":"그룹을 정했으면 이제 규칙대로 바꾸면 돼요.\n\n1그룹: 마지막 う단 소리를 같은 행의 い단 소리로 바꾸고 ます를 붙입니다. 예를 들어 買(か)う의 う(u)를 い(i)로 바꿔 買います, 書(か)く의 く(ku)를 き(ki)로 바꿔 書きます가 돼요. つ는 ち, ぬ는 に, ぶ는 び, む는 み, る는 り로 바뀝니다.\n\n2그룹: 아주 간단해요. 끝의 る만 떼고 ます를 붙입니다. 見(み)る → 見ます, 食(た)べる → 食べます.\n\n3그룹: 두 개는 모양이 바뀌니 그대로 외웁니다. 来(く)る → 来(き)ます(읽는 소리가 く→き로 바뀌는 점 주의!), する → します.","table":{"columns":["1그룹 (う단→い단+ます)","2그룹 (る→ます)","3그룹 (암기)"],"rows":[["会(あ)う → 会います","いる → います","来(く)る → 来(き)ます"],["書(か)く → 書きます","見(み)る → 見ます","する → します"],["話(はな)す → 話します","起(お)きる → 起きます",""],["待(ま)つ → 待ちます","寝(ね)る → 寝ます",""],["死(し)ぬ → 死にます","食(た)べる → 食べます",""],["飲(の)む → 飲みます","教(おし)える → 教えます",""],["乗(の)る → 乗ります","",""]]},"examples":[{"jp":"今日友達と学校で会います。","reading":"きょうともだちとがっこうであいます。","ko":"오늘 친구와 학교에서 만납니다."},{"jp":"音楽は聞きますが、ニュースは聞きません。","reading":"おんがくはききますが、ニュースはききません。","ko":"음악은 듣지만, 뉴스는 듣지 않습니다."}]},{"heading":"ます를 활용해 시제·부정 만들기","body":"ます형만 만들어 두면, 뒤의 ます 부분만 갈아 끼워 부정·과거·의향까지 다 표현할 수 있어요. 어간(見·会い·食べ 등)은 그대로 두고 꼬리만 바꾸는 거예요.\n\n특히 '있다'를 뜻하는 두 동사는 헷갈리니 함께 외우세요. 사물·식물이 '있다'는 あります, 사람·동물이 '있다'는 います로 구분합니다. あります의 부정은 특이하게 ありません(없습니다)이에요.\n\n 아래는 見(み)る를 예로 든 꼬리 변화표입니다.","table":{"columns":["활용","見 + 꼬리","의미"],"rows":[["현재·의문","見ます / 見ますか","봅니다 / 봅니까?"],["부정","見ません","보지 않습니다"],["과거","見ました","봤습니다"],["과거부정","見ませんでした","보지 않았습니다"],["권유·의향","見ましょう / 見ましょうか","봅시다 / 볼까요?"]]},"examples":[{"jp":"夕べ、宿題をしましたか。","reading":"ゆうべ、しゅくだいをしましたか。","ko":"어젯밤에 숙제를 했습니까?"},{"jp":"いいえ、しませんでした。","reading":"いいえ、しませんでした。","ko":"아니요, 하지 않았습니다."},{"jp":"友達に会って映画を見ました。","reading":"ともだちにあってえいがをみました。","ko":"친구를 만나서 영화를 봤습니다."}]},{"heading":"ます형에서 뻗어 나가는 표현들","body":"ます형은 여기서 끝이 아니에요. ます를 뗀 '어간'(行き·食べ·見 등)에 다른 꼬리를 붙이면 여러 표현이 만들어집니다. 지금은 '이런 게 있구나' 정도로만 눈에 익혀 두세요.\n\n・~たい: 어간+たい = '~하고 싶다'(내 희망). 부정·과거는 い형용사처럼 활용해요. 行き+たい → 行きたいです(가고 싶습니다), 行きたくありません(가고 싶지 않습니다).\n・~に行(い)く・来(く)る: 어간+に+行く/来る = '~하러 가다/오다'(목적). 食べ+に行く → 食べに行きます(먹으러 갑니다).\n・~ながら: 어간+ながら = '~하면서'(동시동작). 歩(ある)き+ながら → 歩きながら(걸으면서).\n・~なさい: 어간+なさい = '~하세요/~해라'(부드러운 명령). 食べ+なさい → 食べなさい(먹으세요).","examples":[{"jp":"のどがかわきましたから、水を飲みたいです。","reading":"のどがかわきましたから、みずをのみたいです。","ko":"목이 말라서 물을 마시고 싶습니다."},{"jp":"いっしょに食べに行きませんか。","reading":"いっしょにたべにいきませんか。","ko":"같이 먹으러 가지 않겠습니까?"},{"jp":"私は歩きながら音楽を聞きます。","reading":"わたしはあるきながらおんがくをききます。","ko":"저는 걸으면서 음악을 듣습니다."},{"jp":"明日から試験ですから早く勉強しなさい。","reading":"あしたからしけんですからはやくべんきょうしなさい。","ko":"내일부터 시험이니까 빨리 공부하세요."}]}],"mistakes":[{"wrong":"帰(かえ)ます","right":"帰(かえ)ります","note":"帰る(돌아가다)는 る 앞이 え단이라 2그룹처럼 보이지만 '예외 1그룹'이에요. 그래서 る를 그냥 떼면 안 되고, る를 り로 바꿔 帰ります가 됩니다. 入(はい)る·走(はし)る·知(し)る·切(き)る도 같은 예외예요."},{"wrong":"見(み)ります","right":"見(み)ます","note":"見る·食べる 같은 2그룹을 1그룹처럼 처리하는 실수예요. 2그룹은 る를 り로 바꾸는 게 아니라, る를 통째로 떼고 바로 ます만 붙입니다. 見ます, 食べます가 맞아요."},{"wrong":"飲(の)むます","right":"飲(の)みます","note":"1그룹은 마지막 う단 소리를 반드시 い단으로 바꿔야 해요. む를 그대로 두고 ます를 붙이면 안 되고, む(mu)→み(mi)로 바꿔 飲みます. 待(ま)つ→待ちます, 死(し)ぬ→死にます처럼 행마다 짝이 바뀝니다."},{"wrong":"来(く)ます","right":"来(き)ます","note":"来る는 3그룹이라 활용할 때 읽는 소리까지 바뀝니다. 한자 来는 그대로지만 소리는 く→き로 바뀌어 来(き)ます로 읽어요. く로 읽으면 틀립니다."}],"tips":["그룹 판별은 순서대로! ① 来る·する면 3그룹, ② る로 끝나고 앞이 い단·え단이면 2그룹, ③ 나머지는 1그룹. 단 帰る 같은 예외 1그룹만 따로 암기.","1그룹 소리 바꾸기는 あいうえお 표에서 'う단 바로 윗칸(い단)'으로 올라간다고 기억하세요. 買う(ka-u)→買い(ka-i), 書く(ka-ku)→書き(ka-ki).","2그룹은 세상에서 제일 쉬워요. る만 지우고 ます. 그래서 る에 취소선을 긋는 상상을 하면 됩니다."],"related":["05 동사 1"]},{"id":"te-form","title":"て형 만들기 — 음편(音便) 규칙","summary":"1그룹 동사만 어미에 따라 소리가 바뀌고(음편), 2·3그룹은 그냥 る를 떼거나 통째로 외우면 て형이 완성됩니다.","intro":"て형은 일본어에서 문장을 이어주고(\"~하고\", \"~해서\") 부탁·허가·금지 같은 수많은 표현의 뿌리가 되는, 가장 많이 쓰이는 동사 활용입니다. 「~てください(~해 주세요)」「~てもいいです(~해도 됩니다)」「~ている(~하고 있다)」처럼 뒤에 붙는 표현이 워낙 많아서, て형을 못 만들면 그 표현들도 전부 못 씁니다.\n그래서 지금 て형 만드는 규칙을 확실히 익혀 두면 앞으로 배울 문법의 절반이 편해집니다. 핵심은 딱 하나, \"1그룹 동사의 어미가 소리 나기 좋게 바뀌는 것(음편)\"뿐입니다.","sections":[{"heading":"1그룹 동사 — 어미에 따라 소리가 바뀐다(음편)","body":"て형에서 가장 헷갈리는 부분이 바로 1그룹입니다. 기본형의 마지막 글자(어미)가 무엇이냐에 따라 て 앞의 소리가 다섯 갈래로 바뀝니다. 이렇게 발음하기 편하게 소리가 변하는 것을 '음편(音便)'이라고 불러요.\n\n규칙을 어미별로 묶으면 이렇습니다.\n・う・つ・る 로 끝나면 → って\n・ぶ・む・ぬ 로 끝나면 → んで (て가 아니라 탁음 で!)\n・す 로 끝나면 → して\n・く 로 끝나면 → いて\n・ぐ 로 끝나면 → いで (く의 짝이라 탁음 で!)\n\n그리고 딱 하나 외워야 하는 예외가 있어요. 「行く(いく)」는 く로 끝나지만 「行いて」가 아니라 「行って」가 됩니다(책에도 行いて(×)、行って(○)로 표시되어 있어요).","table":{"columns":["기본형 어미","て형 변화","예"],"rows":[["う・つ・る","→ って","会う→会って, 待つ→待って, 乗る→乗って"],["ぶ・む・ぬ","→ んで","並ぶ→並んで, 飲む→飲んで, 死ぬ→死んで"],["す","→ して","話す→話して"],["く","→ いて","書く→書いて"],["ぐ","→ いで","脱ぐ→脱いで"],["예외 行く","→ 行って","行いて(×) / 行って(○)"]]},"examples":[{"jp":"花子! ちょっと待って。","reading":"はなこ！ちょっとまって。","ko":"하나코! 잠깐 기다려."},{"jp":"風邪をひいて学校へ行きませんでした。","reading":"かぜをひいてがっこうへいきませんでした。","ko":"감기에 걸려서 학교에 가지 않았습니다."},{"jp":"本を読んでコーヒーを飲みます。","reading":"ほんをよんでコーヒーをのみます。","ko":"책을 읽고 커피를 마십니다."}]},{"heading":"2그룹·3그룹 동사 — 아주 쉽다","body":"다행히 2그룹과 3그룹은 음편이 없어서 훨씬 쉽습니다.\n\n2그룹 동사는 마지막 る를 떼고 て만 붙이면 끝입니다. 소리가 바뀌는 일이 전혀 없어요. 見る→見て, 起きる→起きて, 食べる→食べて, 寝る→寝て 처럼요.\n\n3그룹은 딱 두 개뿐이라 그냥 통째로 외웁니다. 来る(くる)→来て(きて), する→して. 특히 来る는 한자 발음이 くる에서 きて로 바뀌니 주의하세요.","table":{"columns":["그룹","만드는 법","예"],"rows":[["2그룹","る를 떼고 + て","見る→見て, 起きる→起きて, 食べる→食べて, 寝る→寝て"],["3그룹","통째로 암기","来る(くる)→来て(きて), する→して"]]},"examples":[{"jp":"朝6時に起きて運動をしました。","reading":"あさろくじにおきてうんどうをしました。","ko":"아침 6시에 일어나서 운동을 했습니다."},{"jp":"友達が来て一緒に勉強しました。","reading":"ともだちがきていっしょにべんきょうしました。","ko":"친구가 와서 함께 공부했습니다."}]},{"heading":"て형으로 무엇을 할까 — 이어주기·부탁·허가·금지","body":"て형을 만들 줄 알면 정말 많은 표현이 열립니다. 교재에 나온 기본 쓰임을 정리하면 이렇습니다.\n\n① 그냥 て로 끝내면: '~하고(열거)', '~해서(이유)', '~해(부드러운 명령)' 세 가지 뜻을 문맥으로 구분합니다. 예를 들어 「待って」는 상황에 따라 '기다리고'도, '기다려서'도, '기다려(줘)'도 됩니다.\n② ~てください : '~해 주세요'라는 정중한 부탁.\n③ ~てもいいです / ~てもかまいません : '~해도 됩니다 / 상관없습니다'라는 허가.\n④ ~てはいけません / ~てはだめです : '~해서는 안 됩니다'라는 금지.\n\n이 외에도 ~ている(~하고 있다/~해 있다), ~てある(~해져 있다), ~てみる(~해 보다), ~ておく(~해 두다), ~てから(~하고 나서) 등 て형에 붙는 표현이 아주 많습니다. 그래서 て형을 '문법의 관문'이라고 부릅니다.","examples":[{"jp":"家へ帰って顔を洗ってご飯を食べてコーヒーを飲みます。","reading":"うちへかえってかおをあらってごはんをたべてコーヒーをのみます。","ko":"집에 돌아가서 얼굴을 씻고 밥을 먹고 커피를 마십니다."},{"jp":"渡辺さん、日本語を教えてください。","reading":"わたなべさん、にほんごをおしえてください。","ko":"와타나베 씨, 일본어를 가르쳐 주세요."},{"jp":"暑いですから窓を開けてもいいですか。","reading":"あついですからまどをあけてもいいですか。","ko":"더우니까 창문을 열어도 됩니까?"},{"jp":"夜遅くまでテレビを見てはいけません。","reading":"よるおそくまでテレビをみてはいけません。","ko":"밤늦게까지 텔레비전을 봐서는 안 됩니다."}]},{"heading":"덤 — た형(과거)은 て형과 규칙이 똑같다","body":"て형을 익히면 과거형인 た형은 거의 공짜로 얻습니다. 음편 규칙이 완전히 같고, 마지막 て를 た로, で를 だ로 바꾸기만 하면 되기 때문이에요.\n\n・会って → 会った, 待って → 待った, 乗って → 乗った\n・飲んで → 飲んだ, 並んで → 並んだ\n・話して → 話した, 書いて → 書いた, 脱いで → 脱いだ\n・行って → 行った (行く의 예외도 그대로)\n\n즉 'て형에서 마지막 소리만 た/だ로 바꾼다'가 た형입니다. 두 개를 세트로 외우면 훨씬 효율적입니다.","table":{"columns":["기본형","て형","た형(과거)"],"rows":[["会う(あう)","会って","会った"],["飲む(のむ)","飲んで","飲んだ"],["書く(かく)","書いて","書いた"],["行く(いく)","行って","行った"]]},"examples":[{"jp":"偶然デパートで先生と会った。","reading":"ぐうぜんデパートでせんせいとあった。","ko":"우연히 백화점에서 선생님과 만났다."},{"jp":"外国へ行ったとき買ったデジカメです。","reading":"がいこくへいったときかったデジカメです。","ko":"외국에 갔을 때 산 디지털카메라입니다."}]}],"mistakes":[{"wrong":"帰て / 帰りて","right":"帰って","note":"帰る(かえる)는 る로 끝나지만 2그룹이 아니라 1그룹입니다! 그래서 る를 그냥 떼는 게 아니라 う・つ・る 규칙에 따라 って가 됩니다. 乗る(のる), 入る(はいる), 走る(はしる), 知る(しる)도 똑같이 생긴 함정이니 1그룹으로 기억하세요."},{"wrong":"行いて","right":"行って","note":"行く(いく)는 く로 끝나서 규칙대로면 行いて가 되어야 하지만, 유일한 예외라서 行って가 됩니다. 교재에도 行いて(×)、行って(○)로 콕 집어 표시되어 있어요. 딱 이 단어만 예외라고 외우면 됩니다."},{"wrong":"飲んて / 脱いて","right":"飲んで / 脱いで","note":"ぶ・む・ぬ 그룹과 ぐ 그룹은 て가 아니라 탁음 で로 끝납니다. 초보자가 자주 て로 잘못 쓰는 부분이에요. '탁한 소리(ぶむぬ, ぐ) 뒤에는 탁한 で'라고 묶어 기억하세요."},{"wrong":"話って","right":"話して","note":"話す(はなす)처럼 す로 끝나는 동사는 って가 아니라 して입니다. す의 し 소리가 그대로 살아남는다고 생각하면 쉬워요. 貸す(かす)→貸して, 消す(けす)→消して 도 마찬가지입니다."}],"tips":["1그룹 음편은 어미로 3덩어리만 기억하세요: 'う·つ·る → って', 'ぶ·む·ぬ → んで', 'く → いて / ぐ → いで', 그리고 'す → して'. 이 네 줄이 전부입니다.","탁음(で·いで)이 나오는 건 원래 탁한 소리인 ぶ·む·ぬ와 ぐ뿐입니다. '탁한 어미에는 탁한 で'로 짝지어 외우면 て/で를 헷갈리지 않아요.","て형만 완벽히 외우면 た형(과거)은 て→た, で→だ 로 바꾸기만 하면 됩니다. 두 개를 항상 세트로 연습하세요."],"related":["06 동사 2"]},{"id":"ta-form","title":"た형 (과거) 만들기","summary":"た형은 て형과 음편(소리 바뀜)이 완전히 똑같고, て를 た로 で를 だ로만 바꾸면 '~했다'라는 과거·완료의 뜻이 됩니다.","intro":"た형은 동사를 '~했다 / ~한 / ~했던'의 뜻으로 바꾸는 형태예요. 반말 과거형이자, 뒤에 とき·ことがある·た方がいい 같은 여러 표현을 붙이는 '연결 부품'이기도 해서 아주 많이 쓰입니다. 좋은 소식은, 이미 배운 て형과 만드는 방법이 완전히 똑같다는 점이에요. て형에서 て를 た로, で를 だ로만 바꾸면 그대로 た형이 됩니다.","sections":[{"heading":"1. 그룹별 た형 만드는 법","body":"교재는 동사를 세 그룹으로 나눠서 た형을 설명해요.\n\n■ 1그룹 동사 (음편이 일어남 — て형과 똑같은 규칙)\n① 끝이 う·つ·る → った\n② 끝이 ぶ·む·ぬ → んだ (탁점 だ 주의!)\n③ 끝이 す → した\n④ 끝이 く → いた\n⑤ 끝이 ぐ → いだ (탁점 だ 주의!)\n※ 예외: 行(い)く는 く지만 行(い)いた(×)가 아니라 行(い)った(○)\n\n■ 2그룹 동사\nる만 떼고 た를 붙임 (る → た)\n\n■ 3그룹 동사 (불규칙 2개, 그냥 외우기)\n来(く)る → 来(き)た,  する → した","table":{"columns":["1그룹 (음편)","2그룹","3그룹"],"rows":[["会う → 会った (あった)","見る → 見た (みた)","来る(くる) → 来た(きた)"],["待つ → 待った (まった)","起きる → 起きた (おきた)","する → した"],["乗る → 乗った (のった)","食べる → 食べた (たべた)",""],["並ぶ → 並んだ (ならんだ)","寝る → 寝た (ねた)",""],["飲む → 飲んだ (のんだ)","",""],["死ぬ → 死んだ (しんだ)","",""],["話す → 話した (はなした)","",""],["書く → 書いた (かいた)","",""],["脱ぐ → 脱いだ (ぬいだ)","",""],["行く → 行った (いった) ※예외","",""]]},"examples":[{"jp":"偶然デパートで先生と会った。","reading":"ぐうぜんデパートでせんせいとあった。","ko":"우연히 백화점에서 선생님과 만났다."},{"jp":"家族と一緒に買い物をした。","reading":"かぞくといっしょにかいものをした。","ko":"가족과 함께 쇼핑을 했다."},{"jp":"外国へ行ったとき買ったデジカメです。","reading":"がいこくへいったときかったデジカメです。","ko":"외국에 갔을 때 산 디지털카메라입니다."}]},{"heading":"2. て형과 た형은 쌍둥이","body":"た형이 어렵게 느껴진다면, 이미 아는 て형을 떠올리세요. 소리 바뀌는 규칙이 완전히 같아서, て형만 만들 줄 알면 마지막 글자만 갈아끼우면 됩니다.\n\n・て → た\n・で → だ\n\n예를 들어 買(か)う는 て형이 買って, た형은 買った. 飲(の)む는 て형이 飲んで(で!), た형은 飲んだ(だ!). 탁점이 붙는 ②ぶむぬ와 ⑤ぐ 그룹은 て형에서도 で였다는 걸 기억하면 헷갈리지 않아요.","table":{"columns":["기본형","て형","た형","たり형"],"rows":[["買う (かう) 사다","買って (かって)","買った (かった) 샀다","買ったり (かったり)"],["食べる (たべる) 먹다","食べて (たべて)","食べた (たべた) 먹었다","食べたり (たべたり)"],["飲む (のむ) 마시다","飲んで (のんで)","飲んだ (のんだ) 마셨다","飲んだり (のんだり)"],["する 하다","して","した 했다","したり"]]}},{"heading":"3. 行くとき와 行ったとき — 언제냐가 달라진다","body":"교재가 특별히 강조하는 포인트예요. 같은 동사라도 とき 앞이 기본형(る형)이냐 た형이냐에 따라 '동작을 하기 전'인지 '하고 난 후'인지가 달라집니다.\n\n・行(い)くとき = 아직 가기 전 (가는 도중·가기 직전)\n・行(い)ったとき = 이미 도착한 후\n\n그래서 '일본에 갈 때(가는 도중) 도쿄타워를 봤다'는 行くとき, '일본에 도착해서 도쿄타워를 봤다'는 行ったとき가 됩니다. 한국어 '~할 때'로는 둘 다 번역되니, 시점을 꼭 구분하세요.","examples":[{"jp":"日本へ行くとき、東京タワーを見ました。","reading":"にほんへいくとき、とうきょうタワーをみました。","ko":"일본에 가는 도중에 도쿄타워를 봤습니다. (가기 전)"},{"jp":"日本へ行ったとき、東京タワーを見ました。","reading":"にほんへいったとき、とうきょうタワーをみました。","ko":"일본에 도착해서 도쿄타워를 봤습니다. (간 후)"}]},{"heading":"4. た형에 붙는 여러 표현","body":"た형은 그 자체로 '~했다'지만, 뒤에 여러 말을 붙여 활용 폭이 넓어져요. 교재가 소개하는 대표 표현들입니다.\n\n① ~たことがあります / ありません : ~한 적이 있다 / 없다 (과거의 경험)\n② ~た方(ほう)がいいです : ~하는 편이 좋다 (충고·제안). 반대로 '안 하는 게 좋다'는 た형이 아니라 ~ない方がいいです로 씁니다.\n③ ~たり~たりします : ~하기도 하고 ~하기도 한다 (여러 동작을 예로 나열). 동작이 하나뿐일 때도 대표로 하나만 들어 ~たりします로 쓸 수 있어요.\n④ ~たあとで : ~한 후에 (동작 완료 후)\n⑤ ~たら : ~한다면\n\n아래는 た형 활용표 요약이에요.","table":{"columns":["형태","의미"],"rows":[["〜た","~했(었)다 / ~한 / ~했던"],["〜たとき","~한(했었던) 때 (명사수식형)"],["〜たから","~했기 때문에"],["〜たことがある / ない","~한 적이 있다 / 없다 (경험)"],["〜たあとで","~한 후(다음)에"],["〜た方がいい","~하는 편이 좋다 (충고·제안)"],["〜たり〜たりする","~하기도 하고 ~하기도 하다"],["〜たら","~한다면"]]},"examples":[{"jp":"ディズニーランドへ行ったことがありますか。","reading":"ディズニーランドへいったことがありますか。","ko":"디즈니랜드에 가 본 적이 있습니까?"},{"jp":"たばこはやめた方がいいです。","reading":"たばこはやめたほうがいいです。","ko":"담배는 끊는 편이 좋습니다."},{"jp":"友達と映画を見たり、買い物をしたりします。","reading":"ともだちとえいがをみたり、かいものをしたりします。","ko":"친구와 영화를 보거나, 쇼핑을 하거나 합니다."},{"jp":"宿題をしたあとでおふろに入ります。","reading":"しゅくだいをしたあとでおふろにはいります。","ko":"숙제를 한 후에 목욕을 합니다."}]}],"mistakes":[{"wrong":"飲みた / 飲いだ","right":"飲んだ (のんだ)","note":"む·ぶ·ぬ로 끝나는 1그룹은 んだ이고 탁점(だ)이 붙습니다. 飲(の)む는 て형이 飲んで였던 것처럼 た형도 飲んだ. 탁점 없이 飲んた로 쓰면 틀려요."},{"wrong":"行いた","right":"行った (いった)","note":"行(い)く는 く로 끝나지만 いた 규칙을 따르지 않는 유일한 예외입니다. 行いた(×)가 아니라 行った(○). 교재도 별표로 콕 집어 경고하는 부분이에요."},{"wrong":"帰(かえ)た","right":"帰った (かえった)","note":"帰(かえ)る는 る로 끝나 2그룹처럼 보이지만 사실 1그룹 동사예요. 그래서 る만 떼는 帰た(×)가 아니라 った 규칙을 써서 帰った(○)가 됩니다."},{"wrong":"来(き)たり行(い)ったりします","right":"行ったり来たりします","note":"~たり~たり는 반드시 두 동작 모두 たり를 붙여야 하고, 자연스러운 순서가 있어요. 교재는 来たり行ったり(×) → 行ったり来たり(○, 갔다 왔다)로 바로잡습니다. 한쪽만 たり를 붙이는 것도 실수예요."}],"tips":["た형은 て형의 쌍둥이! て형만 만들 수 있으면 て→た, で→だ로 마지막 글자만 바꾸면 끝입니다.","1그룹 음편 암기: 'う·つ·る는 った / ぶ·む·ぬ는 んだ / す는 した / く는 いた / ぐ는 いだ'. 탁점(んだ·いだ)은 ぶむぬ와 ぐ에만 붙는다고 묶어서 외우세요.","'안 하는 게 좋다'는 た형이 아니라 ~ない方がいい입니다. 긍정은 た형, 부정은 ない형으로 짝을 이룬다고 기억하세요."],"related":["07 동사 3"]},{"id":"tari","title":"~たり~たりする (열거)","summary":"た형 뒤에 り만 붙여서, 여러 가지 중 몇 개를 \"~하기도 하고 ~하기도 한다\"라고 예로 드는 표현이에요.","intro":"「~たり~たりする」는 여러 동작 중에서 대표적인 것 몇 개를 골라 \"이런 것도 하고 저런 것도 한다\"라고 늘어놓는 표현이에요. 예를 들어 \"주말에는 뭐 해요?\"라는 질문에 \"영화도 보고 쇼핑도 하고 그래요\"처럼 대답할 때 딱 맞아요.\n순서대로 전부 나열하는 게 아니라, 하는 일들 가운데 몇 개를 예시로 든다는 느낌이 핵심이에요. 만드는 법도 아주 쉬워서, 이미 배운 た형만 알면 바로 쓸 수 있어요.","sections":[{"heading":"만드는 법 — た형에 り만 붙이면 끝","body":"만드는 방법은 정말 간단해요. 이미 배운 た형(~했다) 뒤에 り 하나만 붙이면 됩니다.\n\nた형이 て형과 짝을 이룬다는 걸 기억하면 더 쉬워요. て로 끝나면 たり, で로 끝나면 だり가 돼요. 즉 て → たり, で → だり 처럼 て/で를 그대로 살려서 り만 더 붙인다고 생각하면 됩니다.\n\n2그룹 동사(食べる 등)와 する는 변화가 규칙적이라 헷갈릴 일이 거의 없어요.","table":{"columns":["기본형","て형","た형","たり형"],"rows":[["買う(かう) 사다","買って(かって)","買った(かった)","買ったり(かったり) 사기도 하고"],["食べる(たべる) 먹다","食べて(たべて)","食べた(たべた)","食べたり(たべたり) 먹기도 하고"],["する 하다","して","した","したり 하기도 하고"],["泳ぐ(およぐ) 헤엄치다","泳いで(およいで)","泳いだ(およいだ)","泳いだり(およいだり) 헤엄치기도 하고"]]},"examples":[{"jp":"歌を歌ったりします。","reading":"うたをうたったりします。","ko":"노래를 부르기도 합니다."},{"jp":"時々海で泳いだりします。","reading":"ときどきうみでおよいだりします。","ko":"가끔 바다에서 헤엄치기도 합니다."}]},{"heading":"문장에서 쓰는 법 — 마지막은 する로 마무리","body":"기본 모양은 「Aたり、Bたりします」예요. 동작 두 개를 たり로 이어 준 다음, 문장 맨 끝을 する(します)로 마무리합니다.\n\n여기서 아주 중요한 점! 문장의 시제·정중함은 마지막 する가 담당해요. 그래서 과거면 しました, 지금 하는 중이면 しています처럼 끝의 する만 바꿔 주면 됩니다. 앞의 たり는 그대로 두면 돼요.\n\n참고로 교과서 예문 중에는 「掃除をしたり、洗濯をします」처럼 뒤쪽을 たり 없이 그냥 쓰기도 하는데, 초급에서는 「~たり~たりします」처럼 양쪽에 たり를 붙이는 기본형을 먼저 몸에 익히는 걸 추천해요.","examples":[{"jp":"日曜日は掃除をしたり、洗濯をしたりします。","reading":"にちようびはそうじをしたり、せんたくをしたりします。","ko":"일요일은 청소를 하기도 하고, 빨래를 하기도 합니다."},{"jp":"友達と映画を見たり、買い物をしたりします。","reading":"ともだちとえいがをみたり、かいものをしたりします。","ko":"친구와 영화를 보기도 하고, 쇼핑을 하기도 합니다."},{"jp":"家でごろごろしたり、買い物をしたりします。","reading":"いえでごろごろしたり、かいものをしたりします。","ko":"집에서 뒹굴뒹굴하기도 하고, 쇼핑을 하기도 합니다."}]},{"heading":"たり 하나만 쓰기 · 순서가 정해진 표현","body":"たり가 꼭 두 개 있어야 하는 건 아니에요. 여러 활동 중에서 대표적인 것 하나만 예로 들 때는 たり를 한 번만 쓰기도 합니다. 교과서에도 「時々海で泳いだりします(가끔 바다에서 헤엄치기도 합니다)」처럼 하나만 쓴 예가 나와요. \"이런 것도 하고 그래요\"라는 부드러운 느낌을 줍니다.\n\n또 한 가지, 관용적으로 순서가 굳어진 표현이 있어요. \"왔다 갔다\"는 반드시 「行ったり来たり」 순서로 말해요. 「来たり行ったり」라고 하면 어색합니다. 우리말 \"왔다 갔다\"랑 순서가 반대라서 헷갈리기 쉬우니 통째로 외워 두세요.","examples":[{"jp":"行ったり来たりします。","reading":"いったりきたりします。","ko":"왔다 갔다 합니다."}]}],"mistakes":[{"wrong":"映画を見たり、買い物をしたり。","right":"映画を見たり、買い物をしたりします。","note":"맨 끝의 する(します)를 빼먹는 실수가 가장 많아요. 「~たり~たり」는 그 자체로 문장을 끝맺지 못해요. 반드시 마지막에 します/しました 같은 する로 마무리해 줘야 문장이 완성됩니다."},{"wrong":"海で泳いたりします。","right":"海で泳いだりします。","note":"泳ぐ의 た형은 泳いだ(で로 흐림)예요. 그래서 たり형도 泳いだり가 되어야 해요. 読む→読んだり, 遊ぶ→遊んだり처럼 た형이 だ로 끝나는 동사는 たり가 아니라 だり가 됩니다. て/で의 탁점(゛)을 그대로 살려 주세요."},{"wrong":"来たり行ったりします。","right":"行ったり来たりします。","note":"\"왔다 갔다\"를 우리말 순서 그대로 「来たり行ったり」라고 하면 어색해요. 일본어에서는 「行ったり来たり」 순서가 관용적으로 굳어져 있어요. 통째로 외워 두는 게 좋아요."},{"note":"「~て、~ます(~하고 ~한다)」와 뉘앙스가 달라요. 「掃除をして、洗濯をします」는 청소하고 나서 빨래한다는 순서·완결의 느낌이고, 「掃除をしたり、洗濯をしたりします」는 여러 집안일 중 청소도 하고 빨래도 한다는 예시 나열의 느낌이에요. 전부 다 하는 게 아니라 대표적으로 몇 개를 든다는 점이 포인트예요."}],"tips":["た형만 알면 게임 끝! た/だ 뒤에 り 하나만 딱 붙이면 たり/だり가 돼요.","문장 시제는 맨 끝 する가 담당한다: 과거면 しました, 지금이면 しています. 앞의 たり는 안 바꿔도 돼요.","「~たり~たりする」는 '이것도 저것도 하고 그래요' — 전부 나열이 아니라 몇 개만 예로 드는 느낌!"],"related":["07 동사 3"]},{"id":"nai-form","title":"ない형 (부정) 만들기","summary":"동사를 \"~하지 않다\"로 바꾸는 반말 부정형이 ない형이고, 1그룹은 끝소리를 あ단으로 바꿔 ない를, 2그룹은 る를 떼고 ない를, する·来る는 통째로 しない·こない로 바꿉니다.","intro":"ない형은 동사를 \"~하지 않는다\"라는 반말 부정으로 바꾼 모양이에요. 지금까지 배운 정중한 부정 ~ません과 뜻은 같지만, ない형은 친구끼리 쓰는 반말이면서 동시에 여러 문법의 '재료'가 된다는 점이 중요합니다. 예를 들어 \"~하지 마세요(~ないでください)\", \"~안 하는 게 좋아요(~ない方がいい)\", \"~해야 해요(~なければならない)\" 같은 표현이 전부 이 ない형 위에 얹혀서 만들어져요. 그래서 ない형을 정확히 만들 줄 알면 한 번에 여러 문장을 만들 수 있습니다.","sections":[{"heading":"ない형이 뭐예요?","body":"동사 뒤에 ない(나이)가 붙으면 '~하지 않다'라는 뜻이 돼요. ~ません과 의미는 같지만 ない형은 반말이에요.\n\n・飲みません(のみません) = 마시지 않습니다 (정중)\n・飲まない(のまない) = 안 마신다 (반말)\n\n반말 문장을 조금 더 부드럽게 말하고 싶으면 ない 뒤에 です를 붙여서 ~ないです라고도 해요. 교과서 예문도 이 형태를 씁니다.","examples":[{"jp":"お酒はあまり飲まないです。","reading":"おさけはあまりのまないです。","ko":"술은 별로 안 마셔요."},{"jp":"散歩に行かない?","reading":"さんぽにいかない?","ko":"산책하러 안 갈래?"},{"jp":"あなたとの約束は忘れないです。","reading":"あなたとのやくそくはわすれないです。","ko":"너와의 약속은 잊지 않아요."}]},{"heading":"그룹별로 ない형 만들기","body":"동사는 세 그룹으로 나뉘고, 그룹마다 만드는 법이 달라요.\n\n1그룹: 맨 끝 글자(う단)를 같은 줄의 あ단으로 바꾸고 ない를 붙여요. 예를 들어 く는 か로, す는 さ로, む는 ま로 바뀝니다.\n★단, う로 끝나는 동사는 あ가 아니라 わ로 바뀌어요. 買う(かう)→買わない(かわない)처럼요. 이건 꼭 외워야 하는 부분!\n★ある(있다)는 완전히 예외라서 あらない이 아니라 그냥 ない가 됩니다.\n\n2그룹: 맨 끝 る만 떼고 ない를 붙여요. 아주 간단해요.\n\n3그룹(불규칙 2개): する→しない, 来る(くる)→こない. 来る는 읽는 소리까지 く에서 こ로 바뀌니 주의하세요.","table":{"columns":["종류","만드는 법","예시 (기본형 → ない형)"],"rows":[["1그룹","끝의 う단 → あ단 + ない","書く(かく) → 書かない(かかない)"],["1그룹","","話す(はなす) → 話さない(はなさない)"],["1그룹","","待つ(まつ) → 待たない(またない)"],["1그룹","","読む(よむ) → 読まない(よまない)"],["1그룹","★う로 끝나면 わ로","買う(かう) → 買わない(かわない)"],["1그룹","★불규칙","ある → ない"],["2그룹","る 떼고 + ない","見る(みる) → 見ない(みない)"],["2그룹","","食べる(たべる) → 食べない(たべない)"],["2그룹","","起きる(おきる) → 起きない(おきない)"],["3그룹","통째로 암기","する → しない"],["3그룹","","来る(くる) → こない"]]},"examples":[{"jp":"私は目を見て話さない人は信じません。","reading":"わたしはめをみてはなさないひとはしんじません。","ko":"나는 눈을 보고 말하지 않는 사람은 믿지 않아요."}]},{"heading":"ない형으로 만드는 여러 표현","body":"ない형을 만들 줄 알면, 그 위에 다른 말을 붙여서 여러 뜻을 만들 수 있어요. 아래 네 가지는 특히 자주 써요.\n\n1) ~ないでください : ~하지 말아 주세요 (부드러운 금지)\n2) ~ない方(ほう)がいいです : ~하지 않는 편이 좋아요 (충고·제안)\n3) ~なくてもいいです : ~하지 않아도 돼요 (허가). ここ가 조금 다른데, ない에서 い를 떼고 ~なくて로 바꾼 뒤 もいい를 붙여요.\n4) ~なければならない : ~하지 않으면 안 된다 = 꼭 ~해야 한다 (강한 의무)\n\n아래 표는 교과서의 ない형 활용표예요. 형태만 살짝 바뀌어도 뜻이 크게 달라지니 소리 내어 읽어 보세요.","table":{"columns":["형태","의미"],"rows":[["~ない","~하지 않다 (부정)"],["~ないで","~하지 마라 (금지)"],["~ないで(=ずに)","~하지 않고, ~하지 말고 (상태)"],["~ないでください","~하지 말아 주세요, ~하지 마세요"],["~ない方(ほう)がいい","~하지 않는 편이 좋다 (충고·제안)"],["~なくて","~하지 않고, ~하지 않아서 (이유)"],["~なくてもいい","~하지 않아도 좋다 (허가)"],["~なくてはいけない","~하지 않으면 안 된다"],["~なければならない","~하지 않으면 안 된다"]]},"examples":[{"jp":"お酒を飲みましたから、車で行かないでください。","reading":"おさけをのみましたから、くるまでいかないでください。","ko":"술을 마셨으니까 차로 가지 마세요."},{"jp":"風邪ですからお風呂に入らない方がいいです。","reading":"かぜですからおふろにはいらないほうがいいです。","ko":"감기니까 목욕은 안 하는 편이 좋아요."},{"jp":"今度の金曜日は仕事に行かなくてもいいです。","reading":"こんどのきんようびはしごとにいかなくてもいいです。","ko":"이번 금요일은 일하러 가지 않아도 돼요."},{"jp":"学生は学校の規則を守らなければなりません。","reading":"がくせいはがっこうのきそくをまもらなければなりません。","ko":"학생은 학교 규칙을 지켜야 합니다."}]},{"heading":"헷갈리는 ~ないで와 ~なくて","body":"둘 다 '~하지 않고'로 번역돼서 헷갈리지만 쓰임이 달라요. 교과서의 메모 상자에 나온 구분이에요.\n\n・~ないで : 어떤 '상태'로, 또는 뒤 행동을 '하지 말고'라는 느낌.\n  食べないで寝た(たべないでねた) = 안 먹고 잤다.\n・~なくて : '이유·원인'을 나타낼 때.\n  食べなくてお腹がすいた(たべなくておなかがすいた) = 안 먹어서 배가 고팠다.\n\n간단히 말하면, '~안 한 채로/말고'는 ~ないで, '~안 해서(그래서)'는 ~なくて예요.","examples":[{"jp":"食べないで寝た。","reading":"たべないでねた。","ko":"안 먹고 잤다. (상태)"},{"jp":"食べなくてお腹がすいた。","reading":"たべなくておなかがすいた。","ko":"안 먹어서 배가 고팠다. (이유)"}]}],"mistakes":[{"wrong":"買あない","right":"買わない","note":"う로 끝나는 1그룹 동사는 あ가 아니라 わ로 바꿉니다. 会う→会わない, 習う→習わない도 마찬가지예요. '아이우에오'로 무심코 あ를 붙이는 게 가장 흔한 실수입니다."},{"wrong":"あらない","right":"ない","note":"ある(있다/존재하다)는 규칙대로면 あらない이지만, 실제로는 그냥 ない로 바뀌는 예외예요. 통째로 외워 두세요."},{"wrong":"帰ない","right":"帰らない","note":"帰る(かえる)는 る 앞이 え라서 2그룹처럼 보이지만 사실 1그룹이에요. 그래서 帰らない가 맞습니다. 入る(はいる)·乗る(のる)·走る(はしる)도 같은 함정이니 조심하세요."},{"wrong":"すない / きない","right":"しない / こない","note":"する와 来る는 불규칙(3그룹)이라 규칙으로 만들 수 없어요. する→しない, 来る(くる)→こない. 특히 来る는 읽는 소리가 く에서 こ로 바뀌는 점을 놓치기 쉽습니다."}],"tips":["1그룹은 '끝소리를 아단으로 내려서 ない'. く→か, む→ま처럼 같은 줄 あ단으로 바꾼다고 생각하면 쉬워요.","う로 끝나는 동사는 'あ가 아니라 わ!' 이 한 줄만 외워도 買わない·会わない·習わない를 다 맞힐 수 있어요.","る로 끝난다고 다 2그룹이 아니에요. 帰る·入る·乗る는 1그룹 함정. 헷갈리면 ない형을 らない로 만들어 보세요."],"related":["08 동사 4"]},{"id":"potential","title":"가능형 — ~할 수 있다","summary":"동사를 살짝 바꿔서 \"~할 수 있다\"라는 능력·가능을 나타내는 형태예요. 1그룹은 마지막 글자를 え단으로 바꾸고 る를 붙이고, 2그룹은 る를 떼고 られる, する는 できる, 来る는 こられる로 바뀝니다.","intro":"\"저는 가타카나를 읽을 수 있어요\", \"이 차는 몇 명 탈 수 있어요?\"처럼 어떤 일을 할 능력이 있는지, 혹은 상황상 가능한지를 말할 때 쓰는 것이 가능형이에요.\n그냥 \"읽다(読む)\"를 \"읽을 수 있다(読める)\"로 바꾸는 것이라, 동사 하나만 알면 회화에서 아주 자주 쓰게 됩니다.\n만드는 방법은 그룹마다 규칙이 정해져 있어서, 규칙 세 개만 외우면 어떤 동사든 바꿀 수 있어요.","sections":[{"heading":"가능형 만드는 법 (그룹별 규칙)","body":"동사는 세 그룹으로 나뉘고, 그룹마다 바꾸는 방법이 달라요.\n\n1그룹: 마지막 う단 글자를 같은 줄의 え단으로 바꾸고 る를 붙여요. 예를 들어 書く(かく)의 く는 か행의 う단인데, 이걸 え단인 け로 바꿔서 書ける(かける)가 됩니다.\n\n2그룹: 맨 끝의 る만 떼고 그 자리에 られる를 붙이면 끝이에요. 見る(みる)→見られる(みられる).\n\n3그룹: 두 개뿐이라 통째로 외웁니다. する→できる, 来る(くる)→来られる(こられる).\n\n한 가지 알아둘 점: 2그룹 가능형과 来る의 가능형은 뒤에 배우는 수동형과 형태가 똑같아요(見られる 등). 이건 문맥으로 구분하니 지금은 '모양이 겹치는구나' 정도만 기억하면 됩니다.","table":{"columns":["그룹","규칙","예시(기본형 → 가능형)"],"rows":[["1그룹","う단 → え단 + る","書く(かく) → 書ける(かける)"],["1그룹","","話す(はなす) → 話せる(はなせる)"],["1그룹","","待つ(まつ) → 待てる(まてる)"],["1그룹","","呼ぶ(よぶ) → 呼べる(よべる)"],["1그룹","","読む(よむ) → 読める(よめる)"],["1그룹","","乗る(のる) → 乗れる(のれる)"],["2그룹","る → られる","見る(みる) → 見られる(みられる)"],["2그룹","","寝る(ねる) → 寝られる(ねられる)"],["2그룹","","教える(おしえる) → 教えられる(おしえられる)"],["3그룹","통째로 암기","する → できる"],["3그룹","","来る(くる) → 来られる(こられる)"]]},"examples":[{"jp":"私はカタカナが読めます。","reading":"わたしはカタカナがよめます。","ko":"저는 가타카나를 읽을 수 있습니다."},{"jp":"この車は何人乗れますか。","reading":"このくるまはなんにんのれますか。","ko":"이 차는 몇 명 탈 수 있습니까?"}]},{"heading":"목적어에는 조사 が를 써요","body":"이게 초보자가 가장 자주 실수하는 부분이에요.\n보통 '~을/를'은 を로 나타내지만, 가능형에서는 목적어에 が를 씁니다. 교재에도 '가능형의 목적조사는 が를 쓴다'라고 별표로 강조되어 있어요.\n\n예를 들어 '책을 읽다'는 本を読む이지만, '책을 읽을 수 있다'는 本が読める가 자연스러워요. 능력이나 가능의 대상은 が로 표시한다고 기억하면 됩니다.\n\n참고로 する의 가능형인 できる도 마찬가지예요. 彼は三ヶ国語ができます처럼 앞에 が가 붙습니다.","examples":[{"jp":"彼は三ヶ国語ができます。","reading":"かれはさんかこくごができます。","ko":"그는 3개 국어를 할 수 있습니다."},{"jp":"日本語が話せます。","reading":"にほんごがはなせます。","ko":"일본어를 말할 수 있습니다."}]},{"heading":"또 다른 가능 표현: (기본형)ことができます","body":"동사를 바꾸지 않고도 가능을 나타내는 방법이 하나 더 있어요.\n동사 기본형(사전형) 뒤에 ことができます를 붙이면 '~할 수 있습니다'라는 뜻이 됩니다.\n\n예를 들어 ひく(켜다)는 그대로 두고 ひくことができます라고 하면 '켤 수 있습니다'가 돼요. 뜻은 가능형(ひける)과 거의 같지만, 이 표현은 동사를 활용시키지 않아도 되니까 헷갈릴 때 안전하게 쓸 수 있어요.\n\n형태는 반드시 '기본형 + こと + が + できます' 순서예요. 조사 が가 こと 뒤에 붙는다는 점을 기억하세요.","examples":[{"jp":"あの人はバイオリンをひくことができます。","reading":"あのひとはバイオリンをひくことができます。","ko":"저 사람은 바이올린을 켤 수 있습니다."},{"jp":"英語で電話をかけることができます。","reading":"えいごででんわをかけることができます。","ko":"영어로 전화를 걸 수 있습니다."},{"jp":"フランス語で話すことができますか。","reading":"フランスごではなすことができますか。","ko":"프랑스어로 이야기할 수 있습니까?"}]},{"heading":"정중하게 말하기: ~ます로 바꾸기","body":"가능형은 만들고 나면 모두 る로 끝나요(読める, 見られる, できる…). 즉 모양이 전부 2그룹 동사처럼 생겼어요.\n그래서 정중하게 '~할 수 있습니다'라고 말할 때는, 끝의 る를 떼고 ます를 붙이면 됩니다.\n\n読める → 読めます, 乗れる → 乗れます, 見られる → 見られます, できる → できます 처럼요.\n질문은 뒤에 か만 붙이면 됩니다. 乗れますか(탈 수 있습니까?).","examples":[{"jp":"漢字が書けます。","reading":"かんじがかけます。","ko":"한자를 쓸 수 있습니다."},{"jp":"朝早く起きられますか。","reading":"あさはやくおきられますか。","ko":"아침 일찍 일어날 수 있습니까?"}]}],"mistakes":[{"wrong":"本を読めます。","right":"本が読めます。","note":"가능형에서는 목적어에 を가 아니라 が를 쓰는 게 자연스러워요. 교재도 '가능형의 목적조사는 が'라고 강조합니다. 능력의 대상은 が라고 기억하세요."},{"wrong":"帰れる를 2그룹으로 착각","right":"帰る(かえる)는 1그룹 → 帰れる(かえれる)","note":"帰る는 る로 끝나서 2그룹처럼 보이지만 실제로는 1그룹 동사예요. 그래서 る를 떼고 られる를 붙이는 게 아니라, る를 れ로 바꾸고 る를 붙여 帰れる가 됩니다. 見る·食べる 같은 진짜 2그룹과 헷갈리지 마세요."},{"wrong":"する의 가능형을 される로","right":"する → できる","note":"する의 가능형은 규칙대로 만드는 게 아니라 아예 다른 단어 できる예요. される는 수동형(당하다)이라 뜻이 완전히 달라지니 주의하세요."},{"wrong":"ひけることができます","right":"ひくことができます","note":"'~ことができます'는 앞에 반드시 기본형(사전형)을 써요. 가능형(ひける)을 넣으면 '할 수 있다'가 두 번 겹쳐 틀린 문장이 됩니다. 둘 중 하나만 쓰세요: ひけます 또는 ひくことができます."}],"tips":["1그룹은 'え단 + る'가 핵심. 끝소리를 '에'로 바꾸고 る만 붙이면 돼요: か-け-る 리듬으로 書ける.","가능형은 만들면 전부 る로 끝나 2그룹처럼 활용돼요. 그래서 정중형은 언제나 る를 떼고 ます(読めます, できます).","확신이 안 서면 안전하게 '기본형 + ことができます'를 쓰세요. 동사를 안 바꿔도 되니 실수가 줄어요."],"related":["10 동사 6"]},{"id":"passive","title":"수동형 — ~당하다·되다","summary":"수동형은 '내가 무언가를 당하는' 표현으로, 동사 그룹별로 れる·られる를 붙여 만들고 행동을 한 사람은 조사 に로 표시해요.","intro":"수동형(受身)은 내가 어떤 행동의 '당하는 쪽'이 될 때 쓰는 표현이에요. 우리말의 '칭찬받다, 불리다, 밟히다, (~하라는) 말을 듣다'처럼, 남이 한 행동을 내가 받는 상황을 나타냅니다. 누가 그 행동을 했는지는 조사 に(~에게)로 표시하는 게 핵심이에요. 일상 회화와 시험에 아주 자주 나오니, 그룹별로 만드는 규칙부터 차근차근 익혀 봅시다.","sections":[{"heading":"수동형이란? — 누가 '당하는가'","body":"수동형은 문장의 주인공(주어)이 어떤 일을 '당하는' 사람이 되는 표현이에요.\n예를 들어 '선생님이 다나카 씨를 불렀다'를 다나카 씨 입장에서 다시 말하면 '다나카 씨는 선생님에게 불렸다'가 되죠. 이때 다나카 씨가 주어가 되고, 부른 사람(선생님)은 조사 に로 표시합니다.\n\n기본 뼈대는 이래요.\n(당한 사람)は (행동한 사람)に (동사의 수동형)\n\n한국어로는 '~받다, ~되다, ~당하다, ~어지다'처럼 문맥에 따라 여러 가지로 번역돼요. 딱 한 단어로 외우기보다 '나는 당하는 쪽'이라는 느낌을 잡는 게 중요해요."},{"heading":"수동형 만드는 법 (그룹별 규칙)","body":"동사 그룹에 따라 만드는 방법이 달라요.\n\n1그룹: 어미 う단을 あ단으로 바꾸고 れる를 붙여요. (く→か, む→ま, ぶ→ば …)\n2그룹: 마지막 る를 떼고 られる를 붙여요.\n3그룹: 불규칙이라 통째로 외웁니다. する→される, 来る(くる)→来られる(こられる).\n\n한 가지 꼭 기억할 점! 1그룹 중 う로 끝나는 동사는 う를 あ가 아니라 わ로 바꿔요. 그래서 買う(かう)는 買あれる가 아니라 買われる(かわれる)가 됩니다. (ない형에서 買わない가 되는 것과 똑같은 원리예요.)\n\n또 2그룹 수동형(られる)은 '가능형(~할 수 있다)'과 모양이 완전히 똑같아요. 예를 들어 食べられる는 '먹히다(수동)'도 되고 '먹을 수 있다(가능)'도 됩니다. 어느 쪽인지는 문맥으로 구별해요. 来る의 こられる도 마찬가지로 수동형과 가능형이 같은 모양이에요.","table":{"columns":["동사 그룹","만드는 법","예시 (기본형 → 수동형)"],"rows":[["1그룹","어미 う단 → あ단 + れる","書く(かく) → 書かれる(かかれる)"],["1그룹","어미 う단 → あ단 + れる","読む(よむ) → 読まれる(よまれる)"],["1그룹","어미 う단 → あ단 + れる","呼ぶ(よぶ) → 呼ばれる(よばれる)"],["1그룹 (う로 끝나는 동사)","う → わ + れる (주의!)","買う(かう) → 買われる(かわれる)"],["2그룹","る 떼고 + られる","食べる(たべる) → 食べられる(たべられる)"],["2그룹","る 떼고 + られる","見る(みる) → 見られる(みられる)"],["3그룹","불규칙 (통암기)","する → される"],["3그룹","불규칙 (통암기)","来る(くる) → 来られる(こられる)"]]}},{"heading":"예문으로 익히기","body":"실제 문장에서 に(행동한 사람)와 수동형이 어떻게 쓰이는지 봅시다.\n특히 세 번째 예문처럼 '내 몸의 일부(발)를 남이 밟았다'처럼 피해를 입은 상황도 수동형으로 자주 표현해요. 이때 밟힌 대상(足)에는 여전히 を가 붙고, 밟은 사람에는 に가 붙는 점을 눈여겨보세요.\n네 번째 예문의 言われる는 직역하면 '말해지다'지만, 우리말로는 '(~하라는) 말을 듣다'로 자연스럽게 옮겨요.","examples":[{"jp":"子供の時はよく母に褒められました。","reading":"こどものときはよくははにほめられました。","ko":"어렸을 때는 자주 어머니께 칭찬받았습니다."},{"jp":"田中さんは先生に呼ばれました。","reading":"たなかさんはせんせいによばれました。","ko":"다나카 씨는 선생님께 불려 갔습니다."},{"jp":"電車の中で隣の人に足を踏まれました。","reading":"でんしゃのなかでとなりのひとにあしをふまれました。","ko":"전철 안에서 옆 사람에게 발을 밟혔습니다."},{"jp":"医者にたばことお酒をやめろと言われました。","reading":"いしゃにたばことおさけをやめろといわれました。","ko":"의사에게 담배와 술을 끊으라는 말을 들었습니다."}]},{"heading":"수동형이 없는 동사","body":"모든 동사가 수동형이 되는 건 아니에요. 이미 '저절로 ~된다'는 뜻을 품고 있는 동사들은 수동형을 만들지 않아요.\n\n대표적으로 ある(있다), 聞こえる(きこえる, 들리다), できる(할 수 있다), 見える(みえる, 보이다), わかる(알다) 같은 동사들이에요.\n\n예를 들어 '일본어를 알게 됐다'를 수동형처럼 日本語がわかられました라고 하면 틀려요(×). 그냥 日本語がわかりました(○)라고 하면 됩니다. 이 동사들은 형태를 바꾸지 말고 기본 활용 그대로 쓴다고 기억하세요.","examples":[{"jp":"日本語がわかりました。","reading":"にほんごがわかりました。","ko":"일본어를 알게 되었습니다. (わかられました는 틀림)"}]}],"mistakes":[{"wrong":"買あれる","right":"買われる(かわれる)","note":"う로 끝나는 1그룹 동사는 う를 あ가 아니라 わ로 바꿔요. ない형이 買わない인 것과 똑같아요. 会う→会われる, 手伝う→手伝われる도 같은 규칙이에요."},{"wrong":"帰れる (수동으로 의도했을 때)","right":"帰られる(かえられる)","note":"帰る(かえる)는 る로 끝나지만 2그룹이 아니라 1그룹 예외 동사예요. 그래서 수동형은 る만 떼는 게 아니라 帰られる가 됩니다. 참고로 帰れる는 '돌아갈 수 있다'는 가능형이에요."},{"wrong":"先生が私を褒められました。","right":"私は先生に褒められました。","note":"행동을 한 사람(선생님)에는 が가 아니라 に를 붙여요. 수동형 문장에서는 '당하는 사람'이 주어(は)가 되고, '한 사람'은 に로 표시합니다."},{"note":"見られる, 食べられる 같은 2그룹 형태는 수동형과 가능형이 똑같아요. '먹히다'인지 '먹을 수 있다'인지는 문장 전체 상황으로 판단해야 해요. 형태가 같다고 당황하지 말고 문맥을 보세요."}],"tips":["핵심 공식: (당한 사람)は + (한 사람)に + 동사 수동형. 'に = 범인을 가리키는 손가락'이라고 외워 두면 조사를 안 헷갈려요.","1그룹은 'あ단 + れる', 2그룹은 'られる'. う로 끝나는 동사만 わ로 바뀐다는 것 하나만 예외로 챙기면 돼요.","발을 밟히는 것처럼 '피해를 입었다'는 느낌일 때도 수동형을 써요. 이때 피해 대상(足を)에는 を가 그대로 남습니다."],"related":["10 동사 6"]},{"id":"causative","title":"사역형·사역수동형","summary":"せる·させる는 '남에게 ~시키다', せられる·させられる는 '(시키니까) 어쩔 수 없이 ~하게 되다'예요.","intro":"사역형은 내가 다른 사람에게 무언가를 '시키거나, ~하게 만드는' 표현이에요. 반대로 사역수동형은 내가 남에게 시킴을 당해서 '억지로 ~하게 되는' 상황을 나타냅니다. 부모가 아이에게 공부를 시키거나, 선생님이 벌로 학생을 세워 두거나, 노래방에서 억지로 노래를 부르게 되는 것처럼 일상에서 자주 쓰이니 만드는 규칙과 방향(누가 시키고 누가 당하는지)을 함께 익혀 두면 좋아요.","sections":[{"heading":"1. 사역형 만들기 — 남에게 ~시키다, ~하게 하다","body":"사역형은 '내가 남에게 시킨다'는 뜻이에요. 만드는 방법은 동사 그룹마다 정해져 있어요.\n\n1그룹 동사: 마지막 う단 글자를 같은 줄의 あ단으로 바꾸고 せる를 붙여요. 예를 들어 書(か)く는 く→か로 바꿔 書かせる가 돼요.\n2그룹 동사: 마지막 る만 떼고 させる를 붙여요. 見(み)る→見させる, 食(た)べる→食べさせる처럼요.\n3그룹 동사: 불규칙이라 통째로 외웁니다. する→させる, 来(く)る→こさせる.\n\n한 가지 주의할 점은 う로 끝나는 1그룹 동사예요. あ단으로 바꿀 때 あ가 아니라 わ가 됩니다. 그래서 買(か)う는 買あせる가 아니라 買わせる가 돼요. 교재도 이 동사에 ※ 표시를 해서 강조하고 있어요.","table":{"columns":["동사 그룹","만드는 방법","예시"],"rows":[["1그룹","끝 う단 → あ단 + せる","書(か)く → 書かせる / 読(よ)む → 読ませる / 呼(よ)ぶ → 呼ばせる"],["1그룹(う끝)","う → わ + せる","買(か)う → 買わせる (○) / 買あせる (×)"],["2그룹","る 떼고 + させる","見(み)る → 見させる / 食(た)べる → 食べさせる"],["3그룹","불규칙 (통암기)","する → させる / 来(く)る → こさせる"]]},"examples":[{"jp":"母は私を日本へ留学させました。","reading":"はははわたしをにほんへりゅうがくさせました。","ko":"어머니는 저를 일본으로 유학 보냈습니다."},{"jp":"部長は田中さんを会議に出席させました。","reading":"ぶちょうはたなかさんをかいぎにしゅっせきさせました。","ko":"부장은 다나카 씨를 회의에 출석시켰습니다."},{"jp":"田中さんはいつも人を笑わせます。","reading":"たなかさんはいつもひとをわらわせます。","ko":"다나카 씨는 언제나 사람을 웃깁니다."}]},{"heading":"2. 시키는 대상에 붙는 조사 — を와 に","body":"사역형에서 '시킴을 받는 사람'에게 어떤 조사를 붙일지는 동사의 성격에 따라 달라져요.\n\n(1) 목적어(を)가 없는 자동사일 때는 시키는 대상에 を를 붙여요. 田中さんを出席させる(다나카 씨를 출석시키다), 人を笑わせる(사람을 웃기다)처럼요.\n(2) 이미 목적어에 を를 쓰는 타동사일 때는 시키는 대상에 に를 붙여요. 한 문장에 を를 두 번 쓸 수 없기 때문이에요. 그래서 '부하에게 일을 돕게 하다'는 部下に仕事を手伝わせる가 됩니다. 여기서 사람(部下)은 に, 대상(仕事)은 を예요.\n\n초보자는 타동사인데도 사람에 を를 붙여 을/를을 두 번 쓰는 실수를 자주 하니 '타동사면 사람은 に'라고 기억해 두세요.","examples":[{"jp":"忙しいですから部下に仕事を手伝わせます。","reading":"いそがしいですからぶかにしごとをてつだわせます。","ko":"바쁘기 때문에 부하에게 일을 돕게 합니다."}]},{"heading":"3. 사역수동형 만들기 — 어쩔 수 없이 ~하게 되다","body":"사역수동형은 이름 그대로 '사역형(せる) + 수동형(られる)'을 합친 형태예요. '누가 나에게 시켜서, 나는 하기 싫었지만 어쩔 수 없이 하게 되었다'는 억지·강제의 느낌을 담아요.\n\n1그룹 동사: う단을 あ단으로 바꾸고 せられる를 붙여요. 書(か)く→書かせられる.\n2그룹 동사: る를 떼고 させられる. 食(た)べる→食べさせられる.\n3그룹 동사: する→させられる, 来(く)る→こさせられる.\n\n문장에서는 '억지로 시킨 사람'에게 に를 붙여요. 아래 첫 예문의 先生に(선생님이)가 바로 나를 세워 둔 사람이에요. 즉 주어인 '나'는 당하는 쪽, に가 붙은 사람이 시키는 쪽입니다.","table":{"columns":["동사 그룹","만드는 방법","예시"],"rows":[["1그룹","끝 う단 → あ단 + せられる","書(か)く → 書かせられる / 読(よ)む → 読ませられる"],["2그룹","る 떼고 + させられる","見(み)る → 見させられる / 食(た)べる → 食べさせられる"],["3그룹","불규칙 (통암기)","する → させられる / 来(く)る → こさせられる"]]},"examples":[{"jp":"私は小学生の時、遅刻をしてよく先生に立たせられました。","reading":"わたしはしょうがくせいのとき、ちこくをしてよくせんせいにたたせられました。","ko":"저는 초등학생 때 지각을 해서 자주 선생님이 세워 두는 벌을 받았습니다."},{"jp":"歌が下手なのに、カラオケで二度も歌わせられました。","reading":"うたがへたなのに、カラオケでにどもうたわせられました。","ko":"노래를 못하는데도 노래방에서 두 번이나 억지로 노래를 불러야 했습니다."},{"jp":"年を書きたくないのに、書かせられてしまいました。","reading":"としをかきたくないのに、かかせられてしまいました。","ko":"나이를 쓰고 싶지 않은데도 어쩔 수 없이 쓰게 되었습니다."}]},{"heading":"4. 축약형 — 1그룹은 せられる를 される로 줄일 수 있어요","body":"교재에는 사역수동형을 짧게 줄이는 '축약형'이 함께 소개돼요. 1그룹 동사에 한해서 ~せられる를 ~される로 줄일 수 있어요.\n\n예: 待(ま)つ → 待たせられる → 待たされる (둘 다 맞아요)\n\n단, 딱 하나 예외가 있어요. 어미가 す로 끝나는 1그룹 동사(話す 등)는 축약할 수 없어요. 줄이면 話される가 되어 그냥 수동형과 똑같아져 헷갈리기 때문이에요. 그래서 話す는 話させられる만 쓰고 話される(×)로 줄이지 않아요. 참고로 2그룹·3그룹에는 이 축약형이 없습니다.","examples":[{"jp":"予約時間に行ったんですが、看護婦さんに名前を呼ばれるまで最低３０分は待たせられました。","reading":"よやくじかんにいったんですが、かんごふさんになまえをよばれるまでさいていさんじゅっぷんはまたせられました。","ko":"예약 시간에 갔는데, 간호사가 이름을 부를 때까지 최소 30분은 억지로 기다려야 했습니다."}]},{"heading":"5. 한눈에 보는 전체 활용","body":"교재 뒤쪽 동사 활용표에서 사역형·사역수동형이 다른 활용형들과 어떻게 어울리는지 확인할 수 있어요. 가능형·수동형·사역형·사역수동형은 뿌리가 비슷하니 나란히 놓고 비교하면 기억이 오래갑니다.","table":{"columns":["기본형","가능형","수동형","사역형","사역수동형"],"rows":[["会(あ)う","会える","会われる","会わせる","会わせられる"],["食(た)べる","食べられる","食べられる","食べさせる","食べさせられる"],["する","できる","される","させる","させられる"],["来(く)る","来られる","来られる","来させる","来させられる"]]}}],"mistakes":[{"wrong":"買あせる","right":"買わせる","note":"う로 끝나는 1그룹 동사는 あ단으로 바꿀 때 あ가 아니라 わ가 돼요. 書く→書か처럼 대부분 あ단이지만, う끝 동사만은 わ! 買う·会う·手伝う 모두 買わせる·会わせる·手伝わせる가 됩니다."},{"wrong":"帰させる","right":"帰らせる","note":"帰(かえ)る는 る로 끝나 2그룹처럼 보이지만 사실 1그룹이에요. 그래서 2그룹처럼 る를 떼면 안 되고, う단(る)→あ단(ら)+せる로 帰らせる가 됩니다. 乗(の)る도 마찬가지로 乗らせる예요."},{"wrong":"部下を仕事を手伝わせる","right":"部下に仕事を手伝わせる","note":"타동사 문장에서는 목적어에 이미 を(仕事を)를 쓰기 때문에, 시키는 사람에게는 に를 붙여야 해요. を를 두 번 쓸 수 없어요. '타동사면 사람은 に'라고 외우세요."},{"wrong":"先生に立たせました","right":"先生に立たせられました","note":"せる(사역)와 せられる(사역수동)를 헷갈리면 방향이 뒤바뀌어요. せる는 '내가 남을 시킨다', せられる는 '내가 남에게 시킴을 당한다'예요. '나는 억지로 ~했다'는 상황이면 반드시 せられる를 써야 합니다."}],"tips":["せる는 '시킨다', 거기에 수동의 られる가 붙은 せられる는 '시킴을 당한다(억지로)'. 글자가 길어질수록 당하는 쪽이라고 기억하세요.","사역형 1그룹은 ない형과 뿌리가 같아요. 書かない의 '書か'에 せる만 붙이면 書かせる! ない형을 만들 줄 알면 사역형도 바로 만들 수 있어요.","축약형은 '1그룹 + せられる → される'로 짧게. 단 す로 끝나는 話す는 수동형과 겹쳐서 줄이지 않아요(話させられる만 사용)."],"related":["10 동사 6"]},{"id":"yarimorai","title":"あげる·くれる·もらう — 주고받기","summary":"'주다'는 방향에 따라 둘로 갈린다 — 남에게 주면 あげる, 나에게 주면 くれる. 그리고 받는 건 もらう.","intro":"일본어에는 '주다'가 하나가 아니라 두 개예요. 내가(또는 제3자가) 남에게 줄 때는 あげる, 남이 나(또는 내 가족·내 편)에게 줄 때는 くれる를 씁니다. 한국어는 둘 다 그냥 '주다'라서 이 방향 구분이 가장 헷갈리는 포인트예요.\n여기에 '받다'인 もらう까지 세 식구를 익히면, 선물·도움을 주고받는 일상 표현을 자유롭게 말할 수 있습니다. 게다가 상대가 윗사람이냐 아랫사람이냐에 따라 높임말 짝(さしあげる·くださる·いただく)도 함께 나와요.","sections":[{"heading":"큰 그림 — 방향이 동사를 정한다","body":"교재는 이 세 동사를 '수수동사(授受動詞·주고받기 동사)'라고 부릅니다. 핵심은 화살표 방향이에요.\n\n・あげる 계열: 나·제3자 → 남 (밖으로 나가는 방향)\n・くれる 계열: 남 → 나·내 편 (나에게 오는 방향)\n・もらう 계열: 나 ← 남 (내가 받아 오는 방향)\n\n같은 '주다'라도 화살표가 나에게서 나가면 あげる, 나에게로 들어오면 くれる입니다. 여기에 상대가 윗사람이면 높임말 짝을 씁니다.","table":{"columns":["방향","기본형","높임형","예"],"rows":[["남에게 주다 (나·제3자 → 남)","あげる","さしあげる (겸양, 윗사람께) / やる (손아래·동식물)","友達に人形をあげる"],["나에게 주다 (남 → 나·내 편)","くれる","くださる (존경, 윗사람이)","先生が私にくださる"],["받다 (나 ← 남)","もらう","いただく (겸양)","先生にいただく"]]}},{"heading":"あげる 계열 — 내가·남이 '남에게' 준다","body":"주는 사람이 は(가), 받는 사람이 に(에게), 물건이 を입니다.\n\n상대에 따라 세 가지로 갈려요.\n・やる: 손아래 사람, 동물, 식물에게 (예: 꽃에 물을, 개에게 먹이를)\n・あげる: 보통 사이 (친구·동년배)\n・さしあげる: 윗사람께 드릴 때 (겸양어 = '드리다')\n\n주의: 받는 쪽이 '나'이면 이 계열은 절대 못 씁니다. あげる 문장에 私に는 올 수 없어요.","examples":[{"jp":"私は友達に人形をあげました。","reading":"わたしはともだちににんぎょうをあげました。","ko":"나는 친구에게 인형을 주었습니다."},{"jp":"私は毎朝花に水をやります。","reading":"わたしはまいあさはなにみずをやります。","ko":"나는 매일 아침 꽃에 물을 줍니다."},{"jp":"あなたは先生に何をさしあげましたか。","reading":"あなたはせんせいになにをさしあげましたか。","ko":"당신은 선생님께 무엇을 드렸습니까?"},{"jp":"知子さんは山田さんにネクタイをあげました。","reading":"ともこさんはやまださんにネクタイをあげました。","ko":"도모코 씨는 야마다 씨에게 넥타이를 주었습니다."}]},{"heading":"くれる 계열 — 남이 '나·내 편에게' 준다","body":"받는 쪽이 나, 또는 내 가족·내 편(우치)일 때 씁니다. 조사는 あげる와 같아요 — 주는 사람 は, 받는 사람 に, 물건 を.\n・くれる: 보통 사이\n・くださる: 윗사람(선생님 등)이 나에게 줄 때 (존경어 = '주시다'). 과거형은 くださいました.\n\n중요: 받는 사람이 내 여동생이어도 '내 편'이므로 くれる를 씁니다. 세 번째 예문에서 田中さん이 준 대상이 나의 여동생(妹)이라 あげました가 아니라 くれました가 된 거예요. 이때 '내' 여동생이라 妹さん이 아니라 妹라고 낮춰 부릅니다.","examples":[{"jp":"和子さんは私に辞書をくれました。","reading":"かずこさんはわたしにじしょをくれました。","ko":"가즈코 씨는 저에게 사전을 주었습니다."},{"jp":"先生は私に夏休みの写真を見せてくださいました。","reading":"せんせいはわたしになつやすみのしゃしんをみせてくださいました。","ko":"선생님은 저에게 여름 방학 사진을 보여 주셨습니다."},{"jp":"田中さんは妹に日本の絵はがきをくれました。","reading":"たなかさんはいもうとににほんのえはがきをくれました。","ko":"다나카 씨는 (내) 여동생에게 일본 그림엽서를 주었습니다."},{"jp":"主人は誕生日にいつもプレゼントをくれます。","reading":"しゅじんはたんじょうびにいつもプレゼントをくれます。","ko":"남편은 생일에 언제나 선물을 줍니다."}]},{"heading":"もらう 계열 — '받다', 그리고 조사 정리","body":"받는 사람이 は(주어)가 되고, 주는 사람은 に 또는 から로 표시합니다. 물건은 を예요.\n・もらう: 보통\n・いただく: 윗사람께 받을 때 (겸양어)\n\n교재의 별표 규칙: 주는 쪽을 나타낼 때 보통은 に·から 둘 다 되지만, 주는 쪽이 회사·학교 같은 단체이면 から만 씁니다 (団体にもらう ✗ → 団体からもらう ○).","table":{"columns":["동사","주어 (は/が)","상대 표시","물건"],"rows":[["あげる · くれる","주는 사람","받는 사람 + に","물건 + を"],["もらう","받는 사람","주는 사람 + に / から","물건 + を"]]},"examples":[{"jp":"私は先生にプレゼントをいただきました。","reading":"わたしはせんせいにプレゼントをいただきました。","ko":"저는 선생님께 선물을 받았습니다."},{"jp":"(あなたは)山田さんから何をもらいましたか。","reading":"(あなたは)やまださんからなにをもらいましたか。","ko":"(당신은) 야마다 씨에게서 무엇을 받았습니까?"},{"jp":"田中さんは金さんに何をもらいましたか。","reading":"たなかさんはきむさんになにをもらいましたか。","ko":"다나카 씨는 김 씨에게 무엇을 받았습니까?"}]},{"heading":"〜て형 + 수수동사 = '~해 주다 / ~해 받다'","body":"물건뿐 아니라 '행동'도 주고받을 수 있어요. 동사의 て형에 붙이면 됩니다.\n・〜てあげる / 〜てさしあげる: (남에게) ~해 주다 / ~해 드리다\n・〜てくれる / 〜てくださる: (남이 나에게) ~해 주다 / ~해 주시다\n・〜てもらう / 〜ていただく: (내가) ~해 받다 (자연스러운 한국어로는 '(남이) ~해 주다')\n\nくれる와 もらう는 같은 상황을 방향만 바꿔 말한 것이라 서로 변환됩니다. 연습문제처럼 '내가 ~에게 받았다(もらう)'는 '그가 나에게 주었다(くれる)'로 바꿀 수 있어요.","examples":[{"jp":"(私は)先輩のレポートを書いてあげました。","reading":"(わたしは)せんぱいのレポートをかいてあげました。","ko":"(나는) 선배의 리포트를 써 주었습니다."},{"jp":"鈴木さんが車で送ってくれました。","reading":"すずきさんがくるまでおくってくれました。","ko":"스즈키 씨가 차로 바래다주었습니다."},{"jp":"(私は)母に料理を作ってもらいました。","reading":"(わたしは)ははにりょうりをつくってもらいました。","ko":"(저는) 어머니가 요리를 만들어 주셨습니다."},{"jp":"私は田中さんに本をもらいました。→ 田中さんは私に本をくれました。","reading":"わたしはたなかさんにほんをもらいました。→ たなかさんはわたしにほんをくれました。","ko":"나는 다나카 씨에게 책을 받았습니다. → 다나카 씨는 나에게 책을 주었습니다."}]}],"mistakes":[{"wrong":"先生が私に本をあげました。","right":"先生が私に本をくださいました。","note":"가장 흔한 실수. 한국어 '주다' 하나에 익숙해 방향을 놓치는 경우예요. 남이 '나(또는 내 편)'에게 줄 때는 あげる를 절대 못 쓰고 くれる(윗사람이면 くださる)를 씁니다. 반대로 내가 남에게 줄 때만 あげる입니다."},{"wrong":"私は山田さんを本をもらいました。","right":"私は山田さんに(から)本をもらいました。","note":"もらう는 받는 사람이 は, 주는 사람이 に 또는 から, 물건이 を입니다. 주는 사람을 を로 표시하면 틀려요. 주는 쪽이 회사·학교 같은 단체면 に는 안 되고 から만 씁니다."},{"wrong":"田中さんは妹さんに絵はがきをあげました。 (내 여동생 이야기인데)","right":"田中さんは妹に絵はがきをくれました。","note":"받는 사람이 '내 여동생'이면 내 편(우치)이라 くれる를 씁니다. 또 남의 여동생은 妹さん이지만 '내' 여동생은 낮춰서 妹(さん 없이)라고 해요."},{"wrong":"私は毎朝花に水をあげます。","right":"私は毎朝花に水をやります。","note":"교재는 식물·동물·손아래 사람에게는 やる를 쓴다고 가르칩니다 (花に水をやる, 犬にえさをやる). 요즘 회화에서는 あげる도 많이 쓰지만, 시험·교재 기준으로는 やる가 정답이에요."}],"tips":["화살표로 외우세요. 나에게서 나가면 あげる/やる/さしあげる, 나에게로 들어오면 くれる/くださる, 내가 손으로 받아오면 もらう/いただく.","'私に(나에게)'가 보이면 무조건 くれる 계열. あげる 문장에는 私に가 올 수 없다고 기억하면 방향 실수가 사라집니다.","높임 짝 세트: 내가 윗사람께 주면 さしあげる, 윗사람이 나에게 주시면 くださる, 내가 윗사람께 받으면 いただく."],"related":["10 동사 6"]},{"id":"conditionals","title":"가정형 ば·たら·と·なら 구분","summary":"일본어의 '~하면'은 ば·たら·と·なら 네 가지가 있고, 이치를 말하면 ば, 회화에서 두루 쓰면 たら, 늘 그렇게 되면 と, 상대 말을 받아 '그거라면'이면 なら예요.","intro":"한국어는 '~하면' 하나로 다 되지만, 일본어는 상황에 따라 ば·たら·と·なら 네 가지를 골라 써요. 처음엔 헷갈리지만, 각자 '잘 어울리는 자리'가 정해져 있어서 그 느낌만 잡으면 돼요. 이 넷을 구분하면 자연스러운 회화와 시험 문제(빈칸 고르기)를 동시에 잡을 수 있어요. 이 과에서는 특히 회화에서 제일 자주 쓰는 たら와, 이치·속담에 쓰는 ば를 중심으로 익혀 봅시다.","sections":[{"heading":"먼저 큰 그림: 네 가지 '~하면'","body":"일본어의 조건표현은 네 가지가 있어요. 각자 성격이 조금씩 달라요.\n\n・ば … 논리·이치·속담·반복되는 습관을 말할 때. '봄이 오면 꽃이 핀다'처럼 당연한 이치.\n・たら … 회화에서 제일 두루 쓰는 만능형. '만일 ~한다면'이라는 주관적 가정이 강해요. 과거부터 미래까지, 거의 모든 상황에 써요.\n・と … 그렇게 하면 반드시 그렇게 되는 필연·습관·진리, 그리고 길 안내나 기계 조작.\n・なら … 상대의 말이나 화제를 받아서 '그거라면 ~'이라고 조건을 한정할 때.\n\n지금 당장 하나만 외운다면 たら를 외우세요. 회화에서 가장 많이 쓰이고 실수도 적어요."},{"heading":"ば ─ 이치·속담의 '~하면' (만드는 법)","body":"ば는 '논리·이치·속담·반복·습관'을 말할 때 써요. 동사를 ば형으로 바꾸는 법은 아래 표처럼 규칙적이에요.\n\n1그룹(う단으로 끝나는 동사)은 마지막 글자를 같은 줄의 'え단'으로 바꾸고 ば를 붙여요. 예를 들어 書く(かく)의 く → け로 바꿔서 書けば(かけば).\n2그룹은 끝의 る를 れば로만 바꾸면 돼요. 食べる → 食べれば.\n3그룹은 来る(くる) → くれば, する → すれば. 이 둘은 통째로 외우세요.\n\n주의할 점이 있어요. 동작을 나타내는 동사에 ば가 붙으면, 뒤에 명령·의지·희망·권유나 과거형이 올 수 없어요. '~하면 ~해라' 같은 말은 ば로 못 만들고 たら를 써야 해요.\n형용사와 명사는 다르게 처리해요. い형용사는 어미 い를 ければ로 바꾸고(おいしい → おいしければ), 명사·な형용사는 ば를 아예 못 쓰고 なら를 써요(学生ば ×, 学生なら ○).","table":{"columns":["그룹","바꾸는 법","예시"],"rows":[["1그룹","う단 → え단 + ば","書く(かく) → 書けば(かけば) / 読む(よむ) → 読めば(よめば) / 乗る(のる) → 乗れば(のれば)"],["2그룹","る → れば","見る(みる) → 見れば(みれば) / 食べる(たべる) → 食べれば(たべれば)"],["3그룹","통째로 암기","来る(くる) → 来れば(くれば) / する → すれば"]]},"examples":[{"jp":"春が来れば花が咲きます。","reading":"はるがくればはながさきます。","ko":"봄이 오면 꽃이 핍니다. (자연의 이치)"},{"jp":"住めば都。","reading":"すめばみやこ。","ko":"정들면 고향. (속담)"},{"jp":"天気がよければ、運動に行きます。","reading":"てんきがよければ、うんどうにいきます。","ko":"날씨가 좋으면 운동하러 갑니다. (반복·습관)"},{"jp":"食べれば食べるほど太ります。","reading":"たべればたべるほどふとります。","ko":"먹으면 먹을수록 살이 찝니다. (~ば ~ほど: ~하면 ~할수록)"}]},{"heading":"たら ─ 회화의 만능 '~하면, ~하니, ~더니'","body":"たら는 '만일 ~한다면'이라는 주관적 가정이 강한 표현이에요. 주로 회화에서 쓰고, 동작이 끝난 뒤의 일을 말할 수 있어서 뒤에 충고·권유·명령·희망·의지가 다 올 수 있어요. ば가 못 하는 걸 たら는 다 할 수 있다고 생각하면 편해요.\n\n만드는 법은 아주 쉬워요. 과거형 た에 ら만 붙이면 끝이에요. 行った → 行ったら, 食べた → 食べたら, 来た → 来たら, した → したら. 형용사도 마찬가지로 おいしかった → おいしかったら.\n\n한 가지 재미있는 쓰임이 있어요. 뒷문장이 과거형으로 끝나면 '~했더니, ~하니'라는 뜻이 되어, 뜻밖의 발견이나 놀란 느낌을 나타내요. 아래 세 번째 예문이 그 경우예요.","examples":[{"jp":"雨が降ったら試合は中止です。","reading":"あめがふったらしあいはちゅうしです。","ko":"비가 오면 시합은 중지입니다."},{"jp":"時間があったら手伝ってください。","reading":"じかんがあったらてつだってください。","ko":"시간이 있으면 도와주세요. (뒤에 의뢰가 옴)"},{"jp":"朝、起きたら、庭に雪が積もっていました。","reading":"あさ、おきたら、にわにゆきがつもっていました。","ko":"아침에 일어났더니 마당에 눈이 쌓여 있었습니다. (발견·의외)"},{"jp":"もし合格できたら、お祝いに車を買ってあげよう。","reading":"もしごうかくできたら、おいわいにくるまをかってあげよう。","ko":"만약 합격하면 축하 선물로 차를 사 줘야지. (의지)"}]},{"heading":"と ─ 늘 그렇게 됨 / なら ─ 그거라면","body":"と는 'A하면 반드시 B가 된다'는 필연·습관·진리를 말할 때 써요. 버튼을 누르면 문이 열리는 것처럼 결과가 정해져 있는 일, 그리고 길 안내('저기서 오른쪽으로 돌면 있어요')나 숫자에 자주 써요. 만드는 법은 동사·형용사의 기본형(사전형)에 と만 붙이면 돼요: 降る → 降ると, おいしい → おいしいと, 学生だ → 学生だと. 단, と 뒤에는 명령·의지 같은 표현을 쓰지 않아요.\n\nなら는 상대의 말이나 화제를 받아서 '그것에 대해서라면'이라고 조건을 한정할 때 써요. 상대가 '일본 여행 가려고 해'라고 하면, '일본이라면 교토가 좋아'처럼 받아 주는 느낌이에요. 명사·な형용사에 바로 なら를 붙이고(学生なら, 元気なら), 동사는 기본형에 붙여요(行くなら). 앞에서 본 것처럼 명사·な형용사가 조건이 될 때 ば를 못 쓰는 자리를 なら가 대신 채워 줘요.","examples":[{"jp":"このボタンを押すと、ドアが開きます。","reading":"このボタンをおすと、ドアがあきます。","ko":"이 버튼을 누르면 문이 열립니다. (늘 그렇게 되는 필연)"},{"jp":"日本へ行くなら、京都がいいです。","reading":"にほんへいくなら、きょうとがいいです。","ko":"일본에 갈 거라면 교토가 좋아요. (상대 말을 받아 화제 한정)"},{"jp":"学生なら、この本を読んだ方がいいです。","reading":"がくせいなら、このほんをよんだほうがいいです。","ko":"학생이라면 이 책을 읽는 편이 좋아요."}]},{"heading":"네 가지 한눈에 비교표","body":"품사별로 어떻게 모양이 바뀌는지, 그리고 각자 어떤 상황에 쓰는지 표로 정리했어요. 위쪽 파란 줄이 '쓰임', 아래 칸들이 '긍정형 / 부정형'이에요. 명사와 な형용사는 ば 칸이 비어 있는 점(─)에 주목하세요 ─ 여기선 なら를 써야 해요.\n\nい형용사 ば형에서 いい(좋다)는 불규칙이라 よければ가 되고(いいければ ×), ない(없다)는 なければ가 돼요.","table":{"columns":["품사","ば (이치·속담)","たら (거의 모든 가정)","と (필연·길안내)","なら (화제 한정)"],"rows":[["명사","— (なら 사용)","学生だったら / 学生じゃなかったら","学生だと / 学生じゃないと","学生なら / 学生じゃないなら"],["な형용사","— (なら 사용)","元気だったら / 元気じゃなかったら","元気だと / 元気じゃないと","元気なら / 元気じゃないなら"],["い형용사","おいしければ / おいしくなければ (いい→よければ)","おいしかったら / おいしくなかったら","おいしいと / おいしくないと","おいしいなら / おいしくないなら"],["동사","降れば / 降らなければ","降ったら / 降らなかったら","降ると / 降らないと","降るなら / 降らないなら"]]}}],"mistakes":[{"wrong":"学生ば / 好きば","right":"学生なら(ば) / 好きなら(ば)","note":"명사(学生)와 な형용사(好き)에는 ば를 붙일 수 없어요. 이 자리는 なら가 대신 채워 줘요. い형용사(おいしければ)와 동사(降れば)만 ば를 쓸 수 있다고 기억하세요."},{"wrong":"日本に行けば、田中さんに電話してください。","right":"日本に行ったら、田中さんに電話してください。","note":"동작 동사의 ば형 뒤에는 명령·의뢰(~해 주세요)가 올 수 없어요. '~하면 ~해라/해 주세요'처럼 뒤에 명령·의지·권유가 오면 ば 말고 たら를 쓰세요."},{"wrong":"デパートへ行けば、田中さんに会いました。","right":"デパートへ行ったら、田中さんに会いました。","note":"ば형 뒤에는 과거형이 올 수 없어요. '~했더니 ~였다'처럼 지난 일을 말할 때는 たら를 써야 해요."},{"wrong":"帰りれば","right":"帰れば (かえれば)","note":"帰る(かえる, 돌아가다)는 る로 끝나지만 2그룹이 아니라 1그룹이에요. 그래서 る를 れば로 바꾸는 게 아니라, る→れ로 바꿔서 帰れば가 돼요. 入る(はいる), 走る(はしる)도 같은 함정 동사예요."}],"tips":["헷갈릴 땐 たら를 고르세요. 회화에서 가장 두루 쓰이고, 뒤에 명령·권유·의지가 와도 다 괜찮아요.","ば = '봄이 오면 꽃이 핀다(春が来れば花が咲く)' ─ 속담·이치. と = '버튼 누르면 열린다' ─ 늘 그렇게 되는 기계·길안내. なら = 상대 말을 받아 '그거라면'.","동사 ば형은 '에단 + ば'예요. か행 か-き-く-け-こ에서 く를 け로 옮기고 ば. 노래처럼 '에단에 ば' 하고 외우면 안 잊어요."],"related":["11 기타"]},{"id":"transitivity","title":"자동사와 타동사","summary":"조사 が가 붙으면 저절로 되는 자동사, を가 붙으면 누가 하는 타동사예요. \"가-자(が自), 를-타(を他)\"만 기억하세요.","intro":"일본어 동사에는 \"저절로 그렇게 되는\" 자동사(自動詞)와 \"누군가가 무언가에 힘을 가하는\" 타동사(他動詞)가 있어요.\n둘은 뜻이 비슷해 보여도 앞에 붙는 조사가 が냐 を냐로 확 갈리기 때문에, 조사를 틀리면 문장이 어색해지거나 아예 안 통해요.\n특히 開く(あく)/開ける(あける)처럼 모양이 닮은 짝이 아주 많아서, 짝으로 묶어 외우면 단어를 두 배로 얻는 셈이에요. 나중에 배우는 〜ている(상태)·〜てある와도 바로 연결되니 지금 확실히 잡아 두면 좋아요.","sections":[{"heading":"1. 자동사와 타동사, 뭐가 다를까요?","body":"가장 쉬운 구별법은 앞에 붙는 조사예요.\n\n・자동사(自動詞): 「～が ～되다」 — 주어가 저절로 그렇게 되는 것. 목적어(을/를)가 필요 없어요.\n・타동사(他動詞): 「～を ～하다」 — 누군가가 무언가에 힘을 가하는 것. 목적어(을/를)가 꼭 필요해요.\n\n예를 들어 불(電気)이 스스로 켜지면 「電気がつきます(불이 켜집니다)」, 내가 손으로 켜면 「電気をつけます(불을 켭니다)」예요. 같은 상황을 '저절로' 보느냐 '내가 하느냐'로 나눠 말한다고 생각하면 쉬워요.\n\n교재는 동사 모양에도 힌트가 있다고 알려 줘요. 자동사는 주로 る 앞의 음이 あ단인 1그룹 동사가 많고(예: 止まる·閉まる), 타동사는 주로 る 앞의 음이 え단인 2그룹 동사가 많아요(예: 止める·閉める). 타동사가 1그룹일 때는 ～す로 끝나는 경우가 많습니다(예: 消す·出す).","table":{"columns":["구분","자동사(自動詞)","타동사(他動詞)"],"rows":[["의미","～이(가) ～되다","～을(를) ～하다"],["붙는 조사","が","を"],["목적어","필요 없음","반드시 필요"],["동사 모양","주로 る 앞이 あ단 (1그룹)","주로 る 앞이 え단 (2그룹) / 1그룹은 ～す가 많음"]]},"examples":[{"jp":"電気をつけます。","reading":"でんきをつけます。","ko":"(내가) 불을 켭니다. — 타동사, を"},{"jp":"電気がつきます。","reading":"でんきがつきます。","ko":"불이 켜집니다. — 자동사, が"},{"jp":"車が止まります。","reading":"くるまがとまります。","ko":"차가 멈춥니다. — 자동사, が"},{"jp":"本を読みます。","reading":"ほんをよみます。","ko":"책을 읽습니다. — 타동사, を"}]},{"heading":"2. 모양이 닮은 자동사·타동사 짝","body":"일본어에는 뿌리가 같아서 모양이 비슷한 자동사·타동사 짝이 아주 많아요. 짝으로 묶어 외우면 한 번에 두 단어를 익힐 수 있어요.\n\n규칙 하나만 기억하세요. 대개 る 앞이 あ단이면 자동사, え단이면 타동사예요.\n예) 閉まる(しまる, あ단→자동사) / 閉める(しめる, え단→타동사).\n그리고 ～す로 끝나면 십중팔구 타동사예요. 예) 消す·出す·落とす·起こす·動かす.\n\n아래는 교재에 나온 대표 짝이에요. 왼쪽이 자동사(が와 함께), 오른쪽이 타동사(を와 함께)예요.","table":{"columns":["자동사 (が)","타동사 (を)","뜻 (자동사 – 타동사)"],"rows":[["開く(あく)","開ける(あける)","열리다 – 열다"],["閉まる(しまる)","閉める(しめる)","닫히다 – 닫다"],["止まる(とまる)","止める(とめる)","멈추다 – 세우다"],["消える(きえる)","消す(けす)","꺼지다 – 끄다"],["つく","つける","켜지다 – 켜다"],["始まる(はじまる)","始める(はじめる)","시작되다 – 시작하다"],["集まる(あつまる)","集める(あつめる)","모이다 – 모으다"],["落ちる(おちる)","落とす(おとす)","떨어지다 – 떨어뜨리다"],["出る(でる)","出す(だす)","나오다 – 내다/제출하다"],["入る(はいる)","入れる(いれる)","들어가다 – 넣다"],["起きる(おきる)","起こす(おこす)","일어나다 – 일으키다"],["決まる(きまる)","決める(きめる)","정해지다 – 정하다"]]},"examples":[{"jp":"ドアが閉まります。","reading":"どあがしまります。","ko":"문이 (저절로) 닫힙니다. — 자동사"},{"jp":"ドアを閉めます。","reading":"どあをしめます。","ko":"(내가) 문을 닫습니다. — 타동사"},{"jp":"授業が始まります。","reading":"じゅぎょうがはじまります。","ko":"수업이 시작됩니다. — 자동사"},{"jp":"授業を始めます。","reading":"じゅぎょうをはじめます。","ko":"수업을 시작합니다. — 타동사"}]},{"heading":"3. 짝이 없는 동사도 있어요","body":"모든 동사가 자동사·타동사 짝을 이루는 건 아니에요. 교재는 세 가지 경우를 따로 정리해 줘요.\n\n① 자동사·타동사가 같은 모양인 것: 하나의 동사가 두 가지로 다 쓰여요.\n   張る(はる) 붙다/붙이다, 吹く(ふく) 불다/불게 하다, 増す(ます) 많다/많게 하다, 笑う(わらう) 웃다/웃기다.\n\n② 자동사만 있는 것: ある(있다), いる(있다), 行く(いく, 가다), 来る(くる, 오다), 死ぬ(しぬ, 죽다). 이 동사들은 を를 쓰지 않아요.\n\n③ 타동사만 있는 것: 着る(きる, 입다), 食べる(たべる, 먹다), 飲む(のむ, 마시다). 이 동사들은 목적어 を와 함께 써요. \"밥이 먹힌다\" 같은 자동사 짝이 없다고 생각하면 돼요.\n\n그래서 「ご飯を食べます(밥을 먹습니다)」는 되지만, 食べる에 대응하는 자동사를 억지로 만들어 「ご飯が食べます」처럼 쓰면 안 돼요.","examples":[{"jp":"教室に学生がいます。","reading":"きょうしつにがくせいがいます。","ko":"교실에 학생이 있습니다. — いる는 자동사만"},{"jp":"毎朝コーヒーを飲みます。","reading":"まいあさこーひーをのみます。","ko":"매일 아침 커피를 마십니다. — 飲む는 타동사만"}]},{"heading":"4. 자동사+ている, 타동사+てある (상태 표현)","body":"자동사·타동사를 알면 상태를 나타내는 두 표현이 자연스럽게 이해돼요.\n\n・자동사 + ている → 지금 그런 상태로 있다 (자연스러운 상태에 초점)\n   「ドアが開いています(문이 열려 있습니다)」\n・타동사 + てある → 누가 무언가를 해 둔 상태 (사람이 한 일, 인위적 상태에 초점)\n   「ドアが開けてあります(문이 열려 있습니다 = 누가 열어 둔 상태)」\n\n둘 다 우리말로는 '열려 있다'로 비슷하게 옮겨지지만, ている는 '상태 자체'에, てある는 '누군가 그렇게 해 뒀다는 점'에 초점이 있어요. 그래서 てある에는 준비·의도의 느낌이 담겨요(예: 손님이 오니까 미리 켜 둠).\n\n조사도 눈여겨보세요. てある는 원래 타동사인데도 앞에 が를 자주 써서 「電気がつけてあります(불이 켜져 있습니다)」처럼 말해요.","examples":[{"jp":"教室の窓が開いています。","reading":"きょうしつのまどがあいています。","ko":"교실 창문이 열려 있습니다. — 자동사+ている(상태)"},{"jp":"部屋の電気がつけてあります。","reading":"へやのでんきがつけてあります。","ko":"방 불이 (누가) 켜 놓여 있습니다. — 타동사+てある(인위적 상태)"},{"jp":"壁に映画のポスターがはってあります。","reading":"かべにえいがのぽすたーがはってあります。","ko":"벽에 영화 포스터가 붙여져 있습니다. — 타동사+てある"},{"jp":"ボールペンが落ちています。","reading":"ぼーるぺんがおちています。","ko":"볼펜이 떨어져 있습니다. — 자동사+ている(상태)"}]}],"mistakes":[{"wrong":"ドアを閉まります。","right":"ドアが閉まります。 / ドアを閉めます。","note":"가장 흔한 실수예요. 閉まる는 자동사라 を와 못 써요. '문이 저절로 닫힌다'면 「ドアが閉まります」, '내가 문을 닫는다'면 타동사 閉める를 써서 「ドアを閉めます」. 조사와 동사를 세트로 맞춰야 해요."},{"wrong":"電気をつきます。","right":"電気がつきます。 / 電気をつけます。","note":"つく(켜지다)는 자동사, つける(켜다)는 타동사예요. 모양이 닮아서 조사와 엇갈리기 쉬워요. を가 보이면 타동사 つける, が가 보이면 자동사 つく로 짝을 맞추세요."},{"wrong":"ご飯が食べます。","right":"ご飯を食べます。","note":"食べる·飲む·着る는 타동사만 있어서 대응하는 자동사가 없어요. '밥이 먹히다' 같은 자동사를 억지로 만들지 말고, 목적어에는 を를 써서 「ご飯を食べます」라고 하세요."},{"wrong":"ドアが開けています。","right":"ドアが開いています。 / ドアが開けてあります。","note":"'문이 열려 있다'는 상태는 자동사+ている인 「開いています」가 자연스러워요. 타동사 開ける를 상태로 쓰고 싶으면 〜てある를 붙여 「開けてあります(누가 열어 둔 상태)」가 돼요. 타동사+ています(개けています)는 '지금 문을 열고 있는 중'이라는 진행 뜻이 되니 상황에 맞게 골라야 해요."}],"tips":["\"가-자(が自), 를-타(を他)\": 조사 が면 자동사, を면 타동사. 이 한 줄이면 대부분 해결돼요.","짝의 모양 규칙: る 앞이 あ단이면 자동사(止まる), え단이면 타동사(止める). 그리고 ～す로 끝나면 거의 타동사(消す·出す·起こす).","상태 표현은 '자동사+ている = 저절로 그런 상태', '타동사+てある = 누가 해 둔 상태'로 구분하면 헷갈리지 않아요."],"related":["11 기타"]},{"id":"counters","title":"조수사 — 개수·순서 세기","summary":"일본어는 세는 대상마다 붙는 단위(조수사)가 다르고, 1~10에서 발음이 자주 바뀌므로 짝지어 통째로 외우는 게 핵심이에요.","intro":"조수사(助数詞)는 물건·사람·시간·날짜 등을 셀 때 숫자 뒤에 붙이는 단위예요. 한국어의 '개, 명, 권, 층'처럼 세는 대상에 따라 단위가 달라지는데, 일본어는 여기에 더해 1·3·6·8·10에서 발음이 촉음(っ)이나 반탁음(ぱ행)으로 자주 바뀌는 것이 특징이에요. 물건을 사거나(몇 개?), 시간을 말하거나(몇 시 몇 분?), 날짜를 셀 때(며칠?) 매일 쓰이니, 표를 소리 내어 통째로 외우는 게 가장 빠른 길이에요.","sections":[{"heading":"두 가지 숫자 세기: 고유수 〜つ vs 한자수 + 단위","body":"일본어에는 숫자를 세는 방식이 두 가지 있어요.\n\n첫째, '고유 일본어 수'로 세는 방법이에요. ひとつ(1개), ふたつ(2개), みっつ(3개)…처럼 뒤에 〜つ가 붙고, 이건 작은 물건의 개수를 셀 때 두루 쓰는 만능 단위예요. 단, 10은 とお로 つ가 붙지 않고, '몇 개?'는 いくつ라고 물어요.\n\n둘째, '한자어 수(いち·に·さん…)'에 단위를 붙이는 방법이에요. 個(こ), 人(にん), 台(だい), 本(ほん)처럼 대상에 맞는 단위를 골라 붙여요. 이쪽이 종류가 훨씬 많고, 바로 이 조합에서 발음 변화가 일어나요.","table":{"columns":["숫자","〜つ (개, 만능)","個(こ) (개)","人(にん) (사람)"],"rows":[["1","ひとつ","いっこ","ひとり"],["2","ふたつ","にこ","ふたり"],["3","みっつ","さんこ","さんにん"],["4","よっつ","よんこ","よにん"],["5","いつつ","ごこ","ごにん"],["6","むっつ","ろっこ","ろくにん"],["7","ななつ","ななこ","ななにん / しちにん"],["8","やっつ","はっこ","はちにん"],["9","ここのつ","きゅうこ","きゅうにん"],["10","とお","じゅっこ / じっこ","じゅうにん"],["몇?","いくつ","何個(なんこ)","何人(なんにん)"]]},"examples":[{"jp":"りんごを三つください。","reading":"りんごをみっつください。","ko":"사과를 세 개 주세요."},{"jp":"みかんを五個買いました。","reading":"みかんをごこかいました。","ko":"귤을 다섯 개 샀어요."},{"jp":"家族は四人です。","reading":"かぞくはよにんです。","ko":"가족은 네 명이에요."}]},{"heading":"발음이 바뀌는 자리 — 1·3·6·8·10을 조심","body":"조수사에서 가장 어려운 건 발음 변화예요. 규칙을 통째로 외우기보다, '변하는 자리'가 정해져 있다는 걸 알면 훨씬 쉬워요.\n\n① 촉음(っ)화: 단위 첫소리가 か·さ·た·は행일 때, 1·6·8·10에서 앞이 작은 っ로 변해요. 個(こ) → いっこ・ろっこ・はっこ・じゅっこ, 匹(ひき) → いっぴき・はっぴき, 本(ほん) → いっぽん.\n\n② 반탁음(ぱ행)화: は행으로 시작하는 단위(本ほん, 分ふん, 匹ひき, 杯はい 등)는 촉음 뒤에서 ぱ행으로 바뀌어요. 1分 → いっぷん, 6分 → ろっぷん, 3本 → さんぼん(탁음 ば행).\n\n③ ん 뒤 탁음/반탁음: 3(さん)이나 何(なん) 뒤에서 は행이 ば·ぱ행으로 변해요. 3本 → さんぼん, 3匹 → さんびき, 何本 → なんぼん.\n\n④ 10은 じゅっ~ 과 じっ~ 두 발음이 모두 맞아요. 책에도 じ(ゅ)っぷん처럼 두 가지가 다 표기돼 있어요.","table":{"columns":["숫자","本(ほん) (자루)","匹(ひき) (마리)","階(かい) (층)","分(ふん) (분)"],"rows":[["1","いっぽん","いっぴき","いっかい","いっぷん"],["2","にほん","にひき","にかい","にふん"],["3","さんぼん","さんびき","さんがい","さんぷん"],["4","よんほん","よんひき","よんかい","よんぷん"],["6","ろっぽん","ろっぴき","ろっかい","ろっぷん"],["8","はっぽん","はっぴき","はっかい","はっぷん"],["10","じゅっぽん","じゅっぴき","じゅっかい","じゅっぷん"],["몇?","何本(なんぼん)","何匹(なんびき)","何階(なんがい)","何分(なんぷん)"]]},"examples":[{"jp":"ビールを一本ください。","reading":"ビールをいっぽんください。","ko":"맥주를 한 병(자루) 주세요."},{"jp":"犬が三匹います。","reading":"いぬがさんびきいます。","ko":"개가 세 마리 있어요."},{"jp":"本屋は三階です。","reading":"ほんやはさんがいです。","ko":"서점은 3층이에요."}]},{"heading":"시간과 날짜 — 가장 자주 쓰지만 예외투성이","body":"시(時じ)는 비교적 규칙적이지만 4時=よじ, 7時=しちじ, 9時=くじ 세 개만 특별해요. 분(分)은 위에서 본 대로 발음 변화가 심하고, 半(はん)은 '30분'을 뜻해요. 그래서 '4시 반'은 四時半(よじはん)이에요.\n\n날짜(日にち)는 완전히 다른 세계예요. 1일~10일과 14·20·24일은 한자수 규칙을 따르지 않는 고유 읽기라서 아래 표를 통째로 외워야 해요. 특히 20日=はつか는 완전 불규칙이고, 14日·24日은 よっか가 붙어요. 11일부터는 대체로 규칙적이라 じゅういちにち처럼 그냥 숫자+にち로 읽어요. '며칠?'은 何日(なんにち)예요.","table":{"columns":["일","읽기","일","읽기"],"rows":[["1日","ついたち","6日","むいか"],["2日","ふつか","7日","なのか"],["3日","みっか","8日","ようか"],["4日","よっか","9日","ここのか"],["5日","いつか","10日","とおか"],["14日","じゅうよっか","20日","はつか"],["24日","にじゅうよっか","何日","なんにち"]]},"examples":[{"jp":"今何時ですか。","reading":"いまなんじですか。","ko":"지금 몇 시예요?"},{"jp":"四時半に会いましょう。","reading":"よじはんにあいましょう。","ko":"4시 반에 만나요."},{"jp":"誕生日は二十日です。","reading":"たんじょうびははつかです。","ko":"생일은 20일이에요."}]},{"heading":"그 밖의 자주 쓰는 조수사","body":"책에는 위 단위들 말고도 실생활에서 자주 쓰는 조수사가 함께 나와요.\n\n・回(かい): 횟수 (~회). 2、3回(に、さんかい) = 두세 번.\n・冊(さつ): 책을 셀 때 (~권).\n・歳(さい): 나이 (~살). 스무 살은 특별히 二十歳(はたち)라고도 읽어요.\n・枚(まい): 종이·표처럼 얇고 납작한 것 (~장).\n・番(ばん): 순번 (~번). 番目(ばんめ)는 '~번째'(순서).\n・倍(ばい): 배수 (~배). 度(ど): 횟수·온도 (~번).\n・杯(はい): 잔·그릇 (~잔). 一杯(いっぱい), 三杯(さんばい)처럼 역시 발음이 바뀌어요.\n・台(だい): 기계·차 (~대). 軒(けん): 집·가게 (~채). 皿(さら): 접시 (~접시).","examples":[{"jp":"コピーは何枚ですか。","reading":"コピーはなんまいですか。","ko":"복사는 몇 장이에요?"},{"jp":"私の席は前から五番目です。","reading":"わたしのせきはまえからごばんめです。","ko":"제 자리는 앞에서 다섯 번째예요."},{"jp":"もう一杯どうですか。","reading":"もういっぱいどうですか。","ko":"한 잔 더 어떠세요?"},{"jp":"今年で十九歳です。","reading":"ことしでじゅうきゅうさいです。","ko":"올해로 열아홉 살이에요."}]}],"mistakes":[{"wrong":"四時(よんじ)、九時(きゅうじ)","right":"四時(よじ)、九時(くじ)","note":"시(時)에서 4와 9는 よん·きゅう가 아니라 よじ·くじ로 읽어요. 초보자가 가장 많이 틀리는 부분이에요. 참고로 4分은 よんぷん(よん), 9分은 きゅうふん(きゅう)으로 分에서는 반대라서 헷갈리기 쉬워요."},{"wrong":"二十日(にじゅうにち)","right":"二十日(はつか)","note":"날짜 20일은 규칙대로 にじゅうにち라고 하면 틀려요. はつか라는 완전 불규칙 읽기를 써요. 마찬가지로 1일도 いちにち(X)가 아니라 ついたち(생일·날짜)예요. いちにち는 '하루(기간)'라는 뜻으로 쓰임이 달라요."},{"wrong":"一人(いちにん)、二人(ににん)","right":"一人(ひとり)、二人(ふたり)","note":"사람을 셀 때 1명·2명은 한자수 いち·に가 아니라 고유수 ひとり·ふたり예요. 3명부터는 さんにん처럼 규칙적으로 돌아와요. '혼자·둘이'라는 뜻으로도 자주 쓰니 꼭 기억하세요."},{"wrong":"一分(いちふん)、六分(ろくふん)","right":"一分(いっぷん)、六分(ろっぷん)","note":"は행(ふ)으로 시작하는 단위는 1·6·8·10 뒤에서 촉음(っ)+반탁음(ぷ)으로 바뀌어요. いちふん·ろくふん처럼 그대로 읽으면 어색해요. 本(ほん)도 같은 원리로 一本=いっぽん이 돼요."}],"tips":["발음 변화는 '1·6·8·10 + か/さ/た/は행 단위'에서 집중적으로 일어나요. 이 다섯 자리만 조심하면 나머지는 대개 규칙적이에요.","は행 단위(本·分·匹·杯)는 '촉음 뒤엔 ぱ, ん 뒤엔 ば' 로 외우세요. 一本=いっぽん(っ뒤 ぱ), 三本=さんぼん(ん뒤 ば).","날짜 1~10일과 20일(はつか)은 규칙이 없으니 노래처럼 ついたち・ふつか・みっか… 리듬으로 통째로 암기하는 게 제일 빨라요."],"related":["11 기타"]},{"id":"keigo","title":"경어 — 존경어·겸양어","summary":"상대를 높이면 존경어, 나를 낮추면 겸양어 — 주고받는 방향에 따라 あげる·くれる·もらう를 골라 쓰는 것이 경어의 시작이에요.","intro":"일본어는 누가 누구에게 무언가를 「주고(あげる·くれる)」 「받는지(もらう)」에 따라 동사가 달라지고, 상대가 윗사람이면 더 높이거나 나를 낮춘 특별한 말로 바꿔 씁니다. 이걸 「경어(敬語, けいご)」라고 해요. 상대를 직접 올려 세우면 존경어, 내가 스스로 몸을 낮춰 상대를 간접적으로 높이면 겸양어입니다. 처음에는 「주다」 한 단어가 방향에 따라 세 개로 갈라진다는 점만 잘 잡아도 절반은 성공이에요.","sections":[{"heading":"1. 주다·받다 (수수동사) — 방향이 전부예요","body":"한국어는 「주다」 하나로 끝나지만, 일본어는 화살표 방향에 따라 동사가 바뀝니다.\n\n- 내가/남이 → 남에게 줄 때: あげる (윗사람에게는 낮춰서 さしあげる = 드리다, 손아랫사람·동식물에게는 やる)\n- 남이 → 나(우리 편)에게 줄 때: くれる (윗사람이 주시면 くださる = 주시다)\n- 남에게서 → 내가 받을 때: もらう (윗사람에게 받으면 いただく)\n\n핵심은 「あげる와 くれる의 방향」입니다. 둘 다 「주다」지만, 화살표가 나에게서 밖으로 나가면 あげる, 밖에서 나에게 들어오면 くれる예요.\n\n또 「~에게서」는 보통 から / に 둘 다 쓰지만, 주는 쪽이 회사·학교 같은 단체일 때는 から만 씁니다.\n\n동사 뒤에 붙여 「~해 주다」로 쓸 때도 규칙은 똑같아요: ~てあげる / ~てくれる / ~てもらう.","table":{"columns":["뜻·방향","기본형","높임말"],"rows":[["나·남 → 남에게 준다","あげる","さしあげる (드리다) / やる (손아래·동식물)"],["남 → 나에게 준다","くれる","くださる (주시다)"],["남에게서 내가 받는다","もらう","いただく (받다·겸양)"]]},"examples":[{"jp":"私は友達に人形をあげました。","reading":"わたしはともだちににんぎょうをあげました。","ko":"나는 친구에게 인형을 주었습니다. (나 → 남)"},{"jp":"和子さんは私に辞書をくれました。","reading":"かずこさんはわたしにじしょをくれました。","ko":"가즈코 씨는 저에게 사전을 주었습니다. (남 → 나)"},{"jp":"私は先生にプレゼントをいただきました。","reading":"わたしはせんせいにプレゼントをいただきました。","ko":"저는 선생님께 선물을 받았습니다. (윗사람에게 받음)"},{"jp":"母に料理を作ってもらいました。","reading":"ははにりょうりをつくってもらいました。","ko":"어머니가 요리를 만들어 주셨습니다. (직역: 어머니께 요리를 만들어 받았습니다)"}]},{"heading":"2. 존경어 — 상대를 높이는 말","body":"존경어는 「상대방(윗사람)의 행동」을 높여서 말할 때 씁니다. 두 가지 길이 있어요.\n\n(1) 공식으로 만드는 법: お(ご) + 동사 ます형 + (になって) + ください → 「~하십시오」라는 정중한 부탁이 됩니다. お待ちになってください처럼요. (になって는 생략해서 お待ちください로도 씁니다.)\n\n(2) 아예 단어가 통째로 바뀌는 특별 동사: 見る → ご覧になります(ごらんになります), 言う → おっしゃいます, 来る → いらっしゃいます 등. 이건 4번 표에 정리했어요.\n\n주의: 존경어는 「상대」의 행동에만 씁니다. 내 행동에 존경어를 붙이면 스스로를 높이는 이상한 말이 돼요.","examples":[{"jp":"ここでしばらくお待ちになってください。","reading":"ここでしばらくおまちになってください。","ko":"여기서 잠시 기다려 주십시오."},{"jp":"ここにお名前をお書きになってください。","reading":"ここにおなまえをおかきになってください。","ko":"여기에 성함을 적어 주십시오."},{"jp":"先生は私に夏休みの写真を見せてくださいました。","reading":"せんせいはわたしになつやすみのしゃしんをみせてくださいました。","ko":"선생님은 저에게 여름 방학 사진을 보여 주셨습니다."}]},{"heading":"3. 겸양어 — 나(내 편)를 낮추는 말","body":"겸양어는 「내(또는 우리 쪽) 행동」을 낮춰 말해서, 결과적으로 상대를 높이는 방식입니다.\n\n(1) 공식: お(ご) + ます형·명사 + する / いたす → 「~해 드리다」. いたす가 する보다 더 정중해요. お送りいたします, ご案内いたします처럼 씁니다.\n\n(2) ~させていただく: 「(허락을 받아) 제가 ~하겠습니다」라는 아주 공손한 표현. 休ませていただきます = (직역) 쉬는 것을 허락받겠습니다 → 잠시 쉬겠습니다.\n\n(3) 특별 동사: する → いたします, 言う → 申し上げます(もうしあげます), 見る → 拝見します(はいけんします), 会う → お目にかかります(おめにかかります) 등.\n\n중요한 감각: 「내 가족」은 남 앞에서는 낮춰야 할 「내 편(우치)」입니다. 그래서 어머니가 나에게 해 주셔도 겸양·보통 표현(~てもらう)을 쓰지, 어머니를 높이지 않아요.","examples":[{"jp":"鈴木さんを空港までお送りいたしました。","reading":"すずきさんをくうこうまでおおくりいたしました。","ko":"스즈키 씨를 공항까지 배웅해 드렸습니다."},{"jp":"私がお客様を会社までご案内いたします。","reading":"わたしがおきゃくさまをかいしゃまでごあんないいたします。","ko":"제가 손님을 회사까지 안내해 드리겠습니다."},{"jp":"私がご案内させていただきます。","reading":"わたしがごあんないさせていただきます。","ko":"제가 안내해 드리겠습니다."},{"jp":"ちょっと休ませていただきます。","reading":"ちょっとやすませていただきます。","ko":"잠시 쉬겠습니다."}]},{"heading":"4. 통째로 바뀌는 특별 경어 동사","body":"공식으로 안 만들고, 단어 자체가 다른 모양으로 바뀌는 동사들이 있어요. 자주 쓰이는 것부터 외우면 좋습니다. 참고로 정중어(です·ます·ございます, 명사 앞의 お·ご)는 상하관계 없이 그냥 공손하게 말할 때 쓰는 층입니다 (お金 = 돈, ございます = 있습니다 등).\n\n표에서 빈칸은 교재에 대응하는 특별형이 따로 제시되지 않은 자리예요.","table":{"columns":["기본어","존경어 (상대를 높임)","겸양어 (나를 낮춤)"],"rows":[["行く(いく) 가다","いらっしゃいます / おいでになります","まいります / 伺います(うかがいます)"],["来る(くる) 오다","いらっしゃいます / お見えになります(おみえになります)","まいります / 伺います(うかがいます)"],["いる 있다","いらっしゃいます / おいでになります","おります"],["する 하다","なさいます","いたします"],["言う(いう) 말하다","おっしゃいます","申し上げます(もうしあげます)"],["見る(みる) 보다","ご覧になります(ごらんになります)","拝見します(はいけんします)"],["食べる·飲む 먹다·마시다","召し上がります(めしあがります)","いただきます"],["会う(あう) 만나다","","お目にかかります(おめにかかります)"],["知る·分かる 알다","ご存じです(ごぞんじです)","存じております(ぞんじております)"],["くれる 주다","くださいます","—"],["もらう 받다","","いただきます / ちょうだいします"]]},"examples":[{"jp":"先生はもう召し上がりましたか。","reading":"せんせいはもうめしあがりましたか。","ko":"선생님은 벌써 드셨습니까? (食べる의 존경어)"},{"jp":"写真を拝見しました。","reading":"しゃしんをはいけんしました。","ko":"사진을 봤습니다. (見る의 겸양어)"}]}],"mistakes":[{"wrong":"先生は私に本をあげました。","right":"先生は私に本をくださいました。","note":"「남 → 나」 방향인데 あげる를 쓰면 안 돼요. 나에게 들어오는 방향은 くれる, 그 높임이 くださる입니다. あげる·くれる 방향 혼동이 가장 흔한 실수예요."},{"wrong":"母は私にプレゼントをくださいました。","right":"母は私にプレゼントをくれました。","note":"내 가족(母·妹·主人 등)은 남 앞에서 「내 편」이라 높이지 않습니다. 그래서 くださる가 아니라 くれる를 써요. 교재도 妹には くれました, 主人は くれます로 씁니다."},{"wrong":"私が先生をお待ちしてください。","right":"こちらでお待ちになってください。","note":"존경(お~になって)과 겸양(お~する)을 섞으면 안 돼요. 상대에게 「기다려 주십시오」라고 부탁하는 건 존경어 お待ちになってください / お待ちください입니다. お待ちします는 내가 기다린다는 겸양이에요."},{"wrong":"先生、ご覧しますか。","right":"先生、ご覧になりますか。","note":"특별 동사는 존경형과 겸양형이 완전히 다른 단어예요. 見る의 존경은 ご覧になる, 겸양(내가 봄)은 拝見する. 상대의 행동엔 존경형을 써야 합니다."}],"tips":["방향 암기: あげる는 나에게서 밖으로 「나가는」 화살표(→), くれる는 밖에서 나에게 「들어오는」 화살표(←). 화살표만 그리면 헷갈리지 않아요.","높임 짝 외우기: あげる↔さしあげる(드리다), くれる↔くださる(주시다), もらう↔いただく(받다). 왼쪽은 보통, 오른쪽은 높임.","존경이냐 겸양이냐 판단법: 행동의 주인이 「상대(윗사람)」면 존경어, 「나·내 가족·우리 회사」면 겸양어. 주어가 누구인지부터 보세요."],"related":["11 기타"]},{"id":"volition","title":"의지형·명령형","summary":"동사 끝을 바꿔서 「~하자·~해야지(의지형)」와 「~해라(명령형)·~하지 마(금지형)」를 만든다.","intro":"교재 표(会う → 会おう / 会え / 会うな)처럼, 동사의 마지막 글자를 바꾸면 세 가지 표현이 만들어져요.\n의지형 「~(よ)う」는 '~하자, ~해야지'처럼 내 마음이나 권유를 나타내고, 명령형 「~え/~ろ」는 '~해라', 금지형 「~な」는 '~하지 마'라는 강한 말이에요.\n말이 아주 세기 때문에, 윗사람에게 부드럽게 권할 때는 정중한 「~ましょう(~합시다)」를 씁니다.\n일상 회화·표지판·응원 구호 등에서 자주 보이니 꼭 익혀 두면 좋아요.","sections":[{"heading":"의지형(意志形) 만들기 — 「~(よ)う」","body":"'~하자 / ~해야지'라는 뜻으로, 내 의지나 가벼운 권유를 나타내요. 반말 느낌이에요.\n\n1그룹(う동사): 마지막 う단 글자를 같은 줄의 お단으로 바꾸고 う를 붙여요. (会う→会おう, 書く→書こう)\n2그룹(る동사): 마지막 る를 떼고 よう를 붙여요. (食べる→食べよう)\n3그룹(불규칙): する→しよう, 来(く)る→来(こ)よう. 통째로 외우세요.\n\n1그룹은 'う를 お로 바꾸고 う 붙이기'가 포인트예요. 발음이 '~오~' 소리가 나요.","table":{"columns":["그룹","만드는 법","예 (기본형 → 의지형)"],"rows":[["1그룹","う단 → お단 + う","会う(あう) → 会おう(あおう)"],["1그룹","〃","書く(かく) → 書こう(かこう)"],["1그룹","〃","読む(よむ) → 読もう(よもう)"],["2그룹","る → よう","食べる(たべる) → 食べよう(たべよう)"],["2그룹","〃","見る(みる) → 見よう(みよう)"],["3그룹","불규칙(암기)","する → しよう"],["3그룹","불규칙(암기)","来る(くる) → 来よう(こよう)"]]},"examples":[{"jp":"行こう。","reading":"いこう。","ko":"가자. / 가야지."},{"jp":"何か食べよう。","reading":"なにかたべよう。","ko":"뭔가 먹자."},{"jp":"もし合格できたら、お祝いに車を買ってあげよう。","reading":"もしごうかくできたら、おいわいにくるまをかってあげよう。","ko":"만약 합격하면 축하 선물로 차를 사 줘야지."}]},{"heading":"정중하게 권유할 때 — 「~ましょう / ~ましょうか」","body":"친구끼리는 위의 「~(よ)う」를 쓰지만, 정중하게 '~합시다 / ~할까요?' 하려면 「~ます」의 앞부분(ます형)에 「~ましょう」「~ましょうか」를 붙여요.\n\n~ましょう : ~합시다 (함께 하자는 권유·의지)\n~ましょうか : ~할까요? (상대에게 제안하거나 물어봄)\n\n반말 「行こう」와 정중한 「行きましょう」는 뜻은 같고 공손함만 달라요.","table":{"columns":["~ます (합니다)","~ましょう (합시다)","~ましょうか (할까요?)"],"rows":[["行きます(いきます)","行きましょう(いきましょう)","行きましょうか(いきましょうか)"],["食べます(たべます)","食べましょう(たべましょう)","食べましょうか(たべましょうか)"],["します","しましょう","しましょうか"]]},"examples":[{"jp":"明日図書館でいっしょに勉強しましょうか。","reading":"あしたとしょかんでいっしょにべんきょうしましょうか。","ko":"내일 도서관에서 같이 공부할까요?"},{"jp":"はい、たこやき食べに行きましょう。","reading":"はい、たこやきたべにいきましょう。","ko":"네, 다코야키 먹으러 갑시다."},{"jp":"じゃ、7時に駅で会いましょう。","reading":"じゃ、しちじにえきであいましょう。","ko":"그럼 7시에 역에서 만납시다."}]},{"heading":"명령형·금지형 만들기 — 「~え/~ろ」·「~な」","body":"명령형은 '~해라', 금지형은 '~하지 마'예요. 둘 다 말이 아주 세고 거칠어서, 보통 표지판·응원·급한 상황·남성의 거친 말투에 쓰여요. 윗사람에게는 쓰지 말고 「~てください」나 「~ましょう」를 쓰세요.\n\n[명령형]\n1그룹: 마지막 う단 글자를 え단으로 바꿔요. (会う→会え, 書く→書け)\n2그룹: 마지막 る를 ろ로 바꿔요. (食べる→食べろ)\n3그룹: する→しろ, 来(く)る→来(こ)い. (来い는 발음이 こ로 바뀜!)\n\n[금지형]\n그룹 상관없이 '기본형(사전형) + な' 로 아주 간단해요. (行く→行くな, 食べる→食べるな)","table":{"columns":["기본형","명령형 (~해라)","금지형 (~하지 마)"],"rows":[["会う(あう)","会え(あえ)","会うな(あうな)"],["書く(かく)","書け(かけ)","書くな(かくな)"],["食べる(たべる)","食べろ(たべろ)","食べるな(たべるな)"],["見る(みる)","見ろ(みろ)","見るな(みるな)"],["する","しろ","するな"],["来る(くる)","来い(こい)","来るな(くるな)"]]},"examples":[{"jp":"早く行け。","reading":"はやくいけ。","ko":"빨리 가."},{"jp":"がんばれ！","reading":"がんばれ！","ko":"힘내라! (응원 구호)"},{"jp":"ここに入るな。","reading":"ここにはいるな。","ko":"여기 들어오지 마."}]}],"mistakes":[{"wrong":"帰よう / 帰ろ","right":"帰ろう / 帰れ","note":"帰る(かえる)는 る·える로 끝나 2그룹처럼 보이지만 사실 1그룹이에요. 그래서 의지형은 帰ろう(かえろう), 명령형은 帰れ(かえれ)입니다. 教재 표에도 함정으로 帰る가 들어 있어요. 入る(はいる)·走る(はしる)·切る(きる)도 같은 1그룹 예외예요."},{"wrong":"来ろ(くろ) / 来よう(くよう)","right":"来い(こい) / 来よう(こよう)","note":"来る는 3그룹 불규칙이라 발음이 바뀝니다. 명령형은 来い(こい), 의지형은 来よう(こよう)로 앞소리가 く가 아니라 こ가 돼요. 한 덩어리로 외우세요."},{"wrong":"するろ / しれ","right":"しろ (또는 せよ)","note":"する의 명령형은 しろ예요. 규칙을 억지로 대입해 するろ나 しれ라고 하면 안 돼요. 금지형은 규칙대로 するな."},{"wrong":"行きな(금지 의도로)","right":"行くな","note":"금지형 「~な」는 ます형이 아니라 '기본형(사전형)'에 붙여요. 그래서 '가지 마'는 行くな가 맞아요. 行きな(ます형+な)는 오히려 부드러운 명령 '가렴' 뜻이 되어 반대로 들릴 수 있어요."}],"tips":["1그룹 의지형은 'う를 お로 바꾸고 う 붙이기' → 会う(あう)를 발음하면 '아오우(会おう)' 소리가 나요. 명령형은 그냥 'え단 한 글자'로 짧고 강하게(会え).","3그룹(する·来る)은 규칙이 안 통해요. しよう/しろ, 来よう(こよう)/来い(こい) 4개만 통째로 암기하면 끝.","말의 세기 순서: 「~ましょう(정중)」 › 「~(よ)う(반말 권유)」 › 「~え/~ろ(명령)·~な(금지, 아주 강함)」. 윗사람에겐 항상 ~ましょう나 ~てください."],"related":["09 동사 5"]},{"id":"tai","title":"~たい·~たがる — 희망 표현","summary":"동사 ます형에서 「ます」를 떼고 「たい」를 붙이면 '~하고 싶다', 남(3인칭)의 소망은 「たがる」로 말한다.","intro":"「~たい」는 '~하고 싶다'라는 내 바람·소망을 말할 때 쓰는 가장 기본 표현이에요. 만드는 법도 아주 쉬워서, 이미 배운 「~ます」형만 알면 바로 만들 수 있어요.\n한 가지 중요한 규칙은, 「~たい」는 나(1인칭)와 상대(2인칭, 질문할 때)에게만 쓴다는 거예요. '그 사람이 ~하고 싶어 한다'처럼 남의 속마음을 말할 때는 「~たがる」로 바꿔 줘야 해요.","sections":[{"heading":"1. 만드는 법 — ます를 떼고 たい","body":"동사의 「ます」형에서 「ます」를 떼어내고 그 자리에 「たい」를 붙이면 끝이에요.\n\n飲(の)みます(마십니다) → ます를 떼면 「飲み」 → 飲みたい(마시고 싶다)\n買(か)います(삽니다) → 「買い」 → 買いたい(사고 싶다)\n休(やす)みます(쉽니다) → 「休み」 → 休みたい(쉬고 싶다)\n\n정중하게 말할 때는 뒤에 「です」를 붙여 「飲みたいです(마시고 싶습니다)」가 돼요. 어렵게 생각할 것 없이, 평소 쓰던 「~ます」 자리에 「~たいです」를 넣는다고 기억하면 편해요.","examples":[{"jp":"のどが渇きましたから、水を飲みたいです。","reading":"のどがかわきましたから、みずをのみたいです。","ko":"목이 말라서 물을 마시고 싶습니다."},{"jp":"疲れて少し休みたいですが。","reading":"つかれてすこしやすみたいですが。","ko":"피곤해서 조금 쉬고 싶은데요."},{"jp":"A「何を買いたいですか。」B「携帯電話を買いたいです。」","reading":"A「なにをかいたいですか。」B「けいたいでんわをかいたいです。」","ko":"A「무엇을 사고 싶습니까?」B「휴대전화를 사고 싶습니다.」"}]},{"heading":"2. たい는 い형용사처럼 활용한다","body":"「~たい」는 「い」로 끝나죠? 그래서 부정·과거로 바꿀 때 い형용사와 똑같이 활용해요. 「たいです」에서 그냥 「です」만 바꾸면 안 되고, 「い」 부분을 「く」로 바꿔서 활용한다는 게 핵심이에요.\n\n부정: たい → たくない / たくありません (~하고 싶지 않다)\n과거: たい → たかった / たかったです (~하고 싶었다)\n과거부정: たくなかった / たくありませんでした (~하고 싶지 않았다)\n\n예를 들어 '아무것도 사고 싶지 않습니다'는 「何(なに)も買(か)いたくありません」이 돼요.","table":{"columns":["기본(行き)","활용","뜻"],"rows":[["行きます","(참고: 갑니다)","동사 원래형"],["行きたいです","→ たいです","가고 싶습니다"],["行きたくありません","→ たくありません(たくないです)","가고 싶지 않습니다"],["行きたかったです","→ たかったです","가고 싶었습니다"],["行きたくありませんでした","→ たくありませんでした(たくなかったです)","가고 싶지 않았습니다"]]}},{"heading":"3. 조사 — 원칙은 が, 실제로는 を도 많이 쓴다","body":"「~たい」 앞의 목적어에 붙는 조사는 원칙적으로 「が」를 써요. 다만 동작성이 강한 경우에는 「を」를 쓰기도 하고, 실제 회화에서는 「を」도 아주 흔하게 들려요.\n\n예: 「水が飲みたい」와 「水を飲みたい」 둘 다 쓸 수 있어요. 교과서 예문에서도 「水を飲みたいです」, 「何を買いたいですか」처럼 「を」가 나와요.\n초급 단계에서는 '원칙은 が, を도 자주 쓴다' 정도로만 알아 두면 충분해요."},{"heading":"4. 남의 소망은 たがる — 3인칭 규칙","body":"「~たい」는 내 마음이나, 상대에게 '~하고 싶어요?'라고 물을 때만 써요. '그 사람이 ~하고 싶어 한다'처럼 제3자의 속마음은 겉으로 보이는 게 아니라서, 일본어에서는 「~たがる(~하고 싶어 하다)」라는 다른 표현을 써요.\n\n만드는 법은 「たい」의 「い」를 떼고 「がる」를 붙이면 돼요: 留学(りゅうがく)したい → 留学したがる.\n그리고 실제로는 '지금 그런 마음 상태다'라는 뜻으로 「~たがっている(~たがっています)」 형태를 자주 써요.","examples":[{"jp":"私は日本へ留学したいです。","reading":"わたしはにほんへりゅうがくしたいです。","ko":"저는 일본에 유학하고 싶습니다. (1인칭 → たい)"},{"jp":"彼は日本へ留学したがっています。","reading":"かれはにほんへりゅうがくしたがっています。","ko":"그는 일본에 유학하고 싶어 합니다. (3인칭 → たがる)"}]}],"mistakes":[{"wrong":"飲みますたいです","right":"飲みたいです","note":"「ます」를 떼지 않고 그대로 「たい」를 붙이는 실수예요. 반드시 「ます」를 떼고(飲み) 「たい」를 붙여야 해요."},{"wrong":"行きたいじゃないです / 行きたいでした","right":"行きたくないです / 行きたかったです","note":"「たい」는 명사가 아니라 い형용사처럼 활용해요. 「~じゃない」나 「~でした」를 붙이면 안 되고, 「い」를 「く」로 바꿔서 「たくない」, 「たかった」로 활용해야 해요."},{"wrong":"彼は日本へ行きたいです。","right":"彼は日本へ行きたがっています。","note":"'그 사람'처럼 제3자의 소망에 「~たい」를 쓰면 어색해요. 남의 속마음은 겉으로만 보이는 것이라, 3인칭에는 「~たがる(~たがっている)」를 써요."},{"wrong":"私は行きたがっています。","right":"私は行きたいです。","note":"반대로 자기 자신(1인칭)에게 「たがる」를 쓰면 틀려요. 「たがる」는 오직 남(제3자)에게만 쓰고, 나와 상대에게는 「たい」를 써요."}],"tips":["「たい」는 「い」로 끝나니까 → い형용사와 똑같이 활용! たくない, たかった, たくなかった.","주어가 '나·너'면 たい, '그 사람(남)'이면 たがる. 남 얘기엔 「~たがっている」로 상태처럼 말한다고 기억하세요.","조사는 '원칙은 が, 실제로는 を도 자주' — 둘 다 통하니 초급에선 편하게 생각하세요."],"related":["05 동사 1","09 동사 5"]},{"id":"particles","title":"조사 は·が·を·に·で·へ 기본","summary":"조사는 단어 뒤에 딱 붙어서 그 단어가 문장에서 무슨 역할(주제·주어·목적어·방향·장소)을 하는지 알려주는 작은 표지판이에요.","intro":"일본어는 단어의 순서보다 '조사'가 문장의 뼈대를 잡아 줍니다. 명사 뒤에 は·が·を·に·へ·で 같은 글자를 붙여서 \"이건 주제야\", \"이건 목적어야\", \"여기로 갈 거야\" 하고 알려 주는 거예요. 조사만 바꿔도 문장의 뜻이 완전히 달라지기 때문에, 히라가나를 막 뗀 지금 이 조사들의 역할을 손에 익히는 게 아주 중요합니다. 특히 は와 へ는 '쓰는 글자'와 '읽는 소리'가 달라서 처음에 꼭 짚고 넘어가야 해요.","sections":[{"heading":"한눈에 보는 조사 지도","body":"먼저 큰 그림부터 볼게요. 조사는 항상 '명사 + 조사' 순서로, 명사 바로 뒤에 붙습니다.\n각 조사가 대략 한국어의 어떤 조사와 짝이 되는지 표로 정리했어요. 딱 1:1로 맞아떨어지지는 않지만, 처음엔 이 감각으로 시작하면 충분합니다.\n\n표의 は와 へ 옆에 적어 둔 [wa]·[e]는 '읽는 소리'예요. 글자는 は·へ로 쓰지만 조사로 쓰일 때는 소리가 바뀐다는 뜻인데, 이건 바로 다음 칸에서 자세히 설명할게요.","table":{"columns":["조사","주요 역할","한국어 느낌","예"],"rows":[["は (소리 [wa])","주제 표시","~은 / ~는","私は学生です (わたしはがくせいです)"],["が","주어·새로운 정보","~이 / ~가","友達が来ました (ともだちがきました)"],["を","목적어(~을/를 하는 대상)","~을 / ~를","ご飯を食べます (ごはんをたべます)"],["に","도착지·귀착점·시간","~에","家に来ました (うちにきました)"],["へ (소리 [e])","이동 방향","~로 / ~에","大阪へ行きます (おおさかへいきます)"],["で","수단·장소","~로 / ~에서","バスで行きます (バスでいきます)"]]}},{"heading":"は와 へ — 글자와 소리가 다른 두 조사","body":"이 두 개는 교재에서도 '특수한 발음'이라며 따로 짚어 줄 만큼 중요해요.\n\n① は : 원래 글자 이름은 '하[ha]'지만, 조사(~은/는)로 쓰일 때는 [wa](와)로 읽어요.\n예를 들어 花(はな, 꽃)의 は는 그냥 [ha]지만, これは本です(이것은 책입니다)의 は는 조사라서 [wa]로 읽습니다.\n\n② へ : 원래는 '헤[he]'지만, 조사(~로/에)로 쓰일 때는 [e](에)로 읽어요.\n部屋(へや, 방)의 へ는 [he]지만, 日本へ(일본에)의 へ는 조사라서 [e]로 읽습니다.\n\n핵심은 '글자는 그대로 は·へ로 쓰고, 소리만 바뀐다'는 거예요. 소리대로 わ나 え로 써 버리면 틀립니다.","table":{"columns":["글자","일반 단어일 때","조사일 때 소리","조사 예"],"rows":[["は","花(はな) → [ha]","[wa] (와)","これは本です (これはほんです)"],["へ","部屋(へや) → [he]","[e] (에)","日本へ (にほんへ)"]]},"examples":[{"jp":"これは本です。","reading":"これはほんです。","ko":"이것은 책입니다. (は는 [wa]로 읽어요)"},{"jp":"田中さんは先生ですか。","reading":"たなかさんはせんせいですか。","ko":"다나카 씨는 선생님입니까?"}]},{"heading":"が와 を — 주어와 목적어","body":"が는 문장의 주어, 즉 '누가/무엇이' 그 동작이나 상태의 주인공인지를 나타내요. 특히 처음 등장하는 새로운 대상을 콕 집어 줄 때 が를 씁니다.\nを는 '~을/를'에 해당하는 목적어 표시예요. 먹다·마시다·보다·사다처럼 대상이 필요한 동작 앞의 명사에 붙습니다.\n\n재미있는 점 하나. '~하고 싶다'는 ~たい 문장에서, 원하는 대상에는 원칙적으로 が를 붙이는 게 정석이에요(예: 水が飲みたい). 하지만 동작의 느낌이 강할 때는 を도 자주 씁니다(예: 水を飲みたい). 교재도 이 두 가지를 모두 보여 줘요. 처음엔 を로 써도 자연스러우니 부담 갖지 마세요.","examples":[{"jp":"友達が家に遊びに来ました。","reading":"ともだちがうちにあそびにきました。","ko":"친구가 집에 놀러 왔습니다. (が=주어, を는 없지만 に가 목적지)"},{"jp":"私は歩きながら音楽を聞きます。","reading":"わたしはあるきながらおんがくをききます。","ko":"저는 걸으면서 음악을 듣습니다. (を=듣는 대상)"},{"jp":"何を買いたいですか。","reading":"なにをかいたいですか。","ko":"무엇을 사고 싶습니까?"},{"jp":"のどがかわきましたから、水を飲みたいです。","reading":"のどがかわきましたから、みずをのみたいです。","ko":"목이 말라서 물을 마시고 싶습니다. (のどが=주어, 水を=대상)"}]},{"heading":"に와 へ — 어디로, 어디에","body":"に와 へ는 둘 다 '이동 방향'을 나타낼 수 있어서 헷갈리기 쉬워요.\n\n・へ는 오로지 '어느 쪽으로 향한다'는 방향의 느낌이에요. 大阪へ行きます(오사카로 갑니다)처럼요.\n・に는 방향뿐 아니라 '딱 그 지점에 도착·귀착한다'는 느낌, 그리고 시간(7時に)에도 씁니다. 家に来ました(집에 왔습니다)의 に가 도착지예요.\n\n또 하나, に는 '~하러'라는 목적을 나타낼 때도 써요. 동사 ます형에서 ます를 떼고 に를 붙이면 '~하러'가 됩니다. 그 뒤에 行く(가다)·来る(오다)가 오면 '~하러 가다/오다'가 되죠.\n예: 遊びます(놀다) → 遊びに(놀러), 食べます(먹다) → 食べに(먹으러).","table":{"columns":["동사 ます형","→","~に (~하러)"],"rows":[["会います (あいます) 만납니다","→","会いに (あいに) 만나러"],["飲みます (のみます) 마십니다","→","飲みに (のみに) 마시러"],["見ます (みます) 봅니다","→","見に (みに) 보러"]]},"examples":[{"jp":"来週大阪へ旅行に行きます。","reading":"らいしゅうおおさかへりょこうにいきます。","ko":"다음 주에 오사카로 여행을 갑니다. (へ=방향, に=목적)"},{"jp":"いっしょに食べに行きませんか。","reading":"いっしょにたべにいきませんか。","ko":"같이 먹으러 가지 않겠습니까?"},{"jp":"友達が家に遊びに来ました。","reading":"ともだちがうちにあそびにきました。","ko":"친구가 집에 놀러 왔습니다."}]},{"heading":"で — 수단과 장소 (함께 익혀 두기)","body":"で는 이 단원 예문에는 직접 나오지 않지만, 기초 조사 세트로 함께 외워 두면 좋아요.\n\n・수단·도구: '~로'. 무엇을 타고, 무엇을 써서 하는지를 나타내요. バスで(버스로), はしで(젓가락으로).\n・장소: '~에서'. 어떤 동작이 벌어지는 장소를 나타내요. 図書館で(도서관에서).\n\n여기서 に와 で를 헷갈리기 쉬운데, 간단히 이렇게 기억하세요. '가서 도착하는 곳'은 に(家に帰る 집에 돌아가다), '거기서 뭔가를 하는 곳'은 で(家で寝る 집에서 자다).","examples":[{"jp":"バスで行きます。","reading":"バスでいきます。","ko":"버스로 갑니다. (で=수단)"},{"jp":"図書館で勉強します。","reading":"としょかんでべんきょうします。","ko":"도서관에서 공부합니다. (で=장소)"}]}],"mistakes":[{"wrong":"これわ本です。","right":"これは本です。","note":"조사 は를 소리 나는 대로 わ로 써 버리는 실수예요. 소리는 [wa]지만 글자는 반드시 は로 씁니다. 마찬가지로 방향 조사 へ도 소리는 [e]지만 え로 쓰면 안 되고 へ로 써야 해요."},{"wrong":"友達は家に来ました。(처음 등장한 친구인데)","right":"友達が家に来ました。","note":"は와 が의 구분이에요. 이야기에 '처음 등장하는 주어'는 が로 콕 집어 줍니다. は는 이미 아는 것을 '주제'로 내세울 때 써요. 초보 단계에선 '새 정보=が, 주제=は'로 기억하면 대부분 맞습니다."},{"wrong":"映画を行きます。","right":"映画を見に行きます。","note":"'영화를 (보러) 가다'를 그대로 옮겨 を만 붙이면 어색해요. 이동의 목적은 '동사 ます형 + に'로 만듭니다. 見ます → 見に로 바꿔 見に行きます(보러 갑니다)가 되어야 해요."},{"wrong":"何[なん]を買いたいですか。","right":"何[なに]を買いたいですか。","note":"이건 조사가 아니라 何의 읽기 실수예요. 何는 뒤에 오는 조사에 따라 소리가 바뀝니다. 뒤에 か·が·を·も가 오면 [なに], 뒤에 だ·で·です·と·の가 오면 [なん]으로 읽어요. 何を는 [なにを]입니다."}],"tips":["は = [와!] 주제를 딱! / へ = [에] 방향으로. 소리는 わ·え처럼 나도 글자는 は·へ 그대로 쓴다고 짝지어 외우세요.","は와 が가 헷갈리면: 이미 아는 걸 '~로 말하자면'처럼 주제로 세우면 は, 처음 등장해서 '누가?'에 답하면 が.","に vs で 한 방 정리: '도착하는 곳'은 に(家に帰る), '거기서 하는 곳'은 で(家で寝る)."],"related":["11 기타"]}],"kanji":[{"k":"日","g":1,"s":4, <script>
"use strict";
const DATA = JSON.parse(document.getElementById("data").textContent);
const VIDEO_LESSONS = Array.isArray(window.VIDEO_LESSONS) ? window.VIDEO_LESSONS : [];

/* ══ 유틸 ══════════════════════════════════════════════ */
const $  = (s,r=document)=>r.querySelector(s);
const el = (t,c,h)=>{const n=document.createElement(t); if(c)n.className=c; if(h!=null)n.innerHTML=h; return n;};
const esc= s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const shuffle=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;};
const sample=(a,n)=>shuffle(a).slice(0,n);
const uniqBy=(a,k)=>{const m=new Map();a.forEach(x=>{const v=k(x); if(v&&!m.has(v))m.set(v,x);});return [...m.values()];};

const isKanji = ch => /[一-龯㐀-䶿]/.test(ch);
const hasKanji= s  => [...String(s||"")].some(isKanji);
const hasJP   = s  => /[぀-ゟ゠-ヿ一-龯㐀-䶿]/.test(String(s||""));
/* 표 셀은 "일본어 (요미) 한국어뜻"이 섞여 있다 → 드릴용으로 일본어 앞부분만 뽑는다 */
const jpOnly  = s => {
  s=String(s||"").trim();
  const i=s.search(/[가-힣]/);           // 첫 한글에서 자른다
  let j=(i>=0?s.slice(0,i):s).trim();
  j=j.replace(/\s*\([ぁ-ヿ゠ー・\s]+\)\s*$/,"").trim();  // 끝의 (요미) 제거
  return j;
};

/* 단어+요미 → <ruby> 마크업. 오쿠리가나(꼬리 히라가나)를 떼어내고 한자 덩어리에만 루비를 얹는다. */
function ruby(word, reading){
  word=String(word||""); reading=String(reading||"");
  if(!word) return "";
  if(!reading || !hasKanji(word)) return esc(word);

  // 앞/뒤 히라가나 접사 분리
  let pre="", post="";
  let a=0, b=word.length;
  while(a<b && !isKanji(word[a])) { pre+=word[a]; a++; }
  while(b>a && !isKanji(word[b-1])) { post = word[b-1]+post; b--; }
  const core = word.slice(a,b);
  if(!core) return esc(word);

  let r = reading;
  if(pre  && r.startsWith(pre))  r = r.slice(pre.length);
  if(post && r.endsWith(post))   r = r.slice(0, r.length-post.length);
  if(!r) return esc(word);
  return esc(pre)+"<ruby>"+esc(core)+"<rt>"+esc(r)+"</rt></ruby>"+esc(post);
}

/* 문장 전체 요미가 있을 때는 문장 아래 보조행으로 처리(정렬 신뢰 불가) */
function sentence(jp){ return esc(jp); }

/* 일본어 컨테이너에 lang="ja" 부여 — 한글 폰트가 한자를 '한국 한자체'로 그리는 문제 방지 */
const JA_SEL=".jp-lead,.jp-mid,.pat,.jpface,.kc,.kbig,.yomi,.furi,.ex .j,.occ .j,.kj,ruby,rt,.kana-grid td";
function markJa(root){ (root||document).querySelectorAll(JA_SEL).forEach(e=>{ if(e.lang!=="ja") e.lang="ja"; }); }

/* 예문 안에서 문형에 해당하는 부분을 강조 */
function highlightPattern(jp, pattern){
  let s=esc(jp);
  if(!pattern) return s;
  let parts=[...new Set(pattern.replace(/[（）()]/g,"").split(/[〜~・\/、。\s]+/)
    .map(p=>p.trim()).filter(p=>p.length>=2))];
  parts=parts.filter(p=>!parts.some(q=>q!==p && q.includes(p)));  // 더 긴 조각에 포함되면 제외
  parts.sort((a,b)=>b.length-a.length).forEach(p=>{
    const ep=esc(p);
    if(ep && s.includes(ep) && !s.includes('<mark class="pat">'+ep))
      s=s.split(ep).join(`<mark class="pat">${ep}</mark>`);
  });
  return s;
}

/* ══ 데이터 파생 ══════════════════════════════════════ */
const pages = DATA.pages || [];
const allBlocks=[];
pages.forEach(p=>(p.blocks||[]).forEach(b=>allBlocks.push({...b, _page:p.page_index, _lesson:(p.lesson||"").trim(), _bp:p.book_pages||""})));

const byKind = k => allBlocks.filter(b=>b.kind===k);

const GRAMMAR = byKind("grammar_point").filter(b=>b.pattern||b.meaning_ko||(b.examples||[]).length);
const TABLES  = byKind("conjugation_table").filter(b=>(b.rows||[]).length);
const KANA    = byKind("kana_table").filter(b=>(b.rows||[]).length);
const EXERCISE= byKind("exercise").filter(b=>(b.items||[]).length);
const ANSWERS = byKind("answer_key");
const DIVIDERS= byKind("lesson_divider");

const VOCAB = uniqBy(
  byKind("vocab_list").flatMap(b=>(b.vocab||[]).map(v=>({...v,_lesson:b._lesson,_page:b._page}))),
  v => (v.word||"")+"|"+(v.reading||"")
).filter(v=>v.word && v.meaning_ko);

/* 레슨 목록 */
const LESSONS = (()=>{
  const seen=new Map();
  pages.forEach(p=>{ const l=(p.lesson||"").trim(); if(l && !seen.has(l)) seen.set(l,p.page_index); });
  return [...seen.keys()].sort((a,b)=>seen.get(a)-seen.get(b));
})();

/* 초보 가이드 */
const GUIDES = DATA.guides || [];

/* ══ 한자 (japan-hanja 병합) ══════════════════════════ */
const KANJI = DATA.kanji || [];
const KJ = new Map(KANJI.map(k=>[k.k,k]));           // 문자 → 레코드
const isK = ch => /[一-鿿]/.test(ch);

/* 교재 낱말·예문 ↔ 한자 교차 인덱스: 문자 → {vocab:[…], ex:[…]} (문맥 연결의 근거) */
const KLINK = (()=>{
  const m=new Map();
  const ent=ch=>{ if(!m.has(ch)) m.set(ch,{vocab:[],ex:[]}); return m.get(ch); };
  VOCAB.forEach(v=>{ [...new Set([...(v.word||"")].filter(ch=>isK(ch)&&KJ.has(ch)))].forEach(ch=>{
    const e=ent(ch); if(e.vocab.length<30 && !e.vocab.some(x=>x.word===v.word)) e.vocab.push(v);
  });});
  GRAMMAR.forEach(g=>(g.examples||[]).forEach(ex=>{
    [...new Set([...(ex.jp||"")].filter(ch=>isK(ch)&&KJ.has(ch)))].forEach(ch=>{
      const e=ent(ch); if(e.ex.length<10) e.ex.push({jp:ex.jp,reading:ex.reading,ko:ex.ko,lesson:g._lesson,pattern:g.pattern});
    });
  }));
  return m;
})();
const TEXTBOOK_KANJI = new Set(KLINK.keys());        // 교재가 실제로 다루는 한자(≈558)

const gradeLabel = g => g===8 ? "중등" : (g? g+"학년" : "—");
const jlptLabel  = j => j ? "N"+j : "—";

/* 한자 학습 대상 풀 = 교재 등장 + 사용자가 '복습 추가'한 것 (2,136자 전체 자동등록 방지) */
function kanjiPool(){
  const extra = store.kjadd || {};
  return KANJI.filter(k => TEXTBOOK_KANJI.has(k.k) || extra[k.k]);
}

function progressFile(){ const d=new Date(),p=n=>String(n).padStart(2,"0"); return `일본어-진도-${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}.json`; }

/* ══ TTS (브라우저 Web Speech API — 무의존, 시스템 일본어/한국어 음성) ══ */
const TTS_OK = typeof window!=="undefined" && "speechSynthesis" in window;
let jaVoice=null, koVoice=null, voicesTried=0;
const JA_OK = () => TTS_OK && !!jaVoice;     // 일본어 음성이 '실제로' 있는가
/* 음성 점수 랭킹 — 신경망(natural/neural)·온라인 음성을 최우선, 구형(desktop/eSpeak)은 회피 */
function voiceScore(v, exactRe){
  const n=v.name||""; let s=0;
  if(/natural/i.test(n)) s+=40;
  if(/neural/i.test(n))  s+=36;
  if(/online/i.test(n))  s+=20;
  if(/google/i.test(n))  s+=18;
  if(/premium|enhanced/i.test(n)) s+=14;
  if(/siri/i.test(n))    s+=10;
  if(exactRe.test(v.lang||"")) s+=8;
  if(/espeak|compact/i.test(n)) s-=40;
  if(/desktop/i.test(n)) s-=18;
  return s;
}
function bestVoice(all, langRe, nameRe, exactRe){
  const list=all.filter(v=>langRe.test(v.lang)||nameRe.test(v.name));
  if(!list.length) return null;
  return list.slice().sort((a,b)=>voiceScore(b,exactRe)-voiceScore(a,exactRe))[0];
}
function pickVoices(){
  if(!TTS_OK) return;
  const all=speechSynthesis.getVoices();
  jaVoice = bestVoice(all, /ja[-_]?jp/i, /japan|日本/i, /^ja[-_]jp$/i);
  koVoice = bestVoice(all, /ko[-_]?kr/i, /korean|한국/i, /^ko[-_]kr$/i);
}
if(TTS_OK){
  pickVoices();
  try{ speechSynthesis.onvoiceschanged=()=>{ const had=!!jaVoice; pickVoices();
    if(!had && jaVoice && typeof render==="function") render();   // 음성이 늦게 도착 → 화면 갱신
  }; }catch(e){}
  // 안드로이드는 목록이 늦게 채워진다 — 몇 번 재시도
  const iv=setInterval(()=>{ pickVoices(); if(jaVoice || ++voicesTried>6){ clearInterval(iv);
    if(jaVoice && typeof render==="function") render(); } }, 400);
}
/* 긴 문장은 잘라서 큐에 넣는다 (크롬 ~15초 컷오프로 체인이 멈추는 것 방지) */
function chunkText(t, max){
  t=String(t||"").trim(); max=max||170;
  if(t.length<=max) return t?[t]:[];
  const parts=t.split(/(?<=[。．.!?！？\n])\s*/).filter(Boolean);
  const out=[]; let buf="";
  parts.forEach(p=>{ if((buf+p).length>max && buf){ out.push(buf); buf=p; } else buf+=p; });
  if(buf) out.push(buf);
  return out.flatMap(s=>s.length<=max ? [s] : s.match(new RegExp(".{1,"+max+"}","g")) || []);
}
/* 단발 발음 — 내레이션 중이면 무시(내레이션을 깨뜨리지 않는다) */
function speak(text){
  if(!TTS_OK || !text || !store.tts) return;
  if(typeof Narrator!=="undefined" && Narrator.isPlaying()) return;   // 내레이션 보호
  if(!jaVoice) return;                                                // 일본어 음성 없으면 오발음 방지
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(String(text).replace(/[（(].*?[)）]/g,"").slice(0,300));
    u.lang="ja-JP"; try{ if(jaVoice) u.voice=jaVoice; }catch(e){}
    u.rate=(store.tts.rate||0.95)*0.93; u.pitch=1;   // 일본어는 살짝 느리게 — 학습자 청취
    speechSynthesis.speak(u);
  }catch(e){}
}
/* 스피커 버튼 HTML (data-say 위임 처리) — 일본어 음성이 있을 때만 노출 */
function sayIcon(text,cls){

  return `<button class="say${cls?" "+cls:""}" data-say="${esc(text)}" title="소리 듣기" aria-label="소리 듣기">♪</button>`;
}
