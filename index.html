<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>일본어 문법 학습 · 初級日本語</title>
<meta name="robots" content="noindex, nofollow">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#f4efe3">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="初級日本語">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<style>
/* ─────────────────────────────────────────────────────────
   팔레트: 교재 스캔에서 뽑은 말차 그린 + 붉은 주(朱, 첨삭·낙관) + 차가운 화지
   ───────────────────────────────────────────────────────── */
:root{
  /* 세련된 화지(和紙)·먹(墨)·말차(抹茶)·주(朱) 팔레트 — 따뜻한 중성톤 + 절제된 악센트 */
  --sumi:#26251d;        /* 먹 — 따뜻한 잉크 */
  --sumi-2:#5f6155;
  --kasumi:#9a9a8a;      /* 흐린 글자 */
  --washi:#f3efe5;       /* 화지 배경 (따뜻) */
  --washi-2:#fbf8f1;     /* 카드 (따뜻한 백) */
  --matcha:#4b755d;      /* 말차 — 깊고 차분한 녹 */
  --matcha-d:#33543f;
  --tint:#e7ecdd;        /* 옅은 녹 워시 */
  --shu:#ab452c;         /* 주(朱) — 첨삭·낙관 */
  --shu-t:#f1e2d9;
  --line:#e4ddcd;        /* 헤어라인 (따뜻) */
  --line-2:#d4ccb8;      /* 진한 경계 (표) */
  --gold:#a5822d;        /* 금(金) — 팁 */
  --shadow:0 1px 2px rgba(38,37,29,.05), 0 10px 30px -20px rgba(38,37,29,.28);
  --shadow-lg:0 2px 6px rgba(38,37,29,.06), 0 22px 48px -26px rgba(38,37,29,.40);

  /* 동사 그룹 색 (채도 낮춰 정제) */
  --g1:#45688f; --g1-t:#e4e8f0;
  --g2:#4b755d; --g2-t:#e7ecdd;
  --g3:#a76a3c; --g3-t:#f0e6d7;

  --jp:"Yu Mincho","YuMincho","Hiragino Mincho ProN","Noto Serif JP","Noto Serif CJK JP","Shippori Mincho","MS Mincho","Noto Sans CJK JP","Noto Sans JP",serif;
  --ko:"Pretendard","Malgun Gothic","맑은 고딕","Apple SD Gothic Neo","Noto Sans KR",system-ui,sans-serif;
  --mono:ui-monospace,SFMono-Regular,Menlo,"Cascadia Mono",Consolas,monospace;

  --rail:224px;
}
@media (prefers-color-scheme: dark){
  :root{
    --sumi:#ece9dd; --sumi-2:#adae9f; --kasumi:#7a7b6d;
    --washi:#141410; --washi-2:#1d1c15;
    --matcha:#7fb795; --matcha-d:#a6d6b6; --tint:#232819;
    --shu:#d97a5f; --shu-t:#2d1d16; --line:#322f24; --line-2:#3d3a2c; --gold:#d2a84c;
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 14px 34px -22px rgba(0,0,0,.7);
    --shadow-lg:0 2px 8px rgba(0,0,0,.4), 0 26px 56px -28px rgba(0,0,0,.85);
    --g1:#7699c6; --g1-t:#1a2330; --g2:#7fb795; --g2-t:#1a2a1f; --g3:#cf9560; --g3-t:#2c2116;
  }
}
:root[data-theme="dark"]{
  --sumi:#ece9dd; --sumi-2:#adae9f; --kasumi:#7a7b6d;
  --washi:#141410; --washi-2:#1d1c15; --tint:#232819;
  --matcha:#7fb795; --matcha-d:#a6d6b6; --gold:#d2a84c;
  --shu:#d97a5f; --shu-t:#2d1d16; --line:#322f24; --line-2:#3d3a2c;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 14px 34px -22px rgba(0,0,0,.7);
  --shadow-lg:0 2px 8px rgba(0,0,0,.4), 0 26px 56px -28px rgba(0,0,0,.85);
  --g1:#7699c6; --g1-t:#1a2330; --g2:#7fb795; --g2-t:#1a2a1f; --g3:#cf9560; --g3-t:#2c2116;
}
:root[data-theme="light"]{
  --sumi:#26251d; --sumi-2:#5f6155; --kasumi:#9a9a8a;
  --washi:#f3efe5; --washi-2:#fbf8f1; --tint:#e7ecdd;
  --matcha:#4b755d; --matcha-d:#33543f; --gold:#a5822d;
  --shu:#ab452c; --shu-t:#f1e2d9; --line:#e4ddcd; --line-2:#d4ccb8;
  --shadow:0 1px 2px rgba(38,37,29,.05), 0 10px 30px -20px rgba(38,37,29,.28);
  --shadow-lg:0 2px 6px rgba(38,37,29,.06), 0 22px 48px -26px rgba(38,37,29,.40);
  --g1:#45688f; --g1-t:#e4e8f0; --g2:#4b755d; --g2-t:#e7ecdd; --g3:#a76a3c; --g3-t:#f0e6d7;
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;overflow-x:hidden}
/* 표는 자기 안에서만 가로 스크롤 (본문이 옆으로 밀리지 않게) */
.tscroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
body{
  background:var(--washi); color:var(--sumi);
  font-family:var(--ko); font-size:15px; line-height:1.65;
  -webkit-font-smoothing:antialiased;
}
button{font:inherit;color:inherit;cursor:pointer}
:focus-visible{outline:2px solid var(--matcha);outline-offset:2px;border-radius:3px}
/* 따뜻한 화지 질감 (아주 옅게) */
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:
    radial-gradient(1200px 600px at 12% -8%, color-mix(in srgb,var(--matcha) 6%,transparent), transparent 60%),
    radial-gradient(900px 500px at 108% 0%, color-mix(in srgb,var(--shu) 5%,transparent), transparent 55%);
}

/* ── 헤더 ───────────────────────────────────────────────── */
header{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:16px;
  padding:12px 22px;
  background:color-mix(in srgb,var(--washi) 82%,transparent);
  backdrop-filter:blur(12px) saturate(1.1);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:11px;margin-right:auto;min-width:0}
.brand .seal{flex:none;width:22px;height:22px;border-radius:3px;background:var(--shu);
  color:#fff;font-family:var(--jp);font-size:13px;display:grid;place-items:center;
  box-shadow:0 1px 3px color-mix(in srgb,var(--shu) 45%,transparent);letter-spacing:0}
.brand .jp{font-family:var(--jp);font-size:19px;letter-spacing:.09em;white-space:nowrap}
.brand .ko{font-size:11px;color:var(--kasumi);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:var(--mono);letter-spacing:.02em}

.toggles{display:flex;gap:6px;flex-wrap:wrap}
.tg{
  border:1px solid var(--line);background:transparent;border-radius:999px;
  padding:5px 11px;font-size:12px;color:var(--sumi-2);
  transition:background .12s,border-color .12s,color .12s;
}
.tg[aria-pressed="true"]{background:var(--matcha);border-color:var(--matcha);color:#fff}
.tg:hover{border-color:var(--matcha)}

/* 正 tally */
.tally{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;color:var(--kasumi)}
.tally svg{display:block}
.tally .stroke{stroke:var(--matcha);stroke-width:2.2;stroke-linecap:square;opacity:0;transition:opacity .18s}
.tally .stroke.on{opacity:1}

/* ── 레이아웃 ───────────────────────────────────────────── */
.wrap{display:grid;grid-template-columns:var(--rail) 1fr;min-height:calc(100vh - 53px)}
nav{
  border-right:1px solid var(--line);padding:22px 12px;
  position:sticky;top:53px;align-self:start;max-height:calc(100vh - 53px);overflow:auto;
}
/* 인덱스 탭: 정제된 필-형 색인 */
.tab{
  display:flex;align-items:center;gap:11px;width:100%;
  border:0;background:transparent;text-align:left;border-radius:7px;
  padding:8px 12px;font-size:14px;color:var(--sumi-2);
  transition:background .13s,color .13s;position:relative;
}
.tab .n{font-family:var(--jp);font-size:12px;color:var(--kasumi);width:1.4em;text-align:center;transition:color .13s}
.tab:hover{background:color-mix(in srgb,var(--matcha) 8%,transparent);color:var(--sumi)}
.tab[aria-current="true"]{
  color:var(--matcha-d);background:color-mix(in srgb,var(--matcha) 13%,transparent);font-weight:600;
}
.tab[aria-current="true"] .n{color:var(--matcha)}
.tab[aria-current="true"]::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);
  width:3px;height:18px;background:var(--matcha);border-radius:0 3px 3px 0}
.tab .cnt{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--kasumi);letter-spacing:.02em}

main{padding:34px 40px 100px;max-width:980px;width:100%;min-width:0}
.eyebrow{font-family:var(--mono);font-size:11px;color:var(--matcha-d);
  letter-spacing:.18em;text-transform:uppercase;margin:0 0 8px}
h2.view-title{
  font-family:var(--jp);font-weight:400;font-size:31px;letter-spacing:.02em;line-height:1.25;
  margin:0 0 5px;
}
.view-sub{color:var(--sumi-2);font-size:13.5px;margin:0 0 26px;max-width:60ch;line-height:1.7}

/* ── 원고지 카드 (시그니처) ─────────────────────────────── */
.genko{
  position:relative;background:var(--washi-2);
  border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;
  background-image:
    linear-gradient(color-mix(in srgb,var(--matcha) 10%,transparent) 1px,transparent 1px),
    linear-gradient(90deg,color-mix(in srgb,var(--matcha) 10%,transparent) 1px,transparent 1px);
  background-size:30px 30px;
  background-position:center;
}
.genko::after{content:"";position:absolute;inset:0;background:var(--washi-2);opacity:.955;pointer-events:none}
.genko > *{position:relative;z-index:1}

.card{
  min-height:290px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  padding:36px 28px;text-align:center;
  transition:border-color .16s;
}
.card.ok{border-color:var(--matcha)}
.card.no{border-color:var(--shu)}

.jp-lead{font-family:var(--jp);font-size:40px;line-height:1.5;letter-spacing:.02em}
.jp-mid{font-family:var(--jp);font-size:27px;line-height:1.7}
.ko-gloss{font-size:16px;color:var(--sumi-2)}
.ko-gloss.hidden,.gen-note.hidden{display:none}
.gen-note{font-size:11px;color:var(--kasumi);font-family:var(--mono)}

/* 후리가나: 기본 숨김 → 훈련기 */
ruby{ruby-position:over}
rt{
  font-family:var(--jp);font-size:.44em;color:var(--matcha-d);
  opacity:0;transition:opacity .14s;user-select:none;
}
body[data-furi="on"] rt{opacity:1}
body[data-furi="hover"] ruby:hover rt,
body[data-furi="hover"] ruby:focus-within rt{opacity:1}
body[data-furi="off"] rt{opacity:0}
.revealed rt{opacity:1 !important}
@media (prefers-reduced-motion:reduce){*{transition:none !important;animation:none !important}}

/* 몰입모드: 한국어 감추기 */
body[data-ko="off"] .ko-only{display:none !important}

/* ── 버튼 ───────────────────────────────────────────────── */
.row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.btn{
  border:1px solid var(--line-2);background:var(--washi-2);border-radius:7px;
  padding:9px 17px;font-size:14px;color:var(--sumi);
  transition:border-color .13s,background .13s,transform .1s,box-shadow .13s;
}
.btn:hover{border-color:var(--matcha);transform:translateY(-1px);box-shadow:var(--shadow)}
.btn:active{transform:translateY(0)}
.btn.primary{background:var(--matcha);border-color:var(--matcha);color:#fdfbf5;
  box-shadow:0 1px 2px color-mix(in srgb,var(--matcha) 35%,transparent)}
.btn.primary:hover{background:var(--matcha-d);border-color:var(--matcha-d);box-shadow:var(--shadow-lg)}
.btn.danger{border-color:color-mix(in srgb,var(--shu) 55%,var(--line));color:var(--shu)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* 선택지 */
.opts{display:grid;gap:10px;width:100%;max-width:560px;margin:0 auto}
.opt{
  display:flex;align-items:center;gap:13px;text-align:left;
  border:1px solid var(--line-2);background:var(--washi-2);border-radius:9px;
  padding:13px 16px;font-size:16px;transition:border-color .12s,background .12s,transform .1s,box-shadow .12s;
}
.opt .k{font-family:var(--mono);font-size:11px;color:var(--kasumi);flex:none;
  width:20px;height:20px;display:grid;place-items:center;border:1px solid var(--line);border-radius:5px}
.opt:hover:not(:disabled){border-color:var(--matcha);transform:translateY(-1px);box-shadow:var(--shadow)}
.opt.correct{border-color:var(--matcha);background:var(--tint)}
.opt.correct .k{border-color:var(--matcha);background:var(--matcha);color:#fdfbf5}
.opt.wrong{border-color:var(--shu);background:var(--shu-t)}
.opt .jpface{font-family:var(--jp)}

input[type=text]{
  font-family:var(--jp);font-size:22px;text-align:center;
  border:0;border-bottom:2px solid var(--line);background:transparent;color:var(--sumi);
  padding:6px 10px;min-width:230px;
}
input[type=text]:focus{outline:none;border-bottom-color:var(--matcha)}

/* ── 표 ─────────────────────────────────────────────────── */
table{border-collapse:collapse;width:100%;margin:14px 0;font-size:14px}
th,td{border:1px solid var(--line);padding:9px 12px;text-align:left;vertical-align:top}
th{background:var(--tint);font-weight:600;color:var(--sumi);border-color:var(--line-2);
  font-size:12px;letter-spacing:.02em}
tbody tr:hover td,table tr:hover td{background:color-mix(in srgb,var(--matcha) 4%,transparent)}
td .jpface{font-family:var(--jp);font-size:16px}
.kana-grid td{text-align:center;font-family:var(--jp);font-size:20px;cursor:pointer}
.kana-grid td .rom{display:block;font-family:var(--mono);font-size:10px;color:var(--kasumi)}
.kana-grid td.hidden-rom .rom{visibility:hidden}
.kana-grid td:hover:not(.empty):not(.rowlab){background:var(--tint)}
.kana-grid td.blank{background:transparent;cursor:default}
.kana-grid td.rowlab{font-family:var(--ko);font-size:12px;color:var(--sumi-2);background:var(--tint);cursor:default}

/* ── 리스트/섹션 ────────────────────────────────────────── */
.sec{background:var(--washi-2);border:1px solid var(--line);border-radius:10px;
  padding:20px 22px;margin:0 0 16px;box-shadow:var(--shadow)}
.sec h3{margin:0 0 4px;font-size:16px;display:flex;align-items:center;gap:9px;letter-spacing:.01em}
.sec h3 .no{
  font-family:var(--mono);font-size:11px;background:var(--matcha);color:#fdfbf5;
  border-radius:4px;padding:2px 7px;flex:none;
}
.pat{font-family:var(--jp);font-size:22px;color:var(--matcha-d);margin:10px 0 2px;letter-spacing:.02em}
.pat-ko{font-size:13px;color:var(--sumi-2);margin-bottom:10px}
.ex{border-left:2px solid var(--tint);padding:4px 0 4px 13px;margin:9px 0;cursor:pointer}
.ex:hover{border-left-color:var(--matcha)}
.ex .j{font-family:var(--jp);font-size:18px}
.ex .k{font-size:13px;color:var(--sumi-2)}
.ex .n{font-size:11px;color:var(--kasumi);font-family:var(--mono)}
/* 예문 요미: 후리가나 토글/클릭에 반응 (읽기 훈련) */
.ex .furi{font-size:11px;color:var(--matcha-d);font-family:var(--jp);opacity:0;max-height:0;overflow:hidden;transition:opacity .14s}
body[data-furi="on"] .ex .furi{opacity:1;max-height:2em}
body[data-furi="hover"] .ex:hover .furi{opacity:1;max-height:2em}
.ex.revealed .furi{opacity:1 !important;max-height:2em}
.src{font-family:var(--mono);font-size:10px;color:var(--kasumi);margin-left:auto;flex:none}

.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.chip{border:1px solid var(--line-2);background:var(--washi-2);border-radius:999px;padding:5px 13px;
  font-size:12px;color:var(--sumi-2);transition:border-color .12s,background .12s,color .12s}
.chip:hover{border-color:var(--matcha)}
.chip[aria-pressed="true"]{background:var(--matcha);border-color:var(--matcha);color:#fdfbf5}

.meter{height:6px;background:var(--tint);border-radius:999px;overflow:hidden;margin-top:8px}
.meter i{display:block;height:100%;background:linear-gradient(90deg,var(--matcha),var(--matcha-d));width:0;transition:width .4s}

.stat{display:grid;grid-template-columns:repeat(auto-fit,minmax(132px,1fr));gap:12px;margin-bottom:24px}
.stat div{background:var(--washi-2);border:1px solid var(--line);padding:15px 17px;border-radius:9px;
  box-shadow:var(--shadow);transition:transform .12s}
.stat div:hover{transform:translateY(-2px)}
.stat b{display:block;font-family:var(--jp);font-size:27px;font-weight:400;color:var(--sumi);letter-spacing:.01em}
.stat span{font-size:11px;color:var(--kasumi);font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase}

.empty{color:var(--kasumi);font-size:14px;padding:40px 0;text-align:center}
.feedback{min-height:24px;font-size:14px}
.feedback.ok{color:var(--matcha-d)}
.feedback.no{color:var(--shu)}

#search{
  width:100%;font-family:var(--ko);font-size:16px;text-align:left;
  border:1px solid var(--line);border-bottom:1px solid var(--line);
  background:var(--washi-2);padding:11px 14px;border-radius:2px;min-width:0;
}
#search:focus{border-color:var(--matcha)}

/* 교재에 인쇄되지 않은 것(자동 생성)은 반드시 표시한다 */
.ko-gen{border-bottom:1px dotted var(--kasumi)}
.reveal{border:1px solid var(--line);background:transparent;border-radius:2px;
  padding:3px 10px;font-size:12px;color:var(--matcha-d);margin-top:6px}
.reveal:hover{border-color:var(--matcha)}
.ans{margin-top:6px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
.ans .a{font-family:var(--jp);font-size:17px;color:var(--matcha-d)}
.legend{font-size:12px;color:var(--kasumi);border-left:2px solid var(--tint);padding-left:11px;margin:0 0 20px}

.wrongrow{display:flex;gap:12px;align-items:baseline;border-bottom:1px solid var(--line);padding:10px 0}
.wrongrow .j{font-family:var(--jp);font-size:18px}
.wrongrow .k{font-size:13px;color:var(--sumi-2)}
.wrongrow .b{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--kasumi)}

@media (max-width:820px){
  .wrap{grid-template-columns:1fr}
  nav{position:static;max-height:none;border-right:0;border-bottom:1px solid var(--line);
      display:flex;overflow-x:auto;padding:6px}
  .tab{width:auto;white-space:nowrap;border-left:0;border-bottom:3px solid transparent;padding:9px 12px}
  .tab[aria-current="true"]{border-left:0;border-bottom-color:var(--matcha)}
  .tab .cnt,.tab .n{display:none}
  main{padding:20px 16px 70px}
  .jp-lead{font-size:31px}
}
/* ── 터치 기기: 탭 타깃 확대 (레이아웃 불변) ── */
@media (pointer:coarse){
  .say{position:relative}
  .say::before{content:"";position:absolute;inset:-11px}   /* 히트영역 ≈46px */
  .lens .lx{width:44px;height:44px}
  .chip,.tg,.reveal,.dchip{min-height:40px}
  .kj{padding:2px 1px;-webkit-tap-highlight-color:transparent}
}
@media (max-width:820px){
  .brand .ko,.tally{display:none}
  header{padding:10px 14px;gap:10px}
}

@media print{
  header,nav,.row,.toggles{display:none}
  body{background:#fff}
  .wrap{display:block}
  rt{opacity:1 !important}
  .sec{break-inside:avoid;border-color:#999}
}

/* ═══════════ 리치 컴포넌트 ═══════════ */

/* 배지 */
.badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);
  border-radius:999px;padding:2px 9px;border:1px solid var(--line);color:var(--sumi-2);white-space:nowrap}
.badge.g1{background:var(--g1-t);border-color:var(--g1);color:var(--g1)}
.badge.g2{background:var(--g2-t);border-color:var(--g2);color:var(--g2)}
.badge.g3{background:var(--g3-t);border-color:var(--g3);color:var(--g3)}
.badge.gold{background:transparent;border-color:var(--gold);color:var(--gold)}
:root[data-theme="dark"] .badge.g1,:root[data-theme="dark"] .badge.g2,:root[data-theme="dark"] .badge.g3{color:var(--sumi)}

/* 예문 속 문형 강조 */
mark.pat{background:transparent;color:var(--matcha-d);font-weight:600;
  border-bottom:2px solid var(--matcha);padding-bottom:1px}

/* 접이식 (초보 팁) */
.disc{border-top:1px dashed var(--line);margin-top:10px}
.disc>summary{list-style:none;cursor:pointer;font-size:12px;color:var(--matcha-d);
  padding:8px 0 2px;display:flex;align-items:center;gap:6px;user-select:none}
.disc>summary::-webkit-details-marker{display:none}
.disc>summary::before{content:"▸";transition:transform .15s;font-size:10px}
.disc[open]>summary::before{transform:rotate(90deg)}
.disc .disc-body{font-size:13px;color:var(--sumi-2);padding:4px 0 10px;line-height:1.7}
.disc .when::before{content:"쓰임 ";font-family:var(--mono);font-size:10px;color:var(--kasumi)}
.disc .miss{color:var(--shu);margin-top:5px}
.disc .miss::before{content:"주의 ";font-family:var(--mono);font-size:10px;color:var(--shu)}

/* ── 초보 가이드 ── */
.guide-index{display:grid;grid-template-columns:repeat(auto-fill,minmax(216px,1fr));gap:12px;margin:4px 0 8px}
.gcard{text-align:left;border:1px solid var(--line);background:var(--washi-2);border-radius:10px;
  padding:16px 17px 15px;transition:border-color .14s,transform .14s,box-shadow .14s;position:relative;overflow:hidden;
  box-shadow:var(--shadow)}
.gcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--matcha);opacity:.75}
.gcard:hover{border-color:var(--matcha);transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.gcard .gt{font-family:var(--jp);font-size:16.5px;margin-bottom:5px;display:block;color:var(--sumi);letter-spacing:.01em}
.gcard .gs{font-size:12px;color:var(--sumi-2);line-height:1.6;display:block}
.gcard .gnum{position:absolute;right:12px;top:11px;font-family:var(--mono);font-size:11px;color:var(--kasumi);opacity:.6}

.guide-hero{position:relative;overflow:hidden;
  background:linear-gradient(140deg,var(--tint),var(--washi-2) 70%);
  border:1px solid var(--line);border-radius:12px;padding:26px 28px;margin:0 0 22px;box-shadow:var(--shadow)}
.guide-hero::after{content:"学";position:absolute;right:-8px;bottom:-26px;font-family:var(--jp);font-size:150px;
  color:var(--matcha);opacity:.06;line-height:1;pointer-events:none}
.guide-hero .eyebrow{font-family:var(--mono);font-size:11px;color:var(--matcha-d);letter-spacing:.18em;text-transform:uppercase}
.guide-hero h2{font-family:var(--jp);font-weight:400;font-size:29px;margin:8px 0 9px;letter-spacing:.02em}
.guide-hero p{margin:0;color:var(--sumi-2);font-size:15px;line-height:1.75;max-width:56ch;position:relative}

.gsec{margin:0 0 18px}
.gsec h4{font-size:15px;margin:0 0 6px;display:flex;align-items:center;gap:8px}
.gsec h4::before{content:"";width:7px;height:7px;background:var(--matcha);border-radius:50%;flex:none}
.gsec .body{font-size:14px;color:var(--sumi-2);line-height:1.85;white-space:pre-wrap}

.callout{border-left:3px solid var(--matcha);background:var(--washi-2);border-radius:0 3px 3px 0;
  padding:11px 15px;margin:12px 0;font-size:13px;line-height:1.75}
.callout.tip{border-left-color:var(--gold)}
.callout.tip .ct{color:var(--gold)}
.callout .ct{font-family:var(--mono);font-size:11px;display:block;margin-bottom:3px;color:var(--matcha-d)}

/* ✕ → ○ 실수 비교 */
.miss-grid{display:grid;gap:9px;margin:12px 0}
.miss-row{border:1px solid var(--line);border-radius:3px;overflow:hidden}
.miss-row .xo{display:grid;grid-template-columns:1fr 1fr}
.miss-row .x,.miss-row .o{padding:9px 13px;font-family:var(--jp);font-size:16px;display:flex;align-items:center;gap:8px}
.miss-row .x{background:var(--shu-t);color:var(--sumi)}
.miss-row .o{background:var(--g2-t);color:var(--sumi)}
.miss-row .x::before{content:"✕";color:var(--shu);font-family:var(--mono);font-weight:700}
.miss-row .o::before{content:"○";color:var(--matcha-d);font-family:var(--mono);font-weight:700}
.miss-row .mnote{padding:8px 13px;font-size:12.5px;color:var(--sumi-2);border-top:1px solid var(--line);background:var(--washi-2);line-height:1.6}
@media (max-width:560px){.miss-row .xo{grid-template-columns:1fr}}

.gtable{overflow-x:auto}
.rel{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.rel a{font-size:12px;color:var(--matcha-d);border:1px solid var(--line);border-radius:999px;
  padding:4px 11px;cursor:pointer;text-decoration:none}
.rel a:hover{border-color:var(--matcha);background:var(--tint)}

/* 개요 히어로 */
.hero{position:relative;overflow:hidden;
  background:radial-gradient(140% 130% at 100% -10%,var(--tint),transparent 52%),var(--washi-2);
  border:1px solid var(--line);border-radius:14px;padding:34px 34px;margin:0 0 22px;box-shadow:var(--shadow)}
.hero::after{content:"日本語";position:absolute;right:-6px;bottom:-40px;font-family:var(--jp);font-size:130px;
  color:var(--matcha);opacity:.05;letter-spacing:.02em;line-height:1;pointer-events:none;white-space:nowrap}
.hero .heyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--matcha-d);margin:0 0 10px}
.hero .hjp{font-family:var(--jp);font-size:40px;letter-spacing:.06em;margin:0 0 10px;line-height:1.15}
.hero .hko{color:var(--sumi-2);font-size:15px;line-height:1.8;max-width:56ch;margin:0;position:relative}
.hero .cta{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;position:relative}

/* 활용 펼치기 (동사 변화 미리보기) */
.conjrow td .form{display:inline-block}
details.verb{margin:8px 0;border:1px solid var(--line);border-radius:3px;background:var(--washi-2)}
details.verb>summary{cursor:pointer;list-style:none;padding:10px 14px;font-family:var(--jp);font-size:17px;
  display:flex;align-items:center;gap:10px}
details.verb>summary::-webkit-details-marker{display:none}
details.verb .steps{padding:0 14px 12px;display:flex;flex-wrap:wrap;gap:8px}
details.verb .step{border:1px solid var(--line);border-radius:3px;padding:6px 10px;font-family:var(--jp);font-size:15px;background:var(--washi)}
details.verb .step small{display:block;font-family:var(--ko);font-size:10px;color:var(--kasumi)}

/* ── TTS 스피커 버튼 ── */
.say{border:1px solid var(--line-2);background:var(--washi-2);color:var(--matcha-d);
  border-radius:999px;width:24px;height:24px;font-size:12px;line-height:1;padding:0;flex:none;
  display:inline-grid;place-items:center;vertical-align:middle;transition:border-color .12s,background .12s,transform .1s}
.say:hover{border-color:var(--matcha);background:var(--tint)}
.say:active{transform:scale(.9)}
.say.big{width:30px;height:30px;font-size:14px}
.say.speaking{background:var(--matcha);border-color:var(--matcha);color:#fdfbf5}

/* ── 데일리 학습 ── */
.dplayer{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:var(--washi-2);
  border:1px solid var(--line);border-radius:12px;padding:15px 18px;margin:0 0 18px;box-shadow:var(--shadow)}
.dplayer .big-play{font-size:15px;padding:11px 22px}
.dbar{flex:1;min-width:140px;height:8px;background:var(--tint);border-radius:999px;overflow:hidden}
.dbar i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--matcha),var(--matcha-d));transition:width .3s}
.dlist{display:flex;flex-wrap:wrap;gap:7px}
.dchip{border:1px solid var(--line-2);background:var(--washi-2);border-radius:8px;min-width:46px;
  padding:7px 6px;font-family:var(--mono);font-size:12px;color:var(--sumi-2);transition:border-color .12s,background .12s}
.dchip:hover{border-color:var(--matcha)}
.dchip.done{background:var(--tint);border-color:var(--matcha);color:var(--matcha-d)}
.dchip.cur{outline:2px solid var(--matcha);outline-offset:1px;font-weight:700}
.d-hi{background:color-mix(in srgb,var(--gold) 24%,transparent)!important;border-radius:6px;
  box-shadow:0 0 0 2px color-mix(in srgb,var(--gold) 55%,transparent);
  transition:background .25s,box-shadow .25s;animation:dhiP 1.8s ease-in-out infinite}
tr.d-hi td{background:color-mix(in srgb,var(--gold) 20%,transparent)!important}
@keyframes dhiP{50%{box-shadow:0 0 0 4px color-mix(in srgb,var(--gold) 32%,transparent)}}
@media (prefers-reduced-motion:reduce){.d-hi{animation:none}}
.nseg{border-radius:4px;padding:0 1px}                 /* 가이드 본문 문장 청크 */
/* 지금 읽는 문장 자막 — 내레이션 중에만, 터치는 통과 */
#narrCap{position:fixed;left:50%;bottom:14px;transform:translateX(-50%);
  max-width:min(680px,92vw);z-index:49;display:none;pointer-events:none;
  background:color-mix(in srgb,var(--washi-2) 94%,transparent);border:1px solid var(--line-2);
  box-shadow:0 6px 24px color-mix(in srgb,var(--sumi) 18%,transparent);border-radius:12px;
  padding:9px 14px;font-size:13.5px;line-height:1.6;color:var(--sumi-2);backdrop-filter:blur(6px)}
#narrCap.on{display:block}
#narrCap.ja{font-size:16.5px;color:var(--sumi);font-weight:600}

/* ── 요미짭짭 이야기 ── */
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin:4px 0 12px}
.vcard{display:block;width:100%;padding:0;text-align:left;overflow:hidden;border:1px solid var(--line);
  border-radius:8px;background:var(--washi-2);box-shadow:var(--shadow);transition:border-color .14s,transform .14s,box-shadow .14s}
.vcard:hover{border-color:var(--matcha);transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.vthumb{position:relative;aspect-ratio:16/9;overflow:hidden;background:var(--shu-t);border-bottom:1px solid var(--line)}
.vthumb img{display:block;width:100%;height:100%;object-fit:cover}
.vplay{position:absolute;right:12px;bottom:10px;width:36px;height:36px;display:grid;place-items:center;
  border-radius:50%;background:color-mix(in srgb,var(--washi-2) 90%,transparent);color:var(--shu);
  box-shadow:0 3px 12px rgba(38,37,29,.18);font-size:14px;padding-left:2px}
.vmeta{padding:12px 14px 13px;min-height:114px}
.vmeta b{display:block;font-family:var(--jp);font-size:16px;font-weight:500;line-height:1.35;margin-bottom:3px}
.vmeta p{font-size:12px;line-height:1.5;color:var(--sumi-2);margin:5px 0 9px;display:-webkit-box;
  -webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.vmeta span{display:block;font-size:11px;color:var(--kasumi);font-family:var(--mono)}
.video-stage{margin:0 0 22px}
.video-stage video{display:block;width:100%;aspect-ratio:16/9;background:#171516;border:1px solid var(--line);
  border-radius:8px;box-shadow:var(--shadow-lg)}
.video-head{display:flex;align-items:flex-start;justify-content:space-between;gap:24px;margin:0 0 14px}
.video-head h3{font-family:var(--jp);font-size:23px;font-weight:400;line-height:1.35;margin:3px 0 0}
.video-head .vh-ja{font-size:12px;color:var(--kasumi);text-align:right;line-height:1.7;flex:0 0 auto}
.video-head .vh-ja span{display:block}.video-head .vh-ja [lang="ja"]{font-family:var(--jp);font-size:15px;color:var(--matcha-d)}
.video-summary{font-size:13px;line-height:1.65;color:var(--sumi-2);max-width:620px;margin:7px 0 0}
.video-stamp{font-family:var(--mono);font-size:10px;color:var(--shu);margin-top:3px}
.video-script{border-top:1px solid var(--line);margin:20px 0 8px}
.vline{display:grid;grid-template-columns:38px minmax(0,1fr);gap:12px;padding:12px 2px;border-bottom:1px solid var(--line)}
.vline .vs{font-family:var(--mono);font-size:10px;color:var(--washi-2);background:var(--matcha);width:28px;height:28px;
  border-radius:50%;display:grid;place-items:center;margin-top:2px}
.vline .vbeat{font-size:10px;font-family:var(--mono);font-weight:700;color:var(--shu);margin-bottom:3px}
.vline .vn{font-size:12.5px;color:var(--sumi-2);line-height:1.55;margin-bottom:6px}
.vline .vj{font-family:var(--jp);font-size:17px;line-height:1.55;overflow-wrap:anywhere}
.vline .vj small{font-family:var(--ko);font-size:10px;font-weight:700;color:var(--matcha-d);margin-right:7px}
.vline .vk{font-size:12.5px;color:var(--sumi-2);line-height:1.55;margin-top:2px}
@media (max-width:560px){
  .video-grid{grid-template-columns:1fr}
  .video-head{display:block}.video-head .vh-ja{text-align:left;margin-top:5px}
}

/* ═══════════ 한자 모듈 ═══════════ */
/* 탭할 수 있는 한자 (예문·낱말 속) */
.kj{cursor:pointer;border-bottom:1px dotted var(--matcha);transition:background .1s}
.kj:hover{background:var(--tint)}

/* 한자 그리드 (평면·고대비, 학년은 텍스트 배지) */
.kgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(98px,1fr));gap:9px;margin:6px 0}
.ktile{position:relative;border:1px solid var(--line);border-radius:9px;background:var(--washi-2);
  padding:13px 8px 11px;text-align:center;cursor:pointer;transition:border-color .12s,transform .1s,box-shadow .12s;overflow:hidden}
.ktile:hover{border-color:var(--matcha);transform:translateY(-2px);box-shadow:var(--shadow)}
.ktile .kc{font-family:var(--jp);font-size:36px;line-height:1.1;color:var(--sumi)}
.ktile .km{font-size:11px;color:var(--sumi-2);margin-top:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ktile .kk{font-family:var(--mono);font-size:10px;color:var(--kasumi);margin-top:1px}
.ktile .gband{position:absolute;left:0;top:0;bottom:0;width:3px}
.ktile.done{border-color:color-mix(in srgb,var(--matcha) 45%,var(--line))}
.ktile.done::after{content:"✓";position:absolute;right:6px;top:5px;color:var(--matcha);font-size:11px;font-family:var(--mono)}
.ktile.weak::after{content:"";position:absolute;right:7px;top:7px;width:5px;height:5px;border-radius:50%;background:var(--shu)}
/* 학년 밴드색 (채도 절제) */
.g-1{background:var(--g1)} .g-2{background:var(--g2)} .g-3{background:var(--g3)}
.g-4{background:var(--gold)} .g-5{background:#7a6293} .g-6{background:#98596e} .g-8{background:var(--kasumi)}
.gbadge{font-family:var(--mono);font-size:10px;border-radius:999px;padding:2px 8px;border:1px solid var(--line-2);color:var(--sumi-2);white-space:nowrap}

/* 렌즈 드로어 (문맥 연결) */
.lens-back{position:fixed;inset:0;background:color-mix(in srgb,var(--sumi) 34%,transparent);z-index:50;opacity:0;pointer-events:none;transition:opacity .18s;backdrop-filter:blur(2px)}
.lens-back.open{opacity:1;pointer-events:auto}
.lens{position:fixed;top:0;right:0;height:100%;width:min(440px,93vw);z-index:51;
  background:var(--washi-2);border-left:1px solid var(--line);box-shadow:var(--shadow-lg);
  transform:translateX(100%);transition:transform .24s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:22px 24px 44px}
.lens.open{transform:translateX(0)}
.lens .lx{position:absolute;right:16px;top:14px;border:0;background:transparent;font-size:24px;color:var(--kasumi);line-height:1;transition:color .12s}
.lens .lx:hover{color:var(--sumi)}
.lens .khead{display:flex;align-items:flex-start;gap:18px;margin:6px 0 16px}
.lens .kbig{font-family:var(--jp);font-size:78px;line-height:1;color:var(--sumi);letter-spacing:0}
.lens .kmeta{font-size:13px;color:var(--sumi-2);padding-top:4px}
.lens .kmeta .khan{font-size:20px;color:var(--matcha-d);font-family:var(--jp)}
.lens .krow{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.lens .ksub{font-family:var(--mono);font-size:11px;color:var(--kasumi);margin:14px 0 4px;text-transform:uppercase;letter-spacing:.1em}
.lens .yomi{font-family:var(--jp);font-size:16px}
.lens .yomi b{color:var(--matcha-d);font-weight:400}
.lens .yomi .kp{font-family:var(--ko);font-size:12px;color:var(--kasumi)}
.lens .occ{border-left:2px solid var(--tint);padding:5px 0 5px 12px;margin:7px 0;cursor:pointer}
.lens .occ:hover{border-left-color:var(--matcha)}
.lens .occ .j{font-family:var(--jp);font-size:17px}
.lens .occ .k{font-size:12px;color:var(--sumi-2)}
.lens .occ .src{font-family:var(--mono);font-size:10px;color:var(--kasumi)}
.lens .none{font-size:12px;color:var(--kasumi);font-style:italic}
.lens .lactions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* 커버리지 바 */
.cov-row{display:grid;grid-template-columns:110px 1fr 74px;align-items:center;gap:12px;margin:9px 0;font-size:13px}
.cov-bar{height:10px;background:var(--line);border-radius:999px;overflow:hidden;position:relative}
.cov-bar i{display:block;height:100%;background:var(--matcha)}
.cov-bar .learned{position:absolute;top:0;left:0;height:100%;background:var(--matcha-d);opacity:.65}
.cov-num{font-family:var(--mono);font-size:12px;color:var(--sumi-2);text-align:right}
.cov-note{font-size:12px;color:var(--kasumi);border-left:2px solid var(--tint);padding-left:11px;margin:14px 0}

.kfilters{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin:2px 0 14px}
.kpage{display:flex;gap:8px;align-items:center;justify-content:center;margin:16px 0;font-size:13px;color:var(--sumi-2)}
</style>

가 나는 아줌마」의 생략된 표현이다."},{"kind":"note","text":"■ 地雷(じらい) 분위기 깨는 사람, 폭탄\n地雷(じらい)의 원래 의미는 지뢰."},{"kind":"note","text":"■ ういてる 주위사람들과 어울리지 못하다, 튀다\n「浮く(う) 뜨다」의 ～ている형으로 '떠 있다'는 의미에서 분위기 못 맞추는 겉도는 사람을 뜻한다."},{"kind":"note","text":"■ 天然(てんねん) 때가 안 묻었다, 순수하다\n원래 의미는 '천연'으로, 인기리에 방영되었던「花より男子(はなよりだんご) 꽃보다 남자」에서 자주 쓰였던 말이다."},{"kind":"note","text":"■ タチノミスト 서서 술 먹는 사람\n주점이나 바(bar) 같은 곳에서 서서 술 마시는 것을 즐기는 사람을 지칭한다.\n일본 드라마에서도 일이 끝난 회사원들이「立ち飲み(たちのみ) 서서 술 마시는 가게」에서 맥주를 즐기는 장면이 자주 나오는데, 이와 관련된 표현으로는「立ち食い(たちぐい) 서서 먹는 가게」「立ち読み(たちよみ) 책을 사지 않고 서점에서 책을 읽는 것」이 있다."},{"kind":"lesson_divider","title":"LESSON 05 동사 1","section_no":"05","examples":[{"jp":"見ます(か)","reading":"みます(か)","ko":"봅니다(까?)","_id":"p018b8e0"},{"jp":"見ません","reading":"みません","ko":"보지 않습니다","_id":"p018b8e1"},{"jp":"見ました(か)","reading":"みました(か)","ko":"봤습니다(까?)","_id":"p018b8e2"},{"jp":"見ませんでした","reading":"みませんでした","ko":"보지 않았습니다","_id":"p018b8e3"},{"jp":"見ましょう","reading":"みましょう","ko":"봅시다(의지)","_id":"p018b8e4"},{"jp":"見ましょうか","reading":"みましょうか","ko":"볼까요?(권유, 제안)","_id":"p018b8e5"},{"jp":"見たい","reading":"みたい","ko":"보고 싶다(희망 표현)","_id":"p018b8e6"},{"jp":"見に行く・来る","reading":"みにいく・くる","ko":"보러 간다・온다(목적)","_id":"p018b8e7"},{"jp":"見ながら","reading":"みながら","ko":"보면서(동시동작)","_id":"p018b8e8"},{"jp":"見なさい","reading":"みなさい","ko":"보세요, 봐라(명령)","_id":"p018b8e9"}]}]},{"page_index":19,"book_pages":"46-47","lesson":"05 동사 1","section":"본문","blocks":[{"kind":"section_header","section_no":"01","title":"주요 동사"},{"kind":"vocab_list","section_no":"01","title":"주요 동사","vocab":[{"word":"会う","reading":"あう","meaning_ko":"만나다"},{"word":"開く","reading":"あく","meaning_ko":"열리다"},{"word":"開ける","reading":"あける","meaning_ko":"열다"},{"word":"あげる","reading":"","meaning_ko":"주다"},{"word":"遊ぶ","reading":"あそぶ","meaning_ko":"놀다"},{"word":"浴びる","reading":"あびる","meaning_ko":"들쓰다 (물을 뒤집어쓰다)"},{"word":"洗う","reading":"あらう","meaning_ko":"씻다"},{"word":"ある","reading":"","meaning_ko":"(사물, 식물) 있다"},{"word":"歩く","reading":"あるく","meaning_ko":"걷다"},{"word":"言う","reading":"いう","m 와 형태로 구별된다. 전문은 명사·형용사에 보통형이 그대로 붙는다(医者だそうだ)."}},{"kind":"conjugation_table","title":"전문 そうだ 활용표","columns":["","현재","부정","과거","부정"],"rows":[["명사","雨だそうだ","雨じゃないそうだ","雨だったそうだ","雨じゃなかったそうだ"],["な형용사","元気だそうだ","元気じゃないそうだ","元気だったそうだ","元気じゃなかったそうだ"],["い형용사","おいしいそうだ","おいしくないそうだ","おいしかったそうだ","おいしくなかったそうだ"],["동사","降るそうだ","降らないそうだ","降ったそうだ","降らなかったそうだ"]]},{"kind":"section_header","section_no":"02","title":"추측 ~인 것 같다"},{"kind":"grammar_point","pattern":"동사의 ます형, い・な형용사 어간 + そうだ","meaning_ko":"1) そうだ 시각에 의한 인상(양태)","text":"실제로 보고 느낀 모습이나 상태로 확인은 못 했지만 외견상 판단해서 그런 성질이나 상태 (형용사의 경우에는 시각에 의한 인상이 많다.)  접속: 동사의 ます형, い・な형용사 어간 + そうだ","examples":[{"jp":"このケーキはおいしそうです。","reading":"このケーキはおいしそうです。","ko":"이 케이크는 맛있어 보입니다.","_id":"p046b4e0","ko_gen":true},{"jp":"みんな元気そうです。","reading":"みんなげんきそうです。","ko":"모두 건강해 보입니다.","_id":"p046b4e1","ko_gen":true},{"jp":"韓国チームが勝ちそうです。","reading":"かんこくチームがかちそうです。","ko":"한국 팀이 이길 것 같습니다.","_id":"p046b4e2","ko_gen":true},{"jp":"今日は雨が降りそうにないですね。","reading":"きょうはあめがふりそうにないですね。","ko":"오늘은 비가 올 것 같지 않네요.","_id":"p046b4e3","ko_gen":true}],"tip":{"when":"직접 보고 '~해 보인다, ~할 것 같다'는 겉모습 인상을 말할 때 쓴다. 동사는 ます형, 형용사는 어간에 そうだ를 붙인다(おいしい→おいしそう).","mistake":"いい와 ない는 예외로 よさそう, なさそう가 된다. 「おいしいそう」처럼 い를 남기면 전문이 되어 뜻이 달라진다."}},{"kind":"grammar_point","pattern":"보통형 + ようだ(현재형인 경우 な형용사 + な~, 명사 + の~)","meaning_ko":"2) ようだ・みたいだ 직관적 판단(불확실), 비유, 추측","text":"● 비유와 예시: 모습이나 상태를 뭔가에 비유해서 나타내거나 어떤 것을 구체적으로 예시할 때 쓰는 표현으로 앞에는 주로 まるで(마치)、あたかも(흡사)、さも(자못) 등이 온다.\n● 불확실한 단정: 명확한 근거는 없으나 극히 주관적인 판단을 내릴 때나 직관적인 인상을 받았을 때 쓰는 표현으로 '잘 모르겠지만 아마 ~같은 생각이 든다, ~일 것 같다'로 ~ような気がする、~ように思う의 형이 많다.\n접속: 보통형 + ようだ(현재형인 경우 な형용사 + な~, 명사 + の~)","examples":[{"jp":"あの人形はまるで人間のようですね。(=人間みたいですね。)","reading":"あのにんぎょうはまるでにんげんのようですね。(=にんげんみたいですね。)","ko":"저 인형은 마치 인간 같네요. (=사람 같네요.)","note":"→ 비유","_id":"p046b5e0","ko_gen":true},{"jp":"田中さんのように(=田中さんみたいに)真面目な人はあまりいませんよ。","reading":"たなかさんのように(=たなかさんみたいに)まじめなひとはあまりいませんよ。","ko":"다나카 씨처럼 (=다나카 씨같이) 성실한 사람은 별로 없어요.","note":"→ 예시","_id":"p046b5e1","ko_gen":true},{"jp":"山田さんは今忙しいようです。(=忙しいみたいです。)","reading":"やまださんはいまいそがしいようです。(=いそがしいみたいです。)","ko":"야마다 씨는 지금 바쁜 것 같습니다. (=바쁜 것 같아요.)","note":"→ 불확실한 단정","_id":"p046b5e2","ko_gen":true},{"jp":"あの話はどこかで聞いたようです。(聞いたみたいです。)","reading":"あのはなしはどこかできいたようです。(きいたみたいです。)","ko":"저 이야기는 어디선가 들은 것 같습니다. (들은 것 같아요.)","note":"→ 불확실한 단정","_id":"p046b5e3","ko_gen":true}],"tip":{"when":"근거를 바탕으로 '~인 것 같다'고 추측하거나 '마치 ~같다'고 비유할 때 ようだ를 쓴다. 회화체는 みたいだ.","mistake":"접속에 주의한다. な형용사는 「〜な+ようだ」, 명사는 「〜の+ようだ」이지만 みたいだ는 명사·어간에 바로 붙는다."}}]},{"page_index":47,"book_pages":"100-101","lesson":"11 기타","section":"본문","blocks":[{"kind":"grammar_point","pattern":"동사현재형 + ように / ないように","meaning_ko":"~하도록, ~하게 / 하지 않도록","examples":[{"jp":"よくわかるようにゆっくり話してください。","reading":"よくわかるようにゆっくりはなしてください。","ko":"잘 알 수 있도록 천천히 말해 주세요.","_id":"p047b0e0","ko_gen":true},{"jp":"遅刻しないように早く起きましょう。","reading":"ちこくしないようにはやくおきましょう。","ko":"지각하지 않도록 일찍 일어납시다.","_id":"p047b0e1","ko_gen":true}],"tip":{"when":"'~하도록/~하게'라는 목적이나 바람을 말할 때 동사에 ように를 붙인다. 부정은 「〜ないように」다.","mistake":"앞에는 주로 가능형·무의지동사(わかる, できる)가 온다. 뒤에는 부탁·노력 표현이 자주 이어진다."}},{"kind":"grammar_point","pattern":"らしい","meaning_ko":"객관적 판단(확실), 정보나 경험에 의한 추측","examples":[{"jp":"火事の原因はたばこの火らしいです。","reading":"かじのげんいんはたばこのひらしいです。","ko":"화재의 원인은 담뱃불인 것 같습니다.","_id":"p047b1e0","ko_gen":true},{"jp":"あのレストランはいつも込んでいます。→ あのレストランはおいしいらしいです。","reading":"あのレストランはいつもこんでいます。→ あのレストランはおいしいらしいです。","ko":"저 레스토랑은 언제나 붐빕니다. → 저 레스토랑은 맛있는 것 같습니다.","_id":"p047b1e1","ko_gen":true},{"jp":"あの人はいつも暇らしいですね。","reading":"あのひとはいつもひまらしいですね。","ko":"저 사람은 언제나 한가한 것 같네요.","_id":"p047b1e2","ko_gen":true},{"jp":"山田さんは会社を辞めたらしいです。","reading":"やまださんはかいしゃをやめたらしいです。","ko":"야마다 씨는 회사를 그만둔 것 같습니다.","_id":"p047b1e3","ko_gen":true}],"tip":{"when":"보고 들은 객관적 정보나 근거를 바탕으로 '~인 듯하다'고 비교적 확실하게 추측할 때 らしい를 쓴다.","mistake":"명사·형용사 어간에 바로 붙는다(火らしい). 「〜だらしい」처럼 だ를 넣지 않는다."}},{"kind":"note","text":"어떤 상황에 대해서 단정적으로 말할 수는 없으나 그때의 여러 가지 정보나 객관적인 근거를 바탕으로 거의 사실이라고 판단될 때 → 보았거나 들었기 때문에 반드시 그럴 것임에 틀림없다고 생각한 것을 전할 때"},{"kind":"note","text":"접속: 보통형 + らしい(현재형인 경우 な형용사 어간·명사 + ~)"},{"kind":"grammar_point","pattern":"명사 + らしい","meaning_ko":"-답다","examples":[{"jp":"花子さんは女らしい服装をしていますね。","reading":"はなこさんはおんならしいふくそうをしていますね。","ko":"하나코 씨는 여성스러운 옷차림을 하고 있네요.","_id":"p047b4e0","ko_gen":true}],"tip":{"when":"명사에 붙여 '그 이름에 걸맞은 전형적인 모습'이라고 말할 때 쓴다. 예: 男らしい는 남자다운.","mistake":"형용사 ~らしい(추측 '~인 것 같다')와 혼동하지 말 것. 여기서는 명사에 붙는 '~답다'다."}},{"kind":"section_header","section_no":"4)","title":"そうだ / ようだ・みたいだ / らしい 활용표"},{"kind":"conjugation_table","title":"そうだ / ようだ・みたいだ / らしい 활용표","columns":["品詞","そうだ","ようだ","みたいだ","らしい"],"rows":[["","시각적인 판단","주관적인 판단(불확실) / 비유, 예시","주관적인 판단(불확실) / 비유, 예시","객관적인 근거에 의한 추측(확실), 전문"],["명사","—","雨のようだ","雨みたいだ","雨らしい"],["","雨じゃなさそうだ","雨じゃないようだ","雨じゃないみたいだ","雨じゃないらしい"],["","—","雨だったようだ","雨だったみたいだ","雨だったらしい"],["","雨じゃなさそうだった","雨じゃなかったようだ","雨じゃなかったみたいだ","雨じゃなかったらしい"],["な형용사","元気そうだ","元気なようだ","元気みたいだ","元気らしい"],["","元気じゃなさそうだ","元気じゃないようだ","元気じゃないみたいだ","元気じゃないらしい"],["","元気だったそうだ","元気だったようだ","元気だったみたいだ","元気だったらしい"],["","元気じゃなかったそうだ","元気じゃなかったようだ","元気じゃなかったみたいだ","元気じゃなかったらしい"],["い형용사","おいしそうだ","おいしいようだ","おいしいみたいだ","おいしいらしい"],["","おいしくなさそうだ","おいしくないようだ","おいしくないみたいだ","おいしくないらしい"],["","おいしそうだった","おいしかったようだ","おいしかったみたいだ","おいしかったらしい"],["","おいしくなさそうだった","おいしくなかったようだ","おいしくなかったみたいだ","おいしくなかったらしい"],["동사","降りそうだ","降るようだ","降るみたいだ","降るらしい"],["","降りそうにもない","降らないようだ","降らないみたいだ","降らないらしい"],["","降りそうだった","降ったようだ","降ったみたいだ","降ったらしい"],["","降りそうにもなかった","降らなかったようだ","降らなかったみたいだ","降らなかったらしい"]]},{"kind":"note","text":"＊ いい → よさそうだ / ない → なさそうだ"}]},{"page_index":48,"book_pages":"102-103","lesson":"11 기타","section":"본문","blocks":[{"kind":"section_header","section_no":"02","title":"가정·조건 (ば/たら/と/なら)"},{"kind":"grammar_point","pattern":"ば ~하면(조건가정)","meaning_ko":"'~하면, ~하겠다'는 조건을 나타내는 가정표현으로 논리나 이치, 속담, 반복, 습관 등에 주로 쓰인다. 앞에 동작성 동사가 오는 경우 의지, 명령, 희망, 권유표현과 과거형은 올 수 없다. (단, 상태성 동사와 형용사는 가능하다.)","examples":[{"jp":"春が来れば花が咲きます。","reading":"はるがくればはながさきます。","ko":"봄이 오면 꽃이 핍니다.","note":"→ 자연의 이치","_id":"p048b1e0","ko_gen":true},{"jp":"住めば都。","reading":"すめばみやこ 니 문맥으로 구분한다."}}]},{"page_index":49,"book_pages":"104-105","lesson":"11 기타","section":"본문","blocks":[{"kind":"grammar_point","examples":[{"jp":"週末になったら、国へ帰ろうと思います。","reading":"しゅうまつになったら、くにへかえろうとおもいます。","ko":"주말이 되면 고향에 돌아가려고 합니다.","note":"→ 의지","_id":"p049b0e0","ko_gen":true}]},{"kind":"grammar_point","title":"활용","pattern":"〜たらどうですか","meaning_ko":"〜하는 게 어떻습니까? (권유, 충고)","examples":[{"jp":"もっとゆっくり休んだらどうですか。","reading":"もっとゆっくりやすんだらどうですか。","ko":"좀 더 푹 쉬는 게 어떻습니까?","_id":"p049b1e0","ko_gen":true},{"jp":"一緒に行ったらどうですか。","reading":"いっしょにいったらどうですか。","ko":"같이 가는 게 어떻습니까?","_id":"p049b1e1","ko_gen":true}],"tip":{"when":"상대에게 '~하는 게 어때요?'라고 부드럽게 권하거나 충고할 때 쓴다.","mistake":"동사 과거형(た형)에 접속한다(休む→休んだら). 아랫사람이 윗사람에게 쓰면 다소 무례할 수 있다."}},{"kind":"grammar_point","section_no":"3","pattern":"と","meaning_ko":"〜하면 (반드시) 〜한다, 〜하자마자","text":"자연·심리·기계·길 안내·습관 등 변함없는 진리나 객관적인 설명문에 자주 사용되며 어떤 동작이 이루어진 후에 이어서 다른 동작이 일어나는 경우, 또 뒷 사항에 과거형이 올 경우에는 동시성과 발견성을 나타낸다. 뒷 문장에 명령·의지·희망·권유 등의 표현이 올 수 없다.","examples":[{"jp":"春になると、暖かくなります。","reading":"はるになると、あたたかくなります。","ko":"봄이 되면 따뜻해집니다.","note":"→ 자연","_id":"p049b2e0","ko_gen":true},{"jp":"この道をまっすぐ行くと、交番があります。","reading":"このみちをまっすぐいくと、こうばんがあります。","ko":"이 길을 곧장 가면 파출소가 있습니다.","note":"→ 길 안내","_id":"p049b2e1","ko_gen":true},{"jp":"1に2を足すと3になります。","reading":"いちににをたすとさんになります。","ko":"1에 2를 더하면 3이 됩니다.","note":"→ 숫자","_id":"p049b2e2","ko_gen":true},{"jp":"テレビをつけると、私の好きなドラマをやっていました。","reading":"テレビをつけると、わたしのすきなドラマをやっていました。","ko":"텔레비전을 켰더니 내가 좋아하는 드라마를 하고 있었습니다.","note":"→ 동시성과 발견성","_id":"p049b2e3","ko_gen":true},{"jp":"時間になると、帰れ。(×) → 時間になったら(○)","reading":"じかんになると、かえれ。","ko":"시간이 되면 돌아가라.(×) → 時間になったら(○)","note":"→ 명령표현은 올 수 없다.","_id":"p049b2e4","ko_gen":true},{"jp":"時間になると、帰ろう。(×) → 時間になったら(○)","reading":"じかんになると、かえろう。","ko":"시간이 되면 돌아가자. (×) → 시간이 되면(○)","note":"→ 의지표현은 올 수 없다.","_id":"p049b2e5","ko_gen":true}],"tip":{"when":"'봄이 되면 반드시 따뜻해진다'처럼 자연법칙·기계 조작 등 필연적 결과를 말할 때 쓴다.","mistake":"と 뒤에는 의지·명령·권유를 쓸 수 없다. 예문 日本へ旅行するといい는 어색하고 なら/たら가 자연스럽다."}},{"kind":"grammar_point","title":"활용","pattern":"〜といいですね / 〜といいんですが","meaning_ko":"〜하면 좋겠는데(희망실현의 기대표현)","examples":[{"jp":"日本へ旅行すると、いいですね。","reading":"にほんへりょこうすると、いいですね。","ko":"일본으로 여행 가면 좋겠네요.","_id":"p049b3e0","ko_gen":true},{"jp":"彼女が来ると、いいんですが。","reading":"かのじょがくると、いいんですが。","ko":"그녀가 오면 좋겠는데요.","_id":"p049b3e1","ko_gen":true}],"tip":{"when":"'~하면 좋겠는데'라고 아직 이뤄지지 않은 일에 대한 바람을 말할 때 쓴다.","mistake":"뒤에 걱정·아쉬움이 이어질 땐 ~といいんですが로 끝을 흐린다."}},{"kind":"grammar_point","section_no":"4","pattern":"なら","meaning_ko":"〜라면, 〜하면(한정·가정조건)","text":"상대방의 이야기를 근거로 가정을 나타낼 때 판단·의지·요구·명령·제안 등의 표현이 올 수 있다. 또 뒷 사항이 앞 사항보다 시간적으로 먼저 일어날 경우에는 오직 なら뿐이며 뒷 문장에 과거가 올 수 없다.","examples":[{"jp":"寿司なら、やっぱり日本だ。","reading":"すしなら、やっぱりにほんだ。","ko":"초밥이라면 역시 일본이다.","note":"→ 화제","_id":"p049b4e0","ko_gen":true},{"jp":"A「ビール飲みたいな。」 B「ビールを飲むなら、あの店がいいです。」","reading":"A「ビールのみたいな。」 B「ビールをのむなら、あのみせがいいです。」","ko":"A「맥주 마시고 싶다.」 B「맥주를 마신다면 저 가게가 좋아요.」","note":"→ 상대방의 이야기를 근거로 한 가정","_id":"p049b4e1","ko_gen":true},{"jp":"あなたが図書館へ行くなら、車を貸してあげます。（貸してあげる → 図書館へ行く）","reading":"あなたがとしょかんへいくなら、くるまをかしてあげます。","ko":"당신이 도서관에 간다면 차를 빌려줄게요.","note":"→ 뒷 사항이 앞 사항보다 시간적으로 앞선다.","_id":"p049b4e2","ko_gen":true},{"jp":"会社へ行くなら、昔の友達に会いました。(×)","reading":"かいしゃへいくなら、むかしのともだちにあいました。","ko":"회사에 간다면 옛 친구를 만났습니다. (×)","note":"→ 뒷 문장에 과거가 올 수 없다.","_id":"p049b4e3","ko_gen":true}],"tip":{"when":"상대 말을 받아 '초밥이라면 역시 일본이지'처럼 화제를 한정해 가정할 때 쓴다.","mistake":"명사에 바로 붙는다. と/ば/たら와 달리 뒷일이 앞일보다 먼저 일어날 수도 있다."}}]},{"page_index":50,"book_pages":"106-107","lesson":"11 기타","section":"본문","blocks":[{"kind":"section_header","section_no":"5","title":"ば / たら / と / なら의 활용표"},{"kind":"conjugation_table","title":"ば / たら / と / なら의 활용표","columns":["품사","ば","たら","と","なら"],"rows":[["","조건가정 / 논리·이치·속담","확정조건 / 거의 모든 가정","필연적, 습관적, 진리, / 길 안내, 숫자","한정·가정조건 / 화제를 꺼낼 때"],["명사","—","学生だったら / 学生じゃなかったら","学生だと / 学生じゃないと","学生なら / 学生じゃないなら"],["な형용사","—","元気だったら / 元気じゃなかったら","元気だと / 元気じゃないと","元気なら / 元気じゃないなら"],["い형용사","おいしければ / おいしくなければ / ※ いい → よければ / よくなければ / ない → なければ","おいしかったら / おいしくなかったら","おいしいと / おいしくないと","おいしいなら / おいしくないなら"],["동사","降れば / 降らなければ","降ったら / 降らなかったら","降ると / 降らないと","降るなら / 降らないなら"]]},{"kind":"section_header","section_no":"03","title":"경어"},{"kind":"grammar_point","pattern":"「お」, 「ご」","meaning_ko":"공손, 존경의 접두어로 외래어에는 붙이지 않는다.","tip":{"when":"명사 앞에 붙여 말을 공손·정중하게 만들 때 쓴다(お水, ご飯).","mistake":"コーヒー 같은 외래어에는 붙이지 않는다."}},{"kind":"grammar_point","pattern":"「お」お + 일본고유어","meaning_ko":"(훈독, 순수한 일본어, 한자 하나이나 말이 많다)","examples":[{"jp":"お暑くなる","reading":"おあつくなる","ko":"더워지시다","_id":"p050b4e0","ko_gen":true},{"jp":"お美しい","reading":"おうつくしい","ko":"아름다우시다","_id":"p050b4e1","ko_gen":true},{"jp":"お帰り","reading":"おかえり","ko":"돌아오심","_id":"p050b4e2","ko_gen":true},{"jp":"お手紙","reading":"おてがみ","ko":"편지","_id":"p050b4e3","ko_gen":true},{"jp":"お話","reading":"おはなし","ko":"이야기","_id":"p050b4e4","ko_gen":true},{"jp":"お姉さん","reading":"おねえさん","ko":"누나(언니)","_id":"p050b4e5","ko_gen":true},{"jp":"お願い","reading":"おねがい","ko":"부탁","_id":"p050b4e6","ko_gen":true}],"tip":{"when":"훈독의 순수 일본어 명사·형용사 앞에는 주로 「お」를 붙인다(お名前, お暑い).","mistake":"한자어(음독)에는 대개 「ご」를 붙인다(ご住所). お와 ご를 뒤섞지 않도록 주의한다."}},{"kind":"grammar_point","pattern":"「ご」ご + 한자어","meaning_ko":"(음독, 중국 한자어, 한자 두 개인 말이 많다)","examples":[{"jp":"ご案内","reading":"ごあんない","ko":"안내","_id":"p050b5e0","ko_gen":true},{"jp":"ご結婚","reading":"ごけっこん","ko":"결혼","_id":"p050b5e1","ko_gen":true},{"jp":"ご説明","reading":"ごせつめい","ko":"설명","_id":"p050b5e2","ko_gen":true},{"jp":"ご相談","reading":"ごそうだん","ko":"상담","_id":"p050b5e3","ko_gen":true},{"jp":"ご旅行","reading":"ごりょこう","ko":"여행","_id":"p050b5e4","ko_gen":true},{"jp":"ご入学","reading":"ごにゅうがく","ko":"입학","_id":"p050b5e5","ko_gen":true}],"tip":{"when":"한자어 명사 앞에 붙여 정중하게 말할 때 쓴다 (예: ご案内, ご連絡).","mistake":"고유어(훈독) 말에는 보통 「お」를 쓰므로 「ご」와 「お」를 붙일 대상을 헷갈리지 않는다."}},{"kind":"note","text":"※예외: お仕事, お時間, お掃除, お電話, お名前, お勉強, お料理"},{"kind":"note","text":"★「お」,「ご」는 공손, 존경의 의미가 아니라 말을 곱게 표현하려는 여성어나 관용적으로 사용하는 경우가 많다. お菓子, お米, お茶, お酒, お箸, お花, お早う, ご飯"},{"kind":"grammar_point","pattern":"존경어","meaning_ko":"상대방의 동작이나 상태를 높여 부르는 말","tip":{"when":"손윗사람이나 손님의 행동·상태를 높여 말할 때 쓴다.","mistake":"자기 자신이나 내 편(우리 회사 사람 등)의 행동에는 존경어를 쓰지 않는다."}},{"kind":"grammar_point","pattern":"お(ご) + ます형 + になる","meaning_ko":"~하시다, 상대방에게 직접 쓴다.","examples":[{"jp":"この雑誌をお読みになりましたか。","reading":"このざっしをおよみになりましたか。","ko":"이 잡지를 읽으셨습니까?","_id":"p050b9e0","ko_gen":true},{"jp":"田中さんはもうお帰りになりました。","reading":"たなかさんはもうおかえりになりました。","ko":"다나카 씨는 벌써 돌아가셨습니다.","_id":"p050b9e1","ko_gen":true},{"jp":"薬はお飲みになりますか。","reading":"くすりはおのみになりますか。","ko":"약은 드시겠습니까?","_id":"p050b9e2","ko_gen":true}],"tip":{"when":"눈앞의 윗사람에게 \"~하셨습니까?\"처럼 그 사람의 행동을 높일 때 쓴다.","mistake":"자기 행동에 붙이면 틀리고, 「お読みになる」의 する 활용은 「なる」쪽을 활용시킨다."}},{"kind":"grammar_point","pattern":"〜(ら)れる","meaning_ko":"~하시다, 주로 남성들이 쓰는 경어로 비즈니스 등에서 직접 쓴다.","examples":[{"jp":"何時ごろ空港へ着かれますか。","reading":"なんじごろくうこうへつかれますか。","ko":"몇 시쯤 공항에 도착하십니까?","_id":"p050b10e0","ko_gen":true},{"jp":"この書類は誰が送られましたか。","reading":"このしょるいはだれがおくられましたか。","ko":"이 서류는 누가 보내셨습니까?","_id":"p050b10e1","ko_gen":true},{"jp":"部長は出張で日本へ行かれましたが、明日帰られます。","reading":"ぶちょうはしゅっちょうでにほんへいかれましたが、あしたかえられます。","ko":"부장님은 출장으로 일본에 가셨지만, 내일 돌아오십니다.","_id":"p050b10e2","ko_gen":true}],"tip":{"when":"비즈니스 대화에서 「着かれます」처럼 동사에 (ら)れる를 붙여 가볍게 높일 때 쓴다.","mistake":"수동·가능형과 형태가 같으니 문맥으로 존경 의미인지 구분해야 한다."}}]},{"page_index":51,"book_pages":"108-109","lesson":"11 기타","section":"본문","blocks":[{"kind":"grammar_point","pattern":"お(ご)＋ます형＋(になって)＋ください","meaning_ko":"～하십시오(존경어의 의뢰표현)","examples":[{"jp":"ここでしばらくお待ち(になって)ください。","reading":"ここでしばらくおまちになってください。","ko":"여기서 잠시 기다려 주십시오.","_id":"p051b0e0","ko_gen":true},{"jp":"どうぞお入り(になって)ください。","reading":"どうぞおはいりになってください。","ko":"어서 들어오십시오.","_id":"p051b0e1","ko_gen":true},{"jp":"ここにお名前をお書き(になって)ください。","reading":"ここにおなまえをおかきになってください。","ko":"여기에 성함을 적어 주십시오.","_id":"p051b0e2","ko_gen":true}],"tip":{"when":"윗사람에게 \"잠시 기다려 주십시오\"처럼 정중히 부탁·안내할 때 쓴다.","mistake":"「ください」만 쓰면 덜 정중하니 격식 자리에선 お+ます형을 앞에 붙인다."}},{"kind":"section_header","section_no":"3","title":"겸양어 : 자기나 자기 쪽 사람을 낮추는 말"},{"kind":"gramma ,"8×4=32 はちしさんじゅうに","9×4=36 くしさんじゅうろく"],["1×5=5 いんごがご","2×5=10 にごじゅう","3×5=15 さんごじゅうご","4×5=20 しごにじゅう","5×5=25 ごごにじゅうご","6×5=30 ろくごさんじゅう","7×5=35 しちごさんじゅうご","8×5=40 はちごしじゅう","9×5=45 くごしじゅうご"],["1×6=6 いんろくがろく","2×6=12 にろくじゅうに","3×6=18 さぶろくじゅうはち","4×6=24 しろくにじゅうし","5×6=30 ごろくさんじゅう","6×6=36 ろくろくさんじゅうろく","7×6=42 しちろくしじゅうに","8×6=48 はちろくしじゅうはち","9×6=54 くろくごじゅうし"],["1×7=7 いんしちがしち","2×7=14 にしちじゅうし","3×7=21 さんしちにじゅういち","4×7=28 ししちにじゅうはち","5×7=35 ごしちさんじゅうご","6×7=42 ろくしちしじゅうに","7×7=49 しちしちしじゅうく","8×7=56 はちしちごじゅうろく","9×7=63 くしちろくじゅうさん"],["1×8=8 いんはちがはち","2×8=16 にはちじゅうろく","3×8=24 さんぱにじゅうし","4×8=32 しはさんじゅうに","5×8=40 ごはしじゅう","6×8=48 ろくはしじゅうはち","7×8=56 しちはごじゅうろく","8×8=64 はっぱろくじゅうし","9×8=72 くはしちじゅうに"],["1×9=9 いんくがく","2×9=18 にくじゅうはち","3×9=27 さんくにじゅうしち","4×9=36 しくさんじゅうろく","5×9=45 ごくしじゅうご","6×9=54 ろっくごじゅうし","7×9=63 しちくろくじゅうさん","8×9=72 はっくしちじゅうに","9×9=81 くくはちじゅういち"]]}]}],"guides":[{"id":"kana","title":"히라가나·가타카나 읽는 법","summary":"일본어 글자는 가로 5칸 '행(行)'과 세로 '단(段)'으로 이루어진 50음도 표로 외우고, ん·っ·장음·탁음 같은 소리 규칙만 더하면 어떤 단어든 읽을 수 있어요.","intro":"일본어에는 한글의 자음·모음처럼 소리를 적는 두 종류의 글자, 히라가나(ひらがな)와 가타카나(カタカナ)가 있어요. 두 글자는 모양만 다를 뿐 소리는 똑같이 짝을 이루고, 보통 히라가나로 일본어 단어를, 가타카나로 외래어(커튼·컴퓨터 같은 말)를 적어요. 이 50음도 표와 몇 가지 발음 규칙만 익히면 아직 뜻은 몰라도 일본어를 소리 내어 읽을 수 있게 됩니다. 그래서 일본어 공부의 진짜 첫걸음이에요.","sections":[{"heading":"표 읽는 법 — 행(行)과 단(段)","body":"일본어 글자표(50음도)는 규칙적인 격자예요. 교재 설명 그대로, 가로로 늘어선 다섯 글자 묶음을 '행(行)'이라고 하고, 그 이름은 첫 글자를 따서 부릅니다. 예를 들어 か·き·く·け·こ는 'か행', さ·し·す·せ·そ는 'さ행'이에요.\n반대로 세로로 늘어선 글자들은 '단(段)'이라고 하고, 이것도 맨 위 글자를 따서 부릅니다. あ·か·さ·た…처럼 [a] 소리로 끝나는 세로줄은 'あ단', い·き·し…줄은 'い단'이에요. 그래서 단은 あ단·い단·う단·え단·お단 다섯 개가 있어요.\n이 '행/단'이라는 말은 앞으로 동사 활용을 배울 때 계속 나오니(예: 'い단으로 바꾼다') 지금 개념만 잡아두면 큰 도움이 됩니다. 히라가나와 가타카나는 같은 자리에 있는 글자끼리 소리가 완전히 같아요. 예를 들어 あ와 ア는 둘 다 [a]입니다."},{"heading":"기본 글자(청음)와 ん·を","body":"표의 기본 46자를 '청음(맑은 소리)'이라고 불러요. 대부분은 '자음+모음' 한 소리씩이라 보이는 대로 읽으면 됩니다. 다만 규칙에서 살짝 벗어나는 글자 몇 개만 조심하세요.\nし는 [shi](시), ち는 [chi](치), つ는 [tsu](츠), ふ는 [hu/fu](후에 가까움)로, [si]·[ti]·[tu]·[hu]를 곧이곧대로 읽지 않아요.\nや행은 や[ya]·ゆ[yu]·よ[yo] 세 글자뿐이고, わ행은 わ[wa]와 を만 있어요. を는 모양은 'wo'처럼 보여도 실제 소리는 [o]로, あ행의 お와 발음이 같습니다. を는 오직 목적어를 나타내는 조사('~을/를')로만 쓰여요.\n 마지막 ん[n]은 표 맨 아래 홀로 있는 글자로, 받침(ㄴ·ㅁ·ㅇ 등) 역할을 하는 특별한 소리예요. 뒤에 자세히 다룹니다.","table":{"columns":["あ단[a]","い단[i]","う단[u]","え단[e]","お단[o]"],"rows":[["あ a","い i","う u","え e","お o"],["か ka","き ki","く ku","け ke","こ ko"],["さ sa","し shi","す su","せ se","そ so"],["た ta","ち chi","つ tsu","て te","と to"],["な na","に ni","ぬ nu","ね ne","の no"],["は ha","ひ hi","ふ hu","へ he","ほ ho"],["ま ma","み mi","む mu","め me","も mo"],["や ya","","ゆ yu","","よ yo"],["ら ra","り ri","る ru","れ re","ろ ro"],["わ wa","","","","を o"],["","","","","ん n"]]}},{"heading":"탁음·반탁음·요음 — 점 두 개와 동그라미","body":"글자 오른쪽 위에 점 두 개(゛)나 작은 동그라미(゜)를 붙이면 소리가 바뀌어요.\n탁음(゛): か행→が행[ga], さ행→ざ행[za], た행→だ행[da], は행→ば행[ba]으로 흐린 소리가 됩니다. 즉 か[ka]에 점을 붙이면 が[ga]예요. 여기서 じ와 ぢ는 둘 다 [ji], ず와 づ는 둘 다 [zu]로 소리가 같은데, 현대 일본어에서는 거의 じ·ず를 씁니다.\n반탁음(゜): は행에만 붙어 ぱ행[pa]이 돼요. は[ha]→ぱ[pa]처럼요.\n요음: い단 글자(き·し·ち·に·ひ·み·り 등)에 작은 や·ゆ·よ를 붙여 한 소리처럼 읽는 것이에요. きゃ[kya]·きゅ[kyu]·きょ[kyo]처럼 두 글자가 합쳐져 한 박자로 발음됩니다. 여기서 や·ゆ·よ는 반드시 '작게' 써야 해요.","table":{"columns":["탁음/반탁음","あ단","い단","う단","え단","お단"],"rows":[["が행","が ga","ぎ gi","ぐ gu","げ ge","ご go"],["ざ행","ざ za","じ ji","ず zu","ぜ ze","ぞ zo"],["だ행","だ da","ぢ ji","づ zu","で de","ど do"],["ば행","ば ba","び bi","ぶ bu","べ be","ぼ bo"],["ぱ행","ぱ pa","ぴ pi","ぷ pu","ぺ pe","ぽ po"]]},"examples":[{"jp":"きょう","reading":"きょう","ko":"오늘 (요음+장음)"},{"jp":"しゃしん(写真)","reading":"しゃしん","ko":"사진"},{"jp":"でんき(電気)","reading":"でんき","ko":"전기 (탁음 で)"}]},{"heading":"특별한 소리 — ん(발음)·っ(촉음)·장음","body":"글자를 다 외워도 이 세 가지 '길이·받침' 소리를 알아야 진짜로 정확히 읽을 수 있어요. 세 가지 모두 한 박자(한 모라)를 차지한다는 게 핵심이에요.\n발음 ん: 받침 소리예요. 신기하게도 뒤에 오는 글자에 따라 실제 소리가 조금씩 달라집니다. 교재 정리대로, ま·ば·ぱ행 앞에서는 [ㅁ](しんぶん→'심분'에 가까움), さ·ざ·た·だ·な·ら행 앞에서는 [ㄴ], か·が행 앞에서는 [ㅇ]으로 들려요. 하지만 우리가 쓸 때는 언제나 똑같이 ん으로 적으면 되니 걱정 마세요.\n촉음 っ: 작은 つ예요. 우리말 된소리 받침처럼 살짝 멈췄다가 다음 소리를 내요. がっこう(학교)는 '각코-'처럼 '가っ'에서 한 박 멈춥니다. 반드시 작게 써야 하고, 큰 つ[tsu]와 헷갈리면 안 돼요.\n장음: 모음을 길게 두 박자로 늘여 읽는 것이에요. あ단 뒤 あ, い단 뒤 い, う단 뒤 う, え단 뒤 え나 い, お단 뒤 お나 う가 오면 앞 모음을 길게 끕니다. 길이 하나로 뜻이 완전히 달라지니(おばさん 아주머니 ↔ おばあさん 할머니) 아주 중요해요.","examples":[{"jp":"しんぶん(新聞)","reading":"しんぶん","ko":"신문 (ん 받침)"},{"jp":"がっこう(学校)","reading":"がっこう","ko":"학교 (촉음 っ + 장음)"},{"jp":"おかあさん","reading":"おかあさん","ko":"어머니 (あ단+あ 장음)"},{"jp":"こうこう(高校)","reading":"こうこう","ko":"고등학교 (お단+う 장음)"}]},{"heading":"は·へ의 예외 발음과 가타카나 표기","body":"히라가나 は와 へ는 조사로 쓰일 때 소리가 바뀌어요. 교재에 나온 두 예외입니다.\nは가 '~은/는'을 뜻하는 조사일 때는 [ha]가 아니라 [wa]로 읽어요. これはほんです(이것은 책입니다)는 '고레와 혼데스'라고 읽습니다. 단어 안의 は(예: はな 꽃)는 그대로 [ha]예요.\nへ가 '~로/에'를 뜻하는 방향 조사일 때는 [he]가 아니라 [e]로 읽어요. にほんへ(일본에)는 '니혼에'가 됩니다.\n가타카나는 외래어를 적을 때 쓰는데, 몇 가지 표기 습관이 있어요. 장음은 히라가나처럼 모음을 겹치지 않고 긴 막대 'ー'로 나타내요(カーテン 커튼, スーパー 슈퍼마켓). 또 일본어에 원래 없는 소리는 조합으로 표현해요: [f]는 ファ·フィ·フ·フェ·フォ(フランス 프랑스), [v]는 ヴァ·ヴィ·ヴ·ヴェ·ヴォ(또는 バ행), [ti]·[di]는 ティ·ディ(ティー 티, パーティー 파티)처럼요.","examples":[{"jp":"これは本です。","reading":"これはほんです","ko":"이것은 책입니다. (は=wa)"},{"jp":"日本へ行きます。","reading":"にほんへいきます","ko":"일본에 갑니다. (へ=e)"},{"jp":"コーヒー","reading":"コーヒー","ko":"커피 (가타카나 장음 ー)"}]}],"mistakes":[{"wrong":"これは[ha]ほんです","right":"これは[wa]ほんです","note":"조사 は는 '하'가 아니라 '와'로 읽어요. 초보자가 가장 많이 틀리는 부분이에요. 단어 속의 は(はな 꽃)는 '하'로 읽지만, '~은/는'을 나타내는 조사 자리에서만 '와'가 됩니다. へ도 조사일 때 '헤'가 아니라 '에'로 바뀌는 짝 규칙이에요."},{"wrong":"おばさん(할머니)","right":"おばあさん(할머니)","note":"장음(길이)을 빼먹으면 뜻이 달라져요. おばさん은 '아주머니', おばあさん은 '할머니'예요. 마찬가지로 おじさん(아저씨)과 おじいさん(할아버지)도 딱 한 글자 길이 차이입니다. 일본어에서 소리 길이는 우리말 받침만큼 중요하니 あ·い를 대충 흘리면 안 돼요."},{"note":"작은 글자(っ, ゃゅょ)를 큰 글자로 쓰면 완전히 다른 소리가 돼요. きって(우표, 촉음 っ)를 きつて로 쓰면 안 되고, きょう(오늘, 요음)를 きよう로 쓰면 '기요-'라는 다른 말이 됩니다. 촉음·요음의 つ·や·ゆ·よ는 항상 작게 씁니다."},{"wrong":"を를 [wo]로 발음","right":"を는 [o]로 발음","note":"を는 모양이 'wo' 같아 보여도 실제로는 お와 똑같이 '오'로 읽어요. 그리고 を는 단어를 만드는 글자가 아니라 목적어 '~을/를'을 나타내는 조사로만 쓰입니다. 또 ん으로 시작하는 단어는 없다는 것도 기억해 두세요 — ん은 항상 다른 소리 뒤에 오는 받침이에요."}],"tips":["행(行)은 '가로 5칸', 단(段)은 '세로 계단'이라고 외우세요. 단은 계단(段)처럼 위→아래 あ·い·う·え·お 순서예요. 이 개념은 나중에 동사 활용에서 'い단으로 바꾼다'처럼 계속 쓰여요.","ん의 소리는 억지로 구분하려 애쓰지 마세요. ま·ば·ぱ(입을 다무는 소리) 앞에서는 자연히 'ㅁ'으로 들려요 — 발음 기관이 알아서 바꿔주니 편하게 ん 하나로 적으면 됩니다.","장음·촉음·ん은 모두 '한 박자'를 차지해요. がっこう는 '가-ㄱ-코-'처럼 손뼉 4번(が/っ/こ/う) 치듯 리듬을 세면 길이가 정확해집니다."],"related":["01 문자와 발음"]},{"id":"kosoado","title":"これ·それ·あれ — 지시어 こそあど","summary":"첫 글자 こ(이)·そ(그)·あ(저)·ど(어느)만 익히면 「이것·그곳·저쪽·어느 것」을 전부 규칙적으로 만들 수 있어요.","intro":"こそあど는 무언가를 가리킬 때 쓰는 일본어 지시어예요. 한국어의 「이·그·저·어느」와 거의 1:1로 맞아떨어져서, 첫 글자 こ·そ·あ·ど만 기억하면 사물·장소·방향·꾸미는 말까지 한꺼번에 외울 수 있습니다. 물건을 사거나 길을 묻거나 사진을 보며 이야기할 때 매 순간 쓰이는 가장 기본적인 표현이라, 여기서 규칙을 잡아두면 회화가 훨씬 편해져요.","sections":[{"heading":"こ·そ·あ·ど — 거리의 4단계","body":"일본어 지시어는 첫 글자가 가리키는 '거리'를 정해요. 한국어와 순서가 똑같아서 외우기 쉽습니다.\n\nこ(이) = 말하는 나에게 가까운 것\nそ(그) = 듣는 상대에게 가까운 것\nあ(저) = 나와 상대 둘 다에게서 먼 것\nど(어느) = 모를 때 묻는 말(의문)\n\n한국어 '이/그/저/어느'와 완전히 같은 감각이에요. 특히 そ와 あ의 차이가 포인트인데, 상대 손에 있거나 상대 쪽에 있는 것은 そ(그), 나도 상대도 멀리 떨어져 저기 보이는 것은 あ(저)를 씁니다. ど로 시작하면 무조건 물음(어느/어디/어느 쪽)이 됩니다."},{"heading":"これ·それ·あれ·どれ — '것'을 가리키기","body":"물건(사물) 하나를 콕 집어 가리킬 때 쓰는 가장 기본형이에요. 뒤에 아무 명사도 붙이지 않고 그 자체로 '이것/그것/저것/어느 것'이라는 뜻이 됩니다.\n\nこれ 이것 · それ 그것 · あれ 저것 · どれ 어느 것\n\n대개 뒤에 「は …です(~은 …입니다)」를 붙여 문장을 만들어요. これ 자체가 이미 '이것'이라는 완결된 말이라, 바로 は나 を 같은 조사를 붙일 수 있습니다.","examples":[{"jp":"これは本です。","reading":"これはほんです。","ko":"이것은 책입니다."},{"jp":"それは何ですか。","reading":"それはなんですか。","ko":"그것은 무엇입니까?"},{"jp":"あれは学校です。","reading":"あれはがっこうです。","ko":"저것은 학교입니다."},{"jp":"どれがいいですか。","reading":"どれがいいですか。","ko":"어느 것이 좋습니까?"}]},{"heading":"この·その·あの·どの — 명사를 꾸며 주기","body":"これ·それ·あれ가 '이것/그것'처럼 홀로 쓰는 말이라면, この·その·あの·どの는 반드시 뒤에 명사를 데리고 다니는 '이 ~/그 ~/저 ~/어느 ~'예요. 절대 혼자 쓸 수 없습니다.\n\nこの本 이 책 · その人 그 사람 · あの店 저 가게 · どの色 어느 색\n\n초보자가 가장 많이 헷갈리는 부분이 바로 이 둘의 구분이에요. '이 책'은 この本이지 これ本이 아닙니다. 명사가 바로 뒤에 오면 この 계열, 명사 없이 '이것' 하나로 끝나면 これ 계열이라고 기억하세요.","table":{"columns":["구분","こ (이)","そ (그)","あ (저)","ど (어느)"],"rows":[["사물(것)","これ 이것","それ 그것","あれ 저것","どれ 어느 것"],["명사 수식","この 이~","その 그~","あの 저~","どの 어느~"],["장소","ここ 이곳","そこ 그곳","あそこ 저곳","どこ 어느 곳"],["방향","こちら 이쪽","そちら 그쪽","あちら 저쪽","どちら 어느 쪽"],["방향(반말)","こっち 이쪽","そっち 그쪽","あっち 저쪽","どっち 어느 쪽"]]},"examples":[{"jp":"この本はおもしろいです。","reading":"このほんはおもしろいです。","ko":"이 책은 재미있습니다."},{"jp":"その人は誰ですか。","reading":"そのひとはだれですか。","ko":"그 사람은 누구입니까?"},{"jp":"あの店はどうですか。","reading":"あのみせはどうですか。","ko":"저 가게는 어떻습니까?"}]},{"heading":"ここ·そこ·あそこ / こちら·こっち — 장소와 방향","body":"장소를 가리킬 때는 ここ·そこ·あそこ·どこ를 써요. 여기서 '저곳'만 あそこ로 글자가 하나 늘어나는 점을 꼭 기억하세요(あこ가 아닙니다). 길을 물을 때 자주 나오는 どこ(어디)는 회화 필수 단어예요.\n\n방향은 こちら·そちら·あちら·どちら인데, 친한 사이의 반말에서는 こっち·そっち·あっち·どっち로 짧게 씁니다. 방향말은 방향뿐 아니라 '이분/그분' 같은 사람을 정중히 가리키거나 가게에서 손님을 안내할 때도 두루 쓰여요.","examples":[{"jp":"トイレはどこですか。","reading":"トイレはどこですか。","ko":"화장실은 어디입니까?"},{"jp":"あそこにあります。","reading":"あそこにあります。","ko":"저기에 있습니다."},{"jp":"どちらへ行きますか。","reading":"どちらへいきますか。","ko":"어느 쪽으로 갑니까?"}]},{"heading":"こんな·そんな / こう·そう — 모양과 방법까지","body":"지시어는 사물·장소를 넘어 '어떤 모양인지, 어떻게 하는지'까지 확장돼요. 뒤에 오는 명사를 꾸며 '이런/그런/저런/어떤'을 만들 때는 こんな·そんな·あんな·どんな(또는 조금 격식 있는 このような·そのような…)를 씁니다.\n\n동작의 방법을 말할 때는 こう·そう·ああ·どう(이렇게/그렇게/저렇게/어떻게)를 써요. 참고로 교재의 부사 칸에 '저렇게'가 あう로 적혀 있지만 이는 인쇄상의 오타이고, 표준 형태는 ああ입니다. 회화에서 정말 자주 나오는 そうです(그렇습니다)와 どうですか(어떻습니까?)가 바로 이 계열이에요.","table":{"columns":["구분","こ","そ","あ","ど"],"rows":[["이런 ~(명사 수식)","こんな","そんな","あんな","どんな"],["~게(정도)","こんなに 이렇게","そんなに 그렇게","あんなに 저렇게","どんなに 아무리"],["방법(부사)","こう 이렇게","そう 그렇게","ああ 저렇게","どう 어떻게"]]},"examples":[{"jp":"どんな音楽が好きですか。","reading":"どんなおんがくがすきですか。","ko":"어떤 음악을 좋아합니까?"},{"jp":"この料理はどうですか。","reading":"このりょうりはどうですか。","ko":"이 요리는 어떻습니까?"}]}],"mistakes":[{"wrong":"これ本です。","right":"これは本です。 / この本です。","note":"これ 계열은 '이것' 자체로 끝나는 말이라 명사에 바로 못 붙어요. '이것은 책입니다'면 これは本です, '이 책입니다'면 この本です처럼 명사를 꾸밀 땐 この를 써야 합니다."},{"wrong":"あこにあります。","right":"あそこにあります。","note":"'저곳'만 글자 하나가 더 붙어 あそこ가 돼요. ここ·そこ는 두 글자인데 あそこ만 세 글자라는 점을 특히 조심하세요."},{"wrong":"あう (저렇게)","right":"ああ","note":"교재 부사 칸에는 あう로 인쇄돼 있지만 이는 오타예요. 방법을 뜻하는 '저렇게'의 올바른 형태는 ああ입니다(こう·そう·ああ·どう)."},{"wrong":"どれ人ですか。","right":"どの人ですか。","note":"명사(人) 앞에서 '어느'는 どの예요. どれ는 명사 없이 '어느 것'만 가리킬 때 씁니다. 사람·물건 이름이 뒤에 오면 언제나 どの를 쓰세요."}],"tips":["첫 글자만 외우면 끝: こ=이(내 쪽), そ=그(네 쪽), あ=저(둘 다 멂), ど=어느(물음). 뒷부분(れ·の·こ·ちら)은 '것·장소·방향'을 정할 뿐이에요.","명사가 뒤에 붙나 안 붙나로 구분하세요. 혼자 서면 これ·それ·あれ('이것'), 명사를 데려오면 この·その·あの('이 ~').","ど로 시작하면 무조건 질문. どれ(어느 것)·どこ(어디)·どちら(어느 쪽)·どう(어떻게)처럼 물어볼 때 쓰는 짝입니다."],"related":["02 명사"]},{"id":"desu-da","title":"です와 だ — 정중체와 반말","summary":"명사 뒤에 붙어 '~이다'를 나타내는 말로, 정중하게 말할 땐 です, 편하게 반말로 말할 땐 だ를 씁니다.","intro":"일본어에서 \"학생입니다\", \"쉬는 날입니다\"처럼 '명사 + ~이다/입니다' 문장을 만들 때 쓰는 말이 바로 です와 だ입니다. です는 처음 만난 사람이나 윗사람에게 쓰는 정중한 말(입니다)이고, だ는 친구나 가족에게 쓰는 반말(이다)입니다. 두 개는 정중함의 차이일 뿐 뜻은 같아서, 상대가 누구인지에 따라 골라 쓰면 됩니다. 명사 문장은 일본어의 가장 기본이라, 여기서 배우는 활용표가 앞으로 계속 쓰입니다.","sections":[{"heading":"です와 だ, 무엇이 다를까?","body":"です와 だ는 명사 바로 뒤에 붙어 '~이다'라는 뜻을 만듭니다.\n\n・정중체(です체): 처음 보는 사람, 윗사람, 손님 등에게 → 学生です (학생입니다)\n・반말(だ체): 친구, 가족, 나이 어린 사람에게 → 学生だ (학생이다)\n\n둘은 뜻이 같고 '정중하냐 편하냐'만 다릅니다. 중요한 규칙 하나: だ와 です는 절대 같이 쓰지 않습니다. '学生だです' 같은 말은 없고, 学生です 또는 学生だ 둘 중 하나만 씁니다.\n\n아래 표에서 현재/과거, 긍정/부정을 한눈에 정리했어요. 정중체 칸은 교재에 그대로 나오는 형태이고, 반말 칸은 같은 뜻의 편한 말투입니다. 부정형에서 では는 회화에서 じゃ로 줄여 말하는 경우가 아주 많습니다.","table":{"columns":["구분","반말 (だ체) — 이다","정중체 (です체) — 입니다"],"rows":[["현재 긍정","〜だ","〜です"],["현재 부정","〜ではない / 〜じゃない","〜ではありません / 〜じゃないです"],["과거 긍정","〜だった","〜でした"],["과거 부정","〜ではなかった / 〜じゃなかった","〜ではありませんでした / 〜じゃなかったです"],["의문(정중)","〜？ (억양만 올림)","〜ですか"]]},"examples":[{"jp":"学生です。","reading":"がくせいです。","ko":"학생입니다. (정중)"},{"jp":"学生だ。","reading":"がくせいだ。","ko":"학생이다. (반말)"}]},{"heading":"의문문·긍정문·부정문 만들기 (현재)","body":"현재 명사 문장의 세 가지 기본 꼴입니다. 문장 뼈대는 '~は~です' 즉 '~은(는) ~입니다'예요.\n\n・의문문: 문장 끝 です에 か만 붙이면 됩니다 → 〜は〜ですか (~은는 ~입니까?)\n・긍정문: はい로 대답하고 〜は〜です\n・부정문: いいえ로 대답하고 〜は〜ではありません, 회화에서는 〜じゃないです\n\n두 가지 발음·읽기 주의점이 있어요.\n(1) 조사 は: '~은/는'이라는 뜻의 조사로 쓰일 때는 글자는 は지만 [wa]로 읽습니다. 田中さんは → '타나카상 와'.\n(2) 何(무엇)의 읽기: 뒤에 だ・で・です・と・の가 오면 なん, 뒤에 か・が・を・も가 오면 なに로 읽습니다. 그래서 これは何ですか는 반드시 'なん'으로 읽어요.","examples":[{"jp":"田中さんは先生ですか。","reading":"たなかさんはせんせいですか。","ko":"다나카 씨는 선생님입니까?"},{"jp":"はい、田中さんは先生です。","reading":"はい、たなかさんはせんせいです。","ko":"네, 다나카 씨는 선생님입니다."},{"jp":"いいえ、田中さんは先生ではありません。","reading":"いいえ、たなかさんはせんせいではありません。","ko":"아니요, 다나카 씨는 선생님이 아닙니다."},{"jp":"これは何ですか。","reading":"これはなんですか。","ko":"이것은 무엇입니까?"}]},{"heading":"과거형: でした와 だった","body":"'~이었습니다/였습니다'처럼 과거를 말할 때는 형태만 바꾸면 됩니다.\n\n・정중 과거 긍정: です → でした (~이었습니다)\n・정중 과거 부정: 〜ではありませんでした / 〜じゃなかったです (~이 아니었습니다)\n・반말 과거 긍정: だ → だった (~이었다)\n・반말 과거 부정: 〜ではなかった / 〜じゃなかった (~이 아니었다)\n\n외우는 요령: 과거에는 정중체든 반말이든 'た' 소리가 들어갑니다 (でした・だった). 의문문은 현재와 똑같이 끝에 か만 붙여 でしたか로 만들면 돼요.","examples":[{"jp":"学生でしたか。","reading":"がくせいでしたか。","ko":"학생이었습니까?"},{"jp":"はい、学生でした。","reading":"はい、がくせいでした。","ko":"네, 학생이었습니다."},{"jp":"いいえ、学生じゃなかったです。","reading":"いいえ、がくせいじゃなかったです。","ko":"아니요, 학생이 아니었습니다."},{"jp":"昔は学生だった。","reading":"むかしはがくせいだった。","ko":"옛날엔 학생이었다. (반말)"}]},{"heading":"명사를 잇는 の·で와, 더 공손한 でございます","body":"명사 문장을 배울 때 함께 나오는 연결 표현입니다.\n\n・명사 + の + 명사: 소유(~의) 또는 명사끼리 꾸며주기 → 私の本 (나의 책), 日本語の本 (일본어 책)\n・명사 + で: 한 문장에서 두 가지를 나열할 때 です가 で로 바뀝니다 → 田中さんは学生で、鈴木さんは会社員です (다나카 씨는 학생이고, 스즈키 씨는 회사원입니다). 즉 で는 'です의 연결형(~이고)'이라고 생각하면 쉬워요.\n\n한편 です보다 더 격식 있고 공손한 자리(가게·안내 방송 등)에서는 です 대신 でございます를 씁니다. 뜻은 같은 '~입니다'인데 훨씬 정중한 말투예요. 지금은 '아, 아주 공손한 です가 でございます구나' 정도만 알아두면 충분합니다.","examples":[{"jp":"私の本です。","reading":"わたしのほんです。","ko":"제 책입니다."},{"jp":"田中さんは学生で、鈴木さんは会社員です。","reading":"たなかさんはがくせいで、すずきさんはかいしゃいんです。","ko":"다나카 씨는 학생이고, 스즈키 씨는 회사원입니다."},{"jp":"こちらは日本語の本でございます。","reading":"こちらはにほんごのほんでございます。","ko":"이것은 일본어 책입니다. (아주 공손)"}]}],"mistakes":[{"wrong":"学生だです。","right":"学生です。 / 学生だ。","note":"だ와 です를 겹쳐 쓰는 실수입니다. 둘 다 '~이다'라서 하나만 씁니다. 정중하게는 です, 반말은 だ."},{"wrong":"たなかさんは [하] せんせいです","right":"たなかさんは [와] せんせいです","note":"조사 は는 글자는 '하(は)'지만 '~은/는'이라는 조사로 쓰일 때는 반드시 [와/wa]로 발음합니다. 다만 쓸 때는 그대로 は로 적어요 (わ로 쓰면 틀림)."},{"wrong":"これはなにですか。","right":"これはなんですか。","note":"何는 상황에 따라 なん과 なに로 읽습니다. 뒤에 です·だ·で·の가 오면 なん, 뒤에 が·を·も가 오면 なに. です 앞이니 'なん'이 맞아요."},{"wrong":"きのうは休みではありません。","right":"きのうは休みではありませんでした。","note":"과거인데 현재 부정으로 끝내는 실수입니다. '아니었습니다'는 でした를 붙여 ではありませんでした(또는 じゃなかったです)로 과거를 표시해야 합니다."}],"tips":["です = 정중(입니다), だ = 반말(이다). 둘은 절대 같이 안 씁니다.","과거엔 정중체·반말 모두 'た' 소리가 들어간다: でした / だった.","じゃ는 では를 편하게 줄인 말. じゃないです = ではありません, 뜻은 똑같아요."],"related":["02 명사"]},{"id":"no","title":"조사 の의 여러 쓰임","summary":"の는 명사와 명사를 이어 주는 '~의' 조사로, 뒤 명사를 생략하면 '~의 것', 같은 대상을 다시 설명하면 '~인'의 뜻도 됩니다.","intro":"の는 일본어에서 가장 자주 나오는 조사 중 하나로, 두 개의 명사를 이어 주는 '풀' 같은 역할을 합니다. 한국어의 '의'에 해당하지만, 한국어는 '의'를 자주 생략하는 반면 일본어는 명사끼리 이을 때 の를 거의 반드시 넣습니다. 이 の 하나로 소속·소유(~의), 소유물(~의 것), 동격(~인)까지 표현할 수 있어서, 초급에서 확실히 익혀 두면 문장 만들기가 훨씬 쉬워집니다.","sections":[{"heading":"1. 기본: 명사 + の + 명사 (A의 B)","body":"の의 가장 기본은 '명사 + の + 명사' 구조입니다. 앞 명사가 뒤 명사를 꾸며 주며, 대부분 한국어 '~의'로 해석됩니다.\n\nわたし(나) + の + 机(책상) → わたしの机 (나의 책상)\n\n소속, 소유, 종류, 위치 등 명사끼리 연결할 때 폭넓게 쓰입니다. 한국어에서는 '내 책상'처럼 '의'를 빼도 되지만, 일본어에서는 の를 빼면 어색하거나 틀린 문장이 됩니다.","table":{"columns":["쓰임","예 (일본어)","뜻"],"rows":[["명사 + 명사","わたしの机","나의 책상"],["~의 (수식)","山田さんの家族","야마다 씨의 가족"],["~의 것 (소유·생략)","彼の","그의 것"],["~인 (동격)","友だちの鈴木さん","친구인 스즈키 씨"]]},"examples":[{"jp":"わたしの机です。","reading":"わたしのつくえです。","ko":"제 책상입니다."},{"jp":"こちらは山田さんの家族です。","reading":"こちらはやまださんのかぞくです。","ko":"이쪽은 야마다 씨의 가족입니다."}]},{"heading":"2. 뒤 명사 생략 = ~의 것 (소유)","body":"の 뒤에 오는 명사가 무엇인지 서로 뻔히 알 때는, 뒤 명사를 생략하고 'の'에서 문장을 끊을 수 있습니다. 이때 の는 '~의 것'이라는 뜻이 됩니다.\n\n彼のデジカメ (그의 디지털카메라) → 彼の (그의 것)\n\n한국어의 '내 것, 그의 것, 야마다 씨 것'과 똑같은 느낌입니다. 여기서 の를 빼먹으면 뜻이 완전히 달라지니 주의하세요(아래 '자주 하는 실수' 참고).","examples":[{"jp":"このデジカメは彼のです。","reading":"このデジカメはかれのです。","ko":"이 디지털카메라는 그의 것입니다."}]},{"heading":"3. 동격의 の = ~인","body":"の 앞뒤가 '같은 대상'을 가리킬 때도 の를 씁니다. 이때는 '~의'가 아니라 '~인'으로 해석해야 자연스럽습니다.\n\n友だちの鈴木さん → 친구'의' 스즈키 씨(X) / 친구'인' 스즈키 씨(O)\n\n즉 '친구 = 스즈키 씨'로 같은 사람입니다. 앞말이 뒷사람의 정체를 설명해 주는 것이죠. の가 여러 번 이어질 때 자주 나타납니다.","examples":[{"jp":"こちらは山田さんの友だちの鈴木さんです。","reading":"こちらはやまださんのともだちのすずきさんです。","ko":"이쪽은 야마다 씨의 친구인 스즈키 씨입니다."}]},{"heading":"4. の를 여러 번 이어 쓰기","body":"명사가 여러 개 이어질 때는 の를 계속 넣어 사슬처럼 연결합니다. 한국어로는 '의'를 한두 번 생략하지만, 일본어는 명사 사이마다 の가 필요합니다.\n\n今月(이번 달) + の + 新しい雑誌(새 잡지) → 今月の新しい雑誌 (이번 달의 새 잡지)\n\n앞의 예문 '山田さんの友だちの鈴木さん'처럼 の가 두 번 나오는 것도 아주 흔합니다. 명사가 늘어날 때마다 の를 넣는다고 기억하세요.","examples":[{"jp":"今月の新しい雑誌です。","reading":"こんげつのあたらしいざっしです。","ko":"이번 달의 새 잡지입니다."}]}],"mistakes":[{"wrong":"わたし机です。","right":"わたしの机です。","note":"한국어는 '내 책상'처럼 '의'를 자주 생략하지만, 일본어는 명사끼리 이을 때 の를 넣어야 합니다. 명사 두 개가 붙으면 사이에 の가 있는지 꼭 확인하세요."},{"wrong":"このデジカメは彼です。","right":"このデジカメは彼のです。","note":"の를 빼면 '이 디지털카메라는 그입니다'라는 이상한 뜻이 됩니다. '그의 것'이라고 소유를 말하려면 반드시 彼の처럼 の를 붙여야 합니다. 소유의 の 생략은 초급 최다 실수입니다."},{"right":"山田さんの友だちの鈴木さん","note":"동격의 の를 '~의'로만 외우면 '친구의 스즈키'라는 어색한 해석이 나옵니다. 앞뒤가 같은 사람이면 '친구인 스즈키 씨'처럼 '~인'으로 옮기세요."},{"wrong":"山田さんな友だち","right":"山田さんの友だち","note":"명사와 명사를 이을 때는 な가 아니라 の입니다. な는 きれいな人(예쁜 사람)처럼 な형용사 뒤에만 붙습니다. 명사 뒤에는 の, な형용사 뒤에는 な로 구분하세요."}],"tips":["の = 한국어 '의'. 명사와 명사가 만나면 사이에 の를 넣는다고 기억하세요.","뒤 명사가 뻔할 때는 の에서 끊으면 '~의 것'(彼の = 그의 것)이 됩니다.","の 앞뒤가 같은 사람·사물이면 '~의'가 아니라 '~인'으로 해석(友だちの鈴木さん = 친구인 스즈키 씨)."],"related":["02 명사"]},{"id":"i-adj","title":"い형용사 활용 (현재·과거·부정)","summary":"い형용사는 끝의 「い」를 떼고 붙이는 방식으로 부정은 「くない」, 과거는 「かった」로 바꾼다.","intro":"い형용사는 「あつい(덥다)」, 「たのしい(즐겁다)」처럼 끝이 「い」로 끝나면서 사물이나 사람의 상태·성질을 나타내는 말이에요. 일본어에서 형용사는 우리말처럼 스스로 모양을 바꿔서 '~하다 / ~하지 않다 / ~했다 / ~하지 않았다'를 표현합니다. 그래서 끝의 「い」를 어떻게 바꾸는지만 익히면 현재·과거·부정을 자유롭게 말할 수 있어요. 명사(学生です처럼 では·だ로 바꾸는 것)와는 활용 방법이 완전히 다르니 구분해서 기억하는 게 중요합니다.","sections":[{"heading":"い형용사의 기본 구조 — 어간과 어미 「い」","body":"모든 い형용사는 끝이 「い」로 끝나요. 이 마지막 「い」를 어미라고 부르고, 「い」를 뗀 나머지 부분을 어간이라고 불러요.\n예) あつい → 어간 「あつ」 + 어미 「い」\n예) たのしい → 어간 「たのし」 + 어미 「い」\n활용은 전부 이 어미 「い」 자리를 바꾸는 방식이에요. 어간은 그대로 두고 「い」만 「くない」, 「かった」 등으로 갈아끼우면 됩니다.\n정중하게 말하고 싶을 때는 활용형 뒤에 「です」를 붙여요. 여기서 아주 중요한 점 하나! 명사는 「学生だ」처럼 「だ」를 쓰지만, い형용사는 「い」 자체가 이미 '~다'라는 뜻이라서 「だ」를 붙이지 않아요.","examples":[{"jp":"日本語はおもしろい。","reading":"にほんごはおもしろい。","ko":"일본어는 재미있다."},{"jp":"日本の夏は暑いです。","reading":"にほんのなつはあついです。","ko":"일본의 여름은 덥습니다."}]},{"heading":"현재문 — 긍정·부정·의문","body":"현재형은 세 가지만 기억하면 돼요.\n① 긍정: 그대로 「~い」(반말) / 「~いです」(정중). 재미있다 → おもしろい / おもしろいです.\n② 부정: 「い」를 「くない」로 바꿔요. 정중형은 「くないです」 또는 「くありません」 두 가지 다 맞아요. 작다 ちいさい → 작지 않다 ちいさくない / ちいさくありません.\n③ 의문: 문장 끝에 「か」만 붙이면 돼요. あついですか(덥습니까?).\n부정 정중형 「~くないです」와 「~くありません」은 뜻이 똑같고, 「~くありません」 쪽이 조금 더 딱딱한 느낌이에요.","table":{"columns":["구분","반말(보통체)","정중(です체)"],"rows":[["현재 긍정","暑い (あつい) 덥다","暑いです 덥습니다"],["현재 부정","暑くない (あつくない) 덥지 않다","暑くないです / 暑くありません 덥지 않습니다"],["현재 의문","暑い？ 더워?","暑いですか 덥습니까?"]]},"examples":[{"jp":"この人形はかわいいですか。","reading":"このにんぎょうはかわいいですか。","ko":"이 인형은 귀엽습니까?"},{"jp":"家はあまり小さくありません。","reading":"いえはあまりちいさくありません。","ko":"집은 별로 작지 않습니다."},{"jp":"彼は優しくないです。","reading":"かれはやさしくないです。","ko":"그는 상냥하지 않습니다."}]},{"heading":"과거문 — 긍정·부정","body":"과거형은 현재형에서 딱 한 걸음만 더 가면 돼요.\n① 과거 긍정: 「い」를 「かった」로 바꿔요. 정중형은 「かったです」. 바빴다 いそがしい → いそがしかった / いそがしかったです.\n주의! 명사 과거는 「~でした」지만, い형용사는 「~かったです」예요. 「おもしろいでした」처럼 「いです」에 「でした」를 붙이는 건 틀린 표현이에요.\n② 과거 부정: 현재 부정 「くない」의 「ない」를 과거 「なかった」로 바꾸면 돼요. 즉 「くなかった」. 정중형은 「くなかったです」 또는 「くありませんでした」. 춥지 않았다 さむい → さむくなかった / さむくありませんでした.\n규칙을 한 줄로 정리하면: 현재 부정 「くない」를 알면, 그 「ない」만 「なかった」로 바꿔서 과거 부정이 되는 거예요.","table":{"columns":["구분","반말(보통체)","정중(です체)"],"rows":[["과거 긍정","暑かった (あつかった) 더웠다","暑かったです 더웠습니다"],["과거 부정","暑くなかった (あつくなかった) 덥지 않았다","暑くなかったです / 暑くありませんでした 덥지 않았습니다"]]},"examples":[{"jp":"昨日はとても忙しかったです。","reading":"きのうはとてもいそがしかったです。","ko":"어제는 매우 바빴습니다."},{"jp":"試験は難しくありませんでした。","reading":"しけんはむずかしくありませんでした。","ko":"시험은 어렵지 않았습니다."},{"jp":"日本はあまり寒くなかった。","reading":"にほんはあまりさむくなかった。","ko":"일본은 별로 춥지 않았다."}]},{"heading":"한눈에 보는 활용표 (暑い 예시)","body":"지금까지 배운 현재·과거의 긍정·부정을 하나의 표로 모으면 아래와 같아요. 어떤 い형용사든 이 틀에 어간만 갈아끼우면 그대로 활용돼요. 예를 들어 たのしい(즐겁다)라면 たのしい / たのしくない / たのしかった / たのしくなかった 순서로 바뀝니다.\n활용의 핵심 갈림길은 딱 하나예요. '부정이나 부사로 갈 때는 「く」로 바뀐다, 과거 긍정으로 갈 때는 「かった」로 바뀐다.' 이 두 가지만 잡으면 나머지는 조립일 뿐이에요.","table":{"columns":["","현재","과거"],"rows":[["긍정(반말)","暑い 덥다","暑かった 더웠다"],["긍정(정중)","暑いです 덥습니다","暑かったです 더웠습니다"],["부정(반말)","暑くない 덥지 않다","暑くなかった 덥지 않았다"],["부정(정중)","暑くないです / 暑くありません","暑くなかったです / 暑くありませんでした"]]}},{"heading":"「いい(좋다)」만은 예외! — 활용할 때 「よ」로 변신","body":"い형용사 대부분은 어간을 그대로 두는데, 「いい(좋다)」 딱 하나만 특별해요. 「いい」는 원래 「よい」라는 옛말에서 온 단어라, 활용할 때는 「よ」 형태로 바뀝니다.\n현재 긍정만 「いい / いいです」이고, 나머지는 전부 「よ」로 시작해요.\n부정: よくない / よくないです\n과거 긍정: よかった / よかったです\n과거 부정: よくなかった / よくありませんでした\n「いくない」, 「いかった」는 존재하지 않는 틀린 형태예요. 「かっこいい(멋있다)」처럼 「いい」가 뒤에 붙은 단어도 똑같이 かっこよかった, かっこよくない로 바뀌니 함께 기억해 두세요.","examples":[{"jp":"天気がよかったです。","reading":"てんきがよかったです。","ko":"날씨가 좋았습니다."},{"jp":"この映画はあまりよくない。","reading":"このえいがはあまりよくない。","ko":"이 영화는 별로 좋지 않다."}]}],"mistakes":[{"wrong":"かわいいでした","right":"かわいかったです","note":"い형용사 과거를 명사처럼 「~です」 뒤에 「でした」를 붙여 만드는 실수예요. 「学生でした(명사)」와 달리 い형용사는 「い」를 「かった」로 바꾼 뒤 「です」를 붙여요. 즉 かわいい → かわいかった → かわいかったです."},{"wrong":"おいしいだ / たかいだ","right":"おいしい / たかい","note":"명사는 반말에서 「学生だ」처럼 「だ」를 붙이지만, い형용사는 「い」 자체가 '~다'라서 「だ」를 붙이지 않아요. 「おいしいだ」는 틀리고 그냥 「おいしい」가 반말 종결형입니다."},{"wrong":"いくない / いかった","right":"よくない / よかった","note":"「いい(좋다)」를 규칙대로 활용해 버리는 대표적 실수. 「いい」는 활용할 때 「よ」로 바뀌어서 부정 よくない, 과거 よかった가 됩니다. 현재 긍정 「いい」일 때만 「い」 모양이에요."},{"wrong":"きれいくない (きれい를 い형용사로 착각)","right":"きれいじゃない","note":"「きれい(예쁘다·깨끗하다)」, 「きらい(싫다)」, 「ゆうめい(유명하다)」는 끝소리가 「い」로 들려도 사실 な형용사예요. 그래서 부정은 「くない」가 아니라 명사처럼 「じゃない / ではありません」으로 만들어요. 한자로 「綺麗」, 「有名」처럼 「い」가 어간에 포함된 단어들이 함정입니다."}],"tips":["활용의 두 갈래만 외우세요. 부정·부사 계열은 「く」, 과거 긍정은 「かった」. 나머지는 여기에 「です」나 「ない/なかった」를 조립하는 것뿐이에요.","과거 부정은 새로 외울 필요 없어요. 현재 부정 「くない」의 「ない」만 「なかった」로 바꾸면 「くなかった」가 됩니다.","「いい」는 '좋을 때(いい)만 い, 나머지는 요(よ)로 바뀐다'로 기억하면 よくない·よかった를 헷갈리지 않아요."],"related":["03 い형용사"]},{"id":"na-adj","title":"な형용사와 い형용사 구분","summary":"명사 앞에서 「な」를 끼우면 な형용사, 「い」가 그대로 붙으면 い형용사예요.","intro":"일본어 형용사는 두 종류예요. 하나는 静(しず)か·有名(ゆうめい)처럼 명사를 꾸밀 때 「な」를 넣는 な형용사, 다른 하나는 古(ふる)い처럼 「い」로 끝나 그대로 붙는 い형용사죠. 이 둘은 부정·과거로 바꾸는 방법이 완전히 달라서, 처음부터 구분해 두지 않으면 계속 틀립니다. 이 단원은 な형용사가 무엇이고, い형용사·명사와 어떻게 다른지, 그리고 な형용사가 어떻게 활용되는지를 배웁니다.","sections":[{"heading":"な형용사가 뭐예요?","body":"な형용사는 사람이나 사물의 상태·성질을 나타내는 말이에요. 이름 그대로, 뒤에 명사가 오면 어간과 명사 사이에 「な」를 끼워 넣습니다.\n\n예: 静(しず)か(조용함) → 静かな部屋(へや) 조용한 방\n有名(ゆうめい)(유명) → 有名な人(ひと) 유명한 사람\n\n교과서 01 표에 나오는 な형용사들을 보면 静(しず)か·親切(しんせつ)·便利(べんり)·賑(にぎ)やか·大切(たいせつ)처럼 대부분 「い」로 끝나지 않아요. 그래서 겉모습만으로도 い형용사와 어느 정도 구별됩니다. 단, 뒤에 나올 함정 단어(きれい·きらい)는 예외예요.","examples":[{"jp":"静かな部屋","reading":"しずかなへや","ko":"조용한 방"},{"jp":"有名な人","reading":"ゆうめいなひと","ko":"유명한 사람"},{"jp":"親切な店員","reading":"しんせつなてんいん","ko":"친절한 점원"}]},{"heading":"い형용사와 어떻게 구분해요?","body":"가장 확실한 방법은 명사를 붙여 보는 거예요.\n\n· い형용사는 「い」가 그대로 명사에 붙어요 → 古(ふる)い + 人(ひと) = 古い人 (오래된 사람)\n· な형용사는 사이에 「な」가 들어가요 → 静(しず)か + 人 = 静かな人 (조용한 사람)\n\n부정·과거로 바꿀 때도 달라요. い형용사는 「~くない / ~かった」로 스스로 바뀌지만, な형용사는 명사처럼 「~じゃない / ~でした」를 써요. 즉 な형용사는 활용이 명사와 똑 닮았습니다. 아래 표로 비교해 보세요.","table":{"columns":["구분","い형용사 (古い)","な형용사 (静か)"],"rows":[["명사 수식","古い人 (직접)","静かな人 (な 삽입)"],["현재 긍정","古いです","静かです"],["현재 부정","古くないです","静かじゃないです"],["과거 긍정","古かったです","静かでした"],["과거 부정","古くなかったです","静かじゃなかったです"]]},"examples":[{"jp":"京都は静かで古いところです。","reading":"きょうとはしずかでふるいところです。","ko":"교토는 조용하고 오래된 곳입니다."},{"jp":"この牛乳は新鮮じゃないです。","reading":"このぎゅうにゅうはしんせんじゃないです。","ko":"이 우유는 신선하지 않습니다."}]},{"heading":"な형용사 활용표 (현재·과거)","body":"な형용사는 어간(静か 부분)은 그대로 두고 뒤만 바꿔요. 반말체(보통체)는 「だ」, 존댓말체(정중체)는 「です」에서 출발합니다.\n\n부정은 「では」와 「じゃ」 두 가지가 있는데, 뜻은 같아요. 「じゃ」가 회화에서 더 편하게 쓰는 말이고, 「では」가 조금 더 격식 있는 말이에요. 정중한 부정은 「~じゃないです」와 「~ではありません」이 같은 뜻입니다.","table":{"columns":["시제·긍부정","반말체 (보통체)","존댓말체 (정중체)"],"rows":[["현재 긍정","静かだ","静かです"],["현재 부정","静かじゃない (=ではない)","静かじゃないです (=ではありません)"],["과거 긍정","静かだった","静かでした"],["과거 부정","静かじゃなかった (=ではなかった)","静かじゃなかったです (=ではありませんでした)"]]},"examples":[{"jp":"銀座は賑やかです。","reading":"ぎんざはにぎやかです。","ko":"긴자는 번화합니다."},{"jp":"彼は親切ではありません。","reading":"かれはしんせつではありません。","ko":"그는 친절하지 않습니다."},{"jp":"この街は電気街で有名でした。","reading":"このまちはでんきがいでゆうめいでした。","ko":"이 거리는 전자상가로 유명했습니다."},{"jp":"先週は暇じゃなかったです。","reading":"せんしゅうはひまじゃなかったです。","ko":"지난주는 한가하지 않았습니다."}]},{"heading":"명사 수식과 여러 가지 활용","body":"な형용사는 어간 뒤에 여러 조각을 붙여 다양하게 씁니다. 교과서 02에 나오는 활용들이에요.\n\n· 어간 + な + 명사 : ~한 (真面目な人 성실한 사람)\n· 어간 + で : ~하고(열거) / ~해서(이유) (静かで, 有名で)\n· 어간 + に : ~하게(부사) (便利に 편리하게, 大切に 소중히)\n· 어간 + にする : ~하게 하다(변화를 줌) (きれいにする 깨끗이 하다)\n· 어간 + になる : ~해지다(저절로 변함) (嫌いになる 싫어지다)\n· 어간 + なら : ~하면(가정) (必要なら 필요하면)\n\n「に」가 두 가지로 나뉘는 점이 헷갈리기 쉬워요. 내가 무언가를 바꾸면 「~にする」, 저절로 그렇게 되면 「~になる」예요.","examples":[{"jp":"私の友だちはとても真面目な人です。","reading":"わたしのともだちはとてもまじめなひとです。","ko":"내 친구는 아주 성실한 사람입니다."},{"jp":"携帯電話をより便利に使います。","reading":"けいたいでんわをよりべんりにつかいます。","ko":"휴대전화를 더 편리하게 씁니다."},{"jp":"ちょっと静かにしてください。","reading":"ちょっとしずかにしてください。","ko":"조금 조용히 해 주세요."},{"jp":"必要なら使ってもいいですよ。","reading":"ひつようならつかってもいいですよ。","ko":"필요하면 써도 괜찮아요."}]}],"mistakes":[{"wrong":"きれくない","right":"きれいじゃない","note":"きれい(예쁨·깨끗함)와 きらい(싫음)는 「い」로 끝나지만 사실 な형용사예요! い형용사인 척하는 대표적인 함정 단어라서, 부정을 「くない」로 만들면 틀립니다. 「きれいじゃない / きれいな人」처럼 な형용사로 활용하세요."},{"wrong":"静かくないです","right":"静か(しず)かじゃないです","note":"な형용사를 い형용사처럼 「~くない」로 부정하면 안 돼요. な형용사의 부정은 명사와 똑같이 「じゃない(ではない)」를 씁니다."},{"wrong":"静か人","right":"静(しず)かな人(ひと)","note":"な형용사가 명사를 꾸밀 때는 반드시 「な」를 끼워야 해요. 「な」를 빼먹고 어간에 명사를 바로 붙이는 실수가 아주 흔합니다. 有名(ゆうめい)人이 아니라 有名な人."},{"note":"な형용사인지 명사인지 헷갈릴 땐 앞에 「とても(무척)」를 붙여 보세요. とても親切(しんせつ)だ(무척 친절하다, ○)는 말이 되니 な형용사, とても学生(がくせい)だ(무척 학생이다, ×)는 말이 안 되니 명사예요. 교과서 노트에 나온 구분법입니다."}],"tips":["명사를 붙여 보면 끝! 「な」가 들어가면 な형용사(静かな人), 「い」가 그대로 붙으면 い형용사(古い人).","함정 단어 딱 두 개만 외우세요: きれい(예쁨)·きらい(싫음)은 「い」로 끝나도 な형용사입니다.","な형용사 활용은 명사와 쌍둥이예요. 부정은 「じゃない」, 과거는 「でした」 — い형용사의 「くない·かった」와 헷갈리지 마세요."],"related":["04 な형용사"]},{"id":"verb-groups","title":"동사 3그룹 구분법 (1·2·3그룹)","summary":"일본어 동사는 딱 3종류(1·2·3그룹)로 나뉘고, 어느 그룹인지 먼저 알아야 て형·た형·ない형을 만들 수 있어요.","intro":"일본어 동사는 문장에서 모양을 바꿔요. \"먹다(食べる)\"가 \"먹어서(食べて)\", \"먹었다(食べた)\", \"안 먹어(食べない)\"처럼요. 그런데 이 모양을 바꾸는 규칙이 동사가 속한 그룹(1·2·3그룹)마다 달라요. 그래서 교과서의 て형·た형·ない형 표가 전부 \"1그룹 / 2그룹 / 3그룹\" 세 칸으로 나뉘어 있는 거예요. 즉, 그룹을 구분하는 것이 모든 동사 활용의 출발점이에요. 이 페이지에서는 그룹을 빠르게 알아보는 법을 익혀요.","sections":[{"heading":"먼저 3그룹부터 (딱 두 개, 암기)","body":"3그룹은 외우기가 제일 쉬워요. 온 세상에 딱 두 개뿐이거든요.\n\n・する (하다)\n・来る(くる) (오다)\n\n이 둘은 규칙이 없이 제멋대로 변해서 '불규칙 동사'라고도 불러요. 그냥 통째로 외우면 돼요. 참고로 する가 붙는 말(勉強する 공부하다, 掃除する 청소하다, デートする 데이트하다)도 전부 3그룹이에요.\n\n표에서 보이듯 する→して·した·しない, 来る(くる)→来て(きて)·来た(きた)·来ない(こない) 로 변해요. 특히 来る는 읽는 소리가 く→き→こ 로 바뀌니 조심하세요.","table":{"columns":["기본형","て형","た형","ない형"],"rows":[["する","して","した","しない"],["来る(くる)","来て(きて)","来た(きた)","来ない(こない)"]]},"examples":[{"jp":"家族と一緒に買い物をした。","reading":"かぞくといっしょにかいものをした。","ko":"가족과 함께 쇼핑을 했다."},{"jp":"この間デートした人は誰ですか。","reading":"このあいだデートしたひとはだれですか。","ko":"요전에 데이트한 사람은 누구입니까?"}]},{"heading":"2그룹 알아보는 법 ('이·에' 소리 + る)","body":"2그룹은 이렇게 생겼어요.\n\n① 반드시 る(루)로 끝나고\n② る 바로 앞의 소리가 い단(이 소리) 또는 え단(에 소리) 이에요.\n\n예를 들어 見る(みる)는 る 앞이 'み(미)' = い단, 食べる(たべる)는 る 앞이 'べ(베)' = え단 이라서 2그룹이에요. 起きる(おきる, 오키루), 寝る(ねる, 네루), 教える(おしえる, 오시에루)도 마찬가지예요.\n\n2그룹은 변신이 아주 간단해요. 끝의 る만 떼고 て·た·ない를 붙이면 끝이에요.\n見る → 見て / 見た / 見ない\n食べる → 食べて / 食べた / 食べない\n\n그래서 2그룹은 '떼어내기 그룹'이라고 기억하면 편해요.","table":{"columns":["기본형","て형(る 떼고 て)","た형","ない형"],"rows":[["見る(みる)","見て(みて)","見た(みた)","見ない(みない)"],["起きる(おきる)","起きて(おきて)","起きた(おきた)","起きない(おきない)"],["食べる(たべる)","食べて(たべて)","食べた(たべた)","食べない(たべない)"],["寝る(ねる)","寝て(ねて)","寝た(ねた)","寝ない(ねない)"]]},"examples":[{"jp":"朝6時に起きて運動をしました。","reading":"あさろくじにおきてうんどうをしました。","ko":"아침 6시에 일어나서 운동을 했습니다."},{"jp":"夜遅くまでテレビを見てはいけません。","reading":"よるおそくまでテレビをみてはいけません。","ko":"밤늦게까지 텔레비전을 봐서는 안 됩니다."}]},{"heading":"1그룹은 '나머지 전부'","body":"3그룹(する·来る)도 아니고 2그룹('이·에' + る)도 아니면, 전부 1그룹이에요. 1그룹이 실제로 제일 많아요.\n\n1그룹에는 두 종류가 있어요.\n・る가 아닌 소리로 끝나는 동사: 会う(あう), 待つ(まつ), 書く(かく), 話す(はなす), 飲む(のむ), 並ぶ(ならぶ) 등\n・る로 끝나지만 る 앞이 あ·う·お단(아·우·오 소리)인 동사: 乗る(のる, 노루 → 'の'는 お단), 帰る(かえる) 등\n\n1그룹은 활용이 조금 까다로워요. 끝 글자가 무엇이냐에 따라 て형·た형 모양이 달라지는 '음편(발음 편하게 바뀜)'이 일어나거든요. 아래 표를 규칙으로 외워 두면 た형도 て의 て를 た로 바꾸기만 하면 돼요(って→った, んで→んだ, いて→いた …). 딱 하나, 行く(いく)는 예외라서 行いて(×)가 아니라 行って(○)로 변해요.","table":{"columns":["끝 글자","て형 규칙","예"],"rows":[["う・つ・る","→ って","会う(あう)→会って / 待つ(まつ)→待って / 乗る(のる)→乗って"],["ぶ・む・ぬ","→ んで","並ぶ(ならぶ)→並んで / 飲む(のむ)→飲んで / 死ぬ(しぬ)→死んで"],["す","→ して","話す(はなす)→話して"],["く","→ いて","書く(かく)→書いて"],["ぐ","→ いで","脱ぐ(ぬぐ)→脱いで"],["※行く(いく)","예외 → 行って","行いて(×), 行って(○)"]]},"examples":[{"jp":"風邪をひいて学校へ行きませんでした。","reading":"かぜをひいてがっこうへいきませんでした。","ko":"감기에 걸려서 학교에 가지 않았습니다."},{"jp":"家へ帰って顔を洗ってご飯を食べてコーヒーを飲みます。","reading":"うちへかえってかおをあらってごはんをたべてコーヒーをのみます。","ko":"집에 돌아가서 얼굴을 씻고 밥을 먹고 커피를 마십니다."},{"jp":"お酒はあまり飲まないです。","reading":"おさけはあまりのまないです。","ko":"술은 별로 안 마셔요."}]},{"heading":"왜 그룹부터 알아야 할까","body":"그룹을 알면 뒤에 배울 모든 활용이 자동으로 풀려요. 교과서의 て형·た형·ない형 표가 전부 그룹별로 나뉘어 있는 이유예요.\n\n・て형: ~하고(열거) / ~해서(이유) / ~해(부드러운 명령), 그리고 ~てください(해 주세요)·~てもいいです(해도 돼요)·~てはいけません(하면 안 돼요) 같은 표현의 뿌리\n・た형: ~했다 / ~한 / ~했던 (과거·수식)\n・ない형: ~하지 않다 (부정)\n\n1그룹 ない형은 끝의 う단 소리를 あ단으로 바꾸고 ない를 붙여요(書く→書かない, 飲む→飲まない). 단 う로 끝나는 동사는 あ가 아니라 わ로 바뀌어요(買う(かう)→買わない). 2그룹은 여기서도 る만 떼면 되고(食べる→食べない), 3그룹은 する→しない, 来る→こない 로 외워요.","examples":[{"jp":"散歩に行かない?","reading":"さんぽにいかない?","ko":"산책하러 안 갈래?"},{
