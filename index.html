/* 요소 텍스트에서 일본어만 추출 (전역 탭-발음용) */
function extractJa(t){
  const m=String(t||"").match(/[぀-ヿ一-鿿々〆ヶ、。ー・「」『』〜~！？0-9]+/g);
  if(!m) return "";
  return m.join(" ").replace(/\s+/g," ").trim().slice(0,140);
}

/* ══ 데일리 학습 (분량 분할 + 음성 안내) ══════════════ */
const DAILY_PACE = {"적게":10, "보통":18, "많이":28};
function buildPlan(){
  const perDay = DAILY_PACE[store.daily.pace] || 18;
  const bonmun = LESSONS.filter(L=>VOCAB.some(v=>v._lesson===L)||GRAMMAR.some(g=>g._lesson===L));
  const stream=[];
  bonmun.forEach(L=>{
    VOCAB.filter(v=>v._lesson===L).forEach(v=>stream.push({t:"v",lesson:L,v}));
    GRAMMAR.filter(g=>g._lesson===L).forEach(g=>stream.push({t:"g",lesson:L,g}));
  });
  const days=[];
  for(let i=0;i<stream.length;i+=perDay){
    const slice=stream.slice(i,i+perDay);
    const vocab=slice.filter(x=>x.t==="v").map(x=>x.v);
    const grammar=slice.filter(x=>x.t==="g").map(x=>x.g);
    const lessons=[...new Set(slice.map(x=>x.lesson))];
    const kanji=[...new Set(vocab.flatMap(v=>[...(v.word||"")].filter(ch=>isK(ch)&&KJ.has(ch))))];
    // start/end = 전체 스트림에서의 위치 → 진도를 '분량'이 아니라 '내용'으로 기록한다
    days.push({n:days.length+1, lessons, vocab, grammar, kanji, start:i, end:Math.min(i+perDay,stream.length)});
  }
  return days;
}
let PLAN = buildPlan();
/* 진도는 '학습한 항목 수(pos)'로 저장 → 하루 분량을 바꿔도 오염되지 않는다 */
function dayDone(d){ return (store.daily.pos||0) >= d.end; }
function curDayNo(){ const p=store.daily.pos||0; const i=PLAN.findIndex(d=>d.end>p); return (i<0?PLAN.length:i+1); }
/* 예전 형식(done: {일번호:1}) 1회 마이그레이션 */
(function migrateDaily(){
  const d=store.daily;
  if(d && d.done && !("pos" in d)){
    const maxDay=Math.max(0,...Object.keys(d.done).map(Number).filter(n=>!isNaN(n)));
    const ref=PLAN[Math.min(maxDay,PLAN.length)-1];
    d.pos = ref ? ref.end : 0;
    delete d.done; delete d.cur; save();
  }
  if(!d || !("pos" in (d||{}))) { store.daily.pos = store.daily.pos||0; }
})();

/* 레슨 개념을 다루는 초보 가이드 찾기 (교사 프레이밍용) */
function guideForLesson(L){ return GUIDES.find(g=>(g.related||[]).some(r=>r===L)) || null; }

/* 하루 내레이션 — 선생님처럼 맥락을 엮어 설명 [{text,lang,ref?}] */
function narration(day){
  const q=[];
  /* gap: 이 발화 뒤 쉬는 시간(ms) — 마지막 청크에만 적용. 낱말→뜻은 붙이고, 항목 사이는 호흡 */
  const push=(s,lang,ref,gap)=>{ const cs=chunkText(s); cs.forEach((t,i)=>q.push({text:t,lang,ref,gap:(i===cs.length-1?gap:undefined)})); };
  const KO=(s,ref,gap)=>push(s,"ko-KR",ref,gap);
  const JA=(s,ref,gap)=>push(s,"ja-JP",ref,gap);
  KO(`자, 데이 ${day.n} 학습을 시작할게요.`);
  KO(`오늘은 ${day.lessons.join(", ")} 부분을 함께 공부해요.`);
  const g0=day.lessons.map(guideForLesson).find(Boolean);
  if(g0){ KO(g0.summary); }                          // 개념 한 줄 프레이밍
  if(day.vocab.length){
    KO(`먼저 오늘의 낱말 ${day.vocab.length}개예요. 소리 내서 따라 읽어 보세요.`);
    day.vocab.forEach((v,i)=>{
      const ref="d-v-"+day.n+"-"+v.word;
      JA(v.reading||v.word, ref, 140);                  // 낱말과 뜻은 붙여서
      KO(`${v.meaning_ko}, 라는 뜻이에요.`, ref, 500);   // 항목 사이 호흡
      if((i+1)%6===0 && i+1<day.vocab.length) KO("좋아요, 계속 가볼게요.");
    });
  }
  if(day.grammar.length){
    KO("이제 오늘의 문형이에요. 어떻게 쓰는지 하나씩 볼게요.");
    day.grammar.forEach((g,gi)=>{
      const ref="d-g-"+day.n+"-"+gi;
      JA((g.pattern||"").replace(/[〜~]/g,""), ref, 140);
      if(g.meaning_ko) KO(`${g.meaning_ko}, 라는 표현이에요.`, ref, 320);
      if(g.tip&&g.tip.when) KO(g.tip.when, ref, 320);  // 언제 쓰나 (교사 설명)
      const exs=(g.examples||[]).slice(0,2);
      if(exs.length) KO("예문을 들어볼게요.", ref, 240);
      exs.forEach(ex=>{ JA(ex.jp, ref, 140); if(ex.ko) KO(`${ex.ko}, 라는 뜻이죠.`, ref, 400); });
      if(g.tip&&g.tip.mistake) KO(`여기서 주의할 점이 있어요. ${g.tip.mistake}`, ref, 500);  // 실수 포인트
    });
  }
  if(day.kanji.length){
    KO(`오늘 나온 한자는 ${day.kanji.length}자예요. 뜻만 짚고 갈게요.`);
    day.kanji.slice(0,10).forEach(ch=>{ const k=KJ.get(ch); if(!k)return;
      const ref="d-k-"+day.n+"-"+ch;
      JA((k.on&&k.on[0]&&k.on[0][0])||ch, ref, 140);
      KO(`${k.kmean}. 한국 한자음은 ${(k.kh||[]).join(", ")}이에요.`, ref, 450);
    });
  }
  KO(`오늘 학습은 여기까지예요. 낱말 ${day.vocab.length}개, 문형 ${day.grammar.length}개를 함께 봤어요. 정말 잘 하셨어요. 내일 또 만나요.`);
  return q;
}

/* 초보 가이드 페이지 전체를 선생님처럼 낭독
   — 문장 청크는 guideDetail 렌더와 '같은 gChunks'로 잘라 ref가 1:1로 맞는다(문장 단위 하이라이트) */
const gChunks = s => chunkText(String(s||"").replace(/\s+/g," "));
function guideNarration(g){
  const q=[];
  const push=(s,lang,ref,gap)=>{ const cs=gChunks(s); cs.forEach((t,i)=>q.push({text:t,lang,ref,gap:(i===cs.length-1?gap:undefined)})); };
  const KO=(s,ref,gap)=>push(s,"ko-KR",ref,gap);
  const JA=(s,ref,gap)=>push(s,"ja-JP",ref,gap);
  KO(`${g.title}. 오늘은 이 개념을 같이 공부해 볼게요.`,"g-hero");
  KO(g.summary,"g-hero",350);
  gChunks(g.intro).forEach((t,j)=>q.push({text:t,lang:"ko-KR",ref:"g-in-c"+j,gap:240}));
  (g.sections||[]).forEach((s,si)=>{
    KO(s.heading,"g-s"+si+"-h",300);
    gChunks(s.body).forEach((t,j)=>q.push({text:t,lang:"ko-KR",ref:"g-s"+si+"-c"+j,gap:240}));
    (s.examples||[]).slice(0,3).forEach((ex,ei)=>{ const er="g-s"+si+"-e"+ei;
      JA(ex.jp,er,140); if(ex.ko) KO(`${ex.ko}, 라는 뜻이에요.`,er,400); });
  });
  if((g.mistakes||[]).length){
    KO("이번엔 초보자가 자주 하는 실수를 볼게요.",null,240);
    g.mistakes.forEach((ms,mi)=>{ const mr="g-m"+mi;
      if(ms.wrong){ JA(ms.wrong,mr,140); KO("이건 틀린 표현이고,",mr,240); }
      if(ms.right){ JA(ms.right,mr,140); KO("이렇게 쓰는 게 맞아요.",mr,300); }
      if(ms.note) KO(ms.note,mr,450); });
  }
  (g.tips||[]).forEach((t,ti)=>KO(`기억할 팁이에요. ${t}`,"g-t"+ti,450));
  KO("여기까지예요. 오늘도 잘 하셨어요.");
  return q;
}

/* 내레이션 플레이어 (utterance 체이닝, 현재 항목 하이라이트) */
const Narrator = (()=>{
  let queue=[], idx=0, playing=false, onstep=null, ondone=null;
  let runId=0, errs=0, spoke=0, watchdog=null, keepalive=null;
  // pause/resume 트릭은 크롬 데스크톱 15초 컷오프 전용 — 모바일·사파리에선 말 더듬만 유발
  const NEED_KEEPALIVE = /Chrome\//.test(navigator.userAgent||"") && !/iPhone|iPad|iPod|Android|Mobile/.test(navigator.userAgent||"");
  const clearHi=()=>document.querySelectorAll(".d-hi").forEach(e=>e.classList.remove("d-hi"));
  /* 지금 읽는 문장 자막 (ref 없는 전환 멘트도 눈으로 따라가게) */
  let capEl=null;
  const cap=()=>{ if(!capEl){ capEl=document.createElement("div"); capEl.id="narrCap"; document.body.appendChild(capEl); } return capEl; };
  const capShow=(t,lang)=>{ const c=cap(); c.textContent=t; c.classList.add("on"); c.classList.toggle("ja",(lang||"").indexOf("ja")===0); };
  const capHide=()=>{ if(capEl){ capEl.classList.remove("on"); capEl.textContent=""; } };
  function clearTimers(){ if(watchdog){clearTimeout(watchdog);watchdog=null;} if(keepalive){clearInterval(keepalive);keepalive=null;} }
  function halt(){ playing=false; runId++; clearTimers(); try{speechSynthesis.cancel();}catch(e){} clearHi(); capHide(); }
  function stop(){ halt(); idx=0; }                 // 완전 정지: 위치도 리셋
  function pause(){ halt(); }                       // 일시정지: idx 유지
  function step(){
    const gen=runId;
    if(!playing) return;
    if(idx>=queue.length){ playing=false; clearTimers(); clearHi(); capHide();
      const ok = spoke>0 && errs===0;               // 실제로 소리가 났을 때만 '정상 완료'
      if(ondone) ondone(ok); return; }
    const q=queue[idx]; clearHi();
    if(q.ref){ const t=document.getElementById(q.ref); if(t){ t.classList.add("d-hi"); t.scrollIntoView({block:"center",behavior:"smooth"}); } }
    if(onstep) onstep(idx, queue.length);
    const txt=String(q.text).replace(/[（(].*?[)）]/g,"");
    capShow(txt, q.lang);
    const u=new SpeechSynthesisUtterance(txt);
    u.lang=q.lang;
    try{ const vv=(q.lang.indexOf("ja")===0?jaVoice:koVoice); if(vv) u.voice=vv; }catch(e){}
    const base=(store.tts.rate||0.95);
    u.rate = q.lang.indexOf("ja")===0 ? base*0.93 : base;   // 일본어만 살짝 느리게
    u.pitch=1;
    const advance=()=>{ if(!playing||gen!==runId) return; clearTimeout(watchdog); watchdog=null; idx++;
      const gap=(q.gap!=null?q.gap:260);                     // 항목 성격에 맞는 호흡
      setTimeout(()=>{ if(gen===runId) step(); },gap); };
    u.onstart=()=>{ spoke++; };
    u.onend=advance;
    u.onerror=()=>{ if(gen!==runId) return; if(++errs>=3){ halt();
        if(ondone) ondone(false); return; } advance(); };
    // 워치독: 발화가 멈춰버려도(크롬 컷오프 등) 큐가 얼지 않게
    clearTimeout(watchdog);
    watchdog=setTimeout(()=>{ if(gen===runId && playing) advance(); }, 2500 + txt.length*160);
    try{ speechSynthesis.speak(u); }catch(e){ advance(); }
  }
  return {
    play(q, from, sstep, sdone){
      if(!TTS_OK) return;
      halt();                                        // 이전 재생 확실히 종료
      playing=true; runId++; errs=0; spoke=0;
      queue=q; idx=Math.min(Math.max(0, from||0), Math.max(0,q.length-1));
      onstep=sstep; ondone=sdone;
      // 크롬 데스크톱의 15초 발화 컷오프 완화 (모바일·사파리는 오히려 부드러움을 해쳐 제외)
      if(NEED_KEEPALIVE) keepalive=setInterval(()=>{ try{ if(playing && speechSynthesis.speaking){ speechSynthesis.pause(); speechSynthesis.resume(); } }catch(e){} }, 9000);
      step();
    },
    pause, stop, isPlaying:()=>playing, index:()=>idx
  };
})();
/* 화면이 가려지면 내레이션 일시정지 (모바일에서 엔진이 죽는 것 방지) */
if(TTS_OK){
  document.addEventListener("visibilitychange",()=>{ if(document.hidden) Narrator.pause(); });
  window.addEventListener("pagehide",()=>{ try{speechSynthesis.cancel();}catch(e){} });
}

/* 충돌 없는 문항 id (구분자 이스케이프) */
function qid(prefix, ...parts){ return prefix+":"+parts.map(p=>encodeURIComponent(String(p==null?"":p))).join("|"); }
/* 정답과 '문자열이 같은' 오답이 섞이지 않도록 값 기준 중복 제거 */
function pickDistractors(answer, pool, n){
  const seen=new Set([String(answer)]); const out=[];
  for(const x of shuffle(pool)){
    const s=String(x==null?"":x);
    if(!s || seen.has(s)) continue;
    seen.add(s); out.push(s);
    if(out.length>=n) break;
  }
  return out;
}
/* counts:false → 자가채점(플래시카드)은 상자만 움직이고 '맞힌 문제' 집계는 올리지 않는다 */
function grade(id, ok, item, opt){
  if(!id) return;
  const counts = !(opt && opt.counts===false);
  const b = store.box[id] ?? 0;
  if(ok){
    store.box[id] = Math.min(4, b+1);
    if(counts) store.correct++;
    delete store.wrong[id];                       // 맞히면 오답노트에서 제거 (문구와 동작 일치)
  }else{
    store.box[id] = 0;
    const w = store.wrong[id] || {j:item?.j||"",k:item?.k||"",n:0};
    w.n++; store.wrong[id]=w;
  }
  save(); drawTally();
}

/* 正 tally: 5획 = 5문제 */
function drawTally(){
  const n = store.correct||0;
  const full = Math.min(6, Math.floor(n/5));
  const rem  = n%5;
  const box = $("#tally"); box.innerHTML="";
  const mk = strokes=>{
    const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    svg.setAttribute("width","17"); svg.setAttribute("height","19"); svg.setAttribute("viewBox","0 0 17 19");
    // 正 5획: 상단가로 / 중앙세로 / 중간짧은가로 / 좌측세로 / 하단가로
    const segs=[["2","3","15","3"],["8.5","3","8.5","16"],["4","9.5","8.5","9.5"],["4","9.5","4","16"],["2","16","15","16"]];
    segs.forEach((s,i)=>{
      const l=document.createElementNS("http://www.w3.org/2000/svg","line");
      l.setAttribute("x1",s[0]);l.setAttribute("y1",s[1]);l.setAttribute("x2",s[2]);l.setAttribute("y2",s[3]);
      l.setAttribute("class","stroke"+(i<strokes?" on":""));
      svg.appendChild(l);
    });
    return svg;
  };
  for(let i=0;i<full;i++) box.appendChild(mk(5));
  if(rem) box.appendChild(mk(rem));
  if(!n) box.appendChild(mk(0));
  box.appendChild(el("span",null,String(n)));
}

/* ══ 문제 생성기 ══════════════════════════════════════ */
const POOL = {
  /* 낱말: 일→한 */
  vocabKo(){ const P=VOCAB.filter(v=>v.meaning_ko).map(v=>v.meaning_ko);
    return VOCAB.filter(v=>v.meaning_ko).map(v=>()=>{
    const wrong = pickDistractors(v.meaning_ko, P, 3);
    if(wrong.length<3) return null;
    return { id:qid("vk",v.word,v.reading), kind:"낱말 · 뜻",
      lead: ruby(v.word, v.reading), sub:"",
      options: shuffle([v.meaning_ko,...wrong]), answer:v.meaning_ko, jpFace:false,
      why:`${v.word}${v.reading?"("+v.reading+")":""} — ${v.meaning_ko}`,
      item:{j:v.word,k:v.meaning_ko}, lesson:v._lesson };
  });},
  /* 낱말: 한→일 */
  vocabJp(){ const P=VOCAB.map(v=>v.word);
    return VOCAB.map(v=>()=>{
    const wrong = pickDistractors(v.word, P, 3);
    if(wrong.length<3) return null;
    return { id:qid("vj",v.word,v.reading), kind:"낱말 · 표기",
      lead:"<span class='ko-gloss'>"+esc(v.meaning_ko)+"</span>", sub:"",
      options: shuffle([v.word,...wrong]), answer:v.word, jpFace:true,
      why:`${v.word}${v.reading?"("+v.reading+")":""} — ${v.meaning_ko}`,
      item:{j:v.word,k:v.meaning_ko}, lesson:v._lesson };
  });},
  /* 한자 읽기 (후리가나) */
  reading(){ const src=VOCAB.filter(v=>v.reading && hasKanji(v.word)); const P=src.map(v=>v.reading);
    return src.map(v=>()=>{
    const wrong = pickDistractors(v.reading, P, 3);
    if(wrong.length<3) return null;
    return { id:qid("rd",v.word,v.reading), kind:"한자 읽기",
      lead:"<span class='jp-lead'>"+esc(v.word)+"</span>",
      sub:"<span class='ko-gloss ko-only'>"+esc(v.meaning_ko)+"</span>",
      options: shuffle([v.reading,...wrong]), answer:v.reading, jpFace:true,
      why:`${v.word} 는 「${v.reading}」라고 읽어요 — ${v.meaning_ko}`,
      item:{j:v.word,k:v.reading}, lesson:v._lesson };
  });},
  /* 문형 → 뜻 */
  pattern(){ const src=GRAMMAR.filter(g=>g.pattern&&g.meaning_ko); const P=src.map(g=>g.meaning_ko);
    return src.map(g=>()=>{
    const wrong = pickDistractors(g.meaning_ko, P, 3);
    if(wrong.length<3) return null;
    return { id:qid("pt",g._lesson,g.pattern), kind:"문형 · 의미",
      lead:"<span class='jp-lead'>"+esc(g.pattern)+"</span>", sub:"",
      options: shuffle([g.meaning_ko,...wrong]), answer:g.meaning_ko, jpFace:false,
      why:[g.meaning_ko, g.tip&&g.tip.when, g.tip&&g.tip.mistake].filter(Boolean).join(" · "),
      jump:{view:"grammar",lesson:g._lesson},
      item:{j:g.pattern,k:g.meaning_ko}, lesson:g._lesson };
  });},
  /* 예문 빈칸: 예문에서 문형 문자열을 지운다 */
  cloze(){
    const out=[];
    GRAMMAR.forEach(g=>{
      const key=(g.pattern||"").replace(/[〜~]/g,"").trim();
      if(key.length<2) return;
      (g.examples||[]).forEach(ex=>{
        if(!ex.jp || !ex.jp.includes(key)) return;
        const pool = GRAMMAR.filter(x=>x!==g&&x.pattern).map(x=>x.pattern.replace(/[〜~]/g,"").trim()).filter(s=>s.length>=2);
        out.push(()=>{
          const wrong=pickDistractors(key, pool, 3);
          if(wrong.length<3) return null;
          return { id:qid("cz",key,ex.jp), kind:"예문 빈칸",
            // split/join: 같은 문자열이 여러 번 나와도 전부 가려 정답 노출 방지
            lead:"<span class='jp-mid'>"+esc(ex.jp.split(key).join("◻︎◻︎"))+"</span>",
            sub: ex.ko? "<span class='ko-gloss ko-only'>"+esc(ex.ko)+"</span>":"",
            options: shuffle([key,...wrong]), answer:key, jpFace:true,
            why:[ex.jp, ex.ko, g.meaning_ko].filter(Boolean).join(" / "),
            jump:{view:"grammar",lesson:g._lesson},
            item:{j:ex.jp,k:ex.ko||g.meaning_ko||""}, lesson:g._lesson };
        });
      });
    });
    return out;
  },
  /* 교재의 연습문제 → 객관식. 책이 선택지를 준 문제는 그대로,
     아니면 같은 문제블록의 다른 정답을 오답 선택지로 쓴다(형태가 같아 난도가 자연스럽다). */
  exercise(){
    const out=[];
    EXERCISE.forEach((b,bi)=>{
      const answered=(b.items||[]).filter(it=>(it.a||"").trim());
      answered.forEach((it,ii)=>{
        const sib=answered.filter(x=>x!==it).map(x=>x.a);
        out.push(()=>{
          let opts = (it.options&&it.options.length>1&&it.options.includes(it.a))
            ? [...new Set(it.options)] : null;
          if(!opts){
            const wrong=pickDistractors(it.a, sib, 3);
            if(wrong.length<3) return null;
            opts=[it.a,...wrong];
          }
          if(new Set(opts).size<2) return null;
          return { id:qid("ex",bi,ii,it.q), kind:"연습문제"+(b.exercise_type?" · "+b.exercise_type:""),
            lead:"<span class='jp-mid'>"+esc(it.q)+"</span>",
            sub: b.instruction? "<span class='gen-note'>"+esc(b.instruction)+"</span>":"",
            options: shuffle(opts), answer:it.a, jpFace:true,
            why:`정답: ${it.a}${it.a_source==="derived"?" (문법 규칙으로 도출)":" (교재 정답)"}`,
            item:{j:it.q,k:it.a}, lesson:b._lesson };
        });
      });
    });
    return out;
  },
  /* 활용 드릴: 활용형 컬럼을 가진 표만 사용. 같은 컬럼(=같은 활용형)의 다른 셀을 오답으로. */
  conj(){
    const FORM=/현재|과거|긍정|부정형|과거형|부정$|가능형|수동형|사역형|사역수동형|정중|반말|의지|명령|가정|ます|ません|ました|ない|て형|た형|활용형|ましょう|たい|ながら/;
    const NOT =/칭|그룹|뜻|의미|단어|분류|용법|예문|특징|종류|명칭|가족|호칭|조사|기본형|어간/;
    const out=[];
    TABLES.forEach((t,ti)=>{
      const cols=t.columns||[];
      const formCols=cols.map((c,i)=>({c,i})).filter(x=>x.i>0 && FORM.test(x.c||"") && !NOT.test((x.c||"").trim())).map(x=>x.i);
      if(!formCols.length) return;
      const rows=t.rows||[];
      // 컬럼별 일본어 셀 모음 (오답 후보)
      const colVals={};
      formCols.forEach(ci=>{ colVals[ci]=rows.map(r=>jpOnly(r[ci])).filter(v=>v&&hasJP(v)); });
      const allJP=formCols.flatMap(ci=>colVals[ci]);
      rows.forEach((row,ri)=>{
        const base=jpOnly(row[0]) || (row[0]||"").trim();
        formCols.forEach(ci=>{
          const ans=jpOnly(row[ci]);
          if(!ans || !hasJP(ans) || ans.length<2 || ans===base) return;
          out.push(()=>{
            let pool=colVals[ci];
            let wrong=pickDistractors(ans, pool, 3);
            if(wrong.length<3) wrong=pickDistractors(ans, allJP, 3);
            if(wrong.length<3) return null;
            const stem = base ? `${esc(base)} <span class="gen-note">→ ${esc(cols[ci]||"활용")}</span>` : esc(cols[ci]||"활용");
            return { id:qid("cj",ti,ri,ci), kind:"활용 드릴 · "+(t.title||"활용"),
              lead:"<span class='jp-mid'>"+stem+"</span>",
              sub:"<span class='gen-note'>알맞은 활용형을 고르세요</span>",
              options: shuffle([ans,...wrong]), answer:ans, jpFace:true,
              why:`${base} 의 ${cols[ci]||"활용형"} → ${ans}`,
              item:{j:base+" → "+(cols[ci]||""),k:ans}, lesson:t._lesson };
          });
        });
      });
    });
    return out;
  },
  /* 가나 */
  kana(){
    // 같은 가나가 여러 표(오십음/청음/탁음…)에 중복 등장 → 글자당 1문항으로 정규화.
    // (ふ 가 표마다 hu/fu 로 달라 정답이 둘이 되는 문제도 함께 해소)
    const seen=new Map();
    KANA.forEach(t=>(t.rows||[]).forEach(r=>r.forEach(c=>{
      const m=String(c||"").match(/^(.+?)\s*\[(.+?)\]\s*$/);
      if(!m) return;
      const k=m[1].trim();
      if(!seen.has(k)) seen.set(k,{k, r:m[2].trim(), t:(t.title||"")});
    })));
    const cells=[...seen.values()];
    const RP=cells.map(x=>x.r);
    return cells.map(c=>()=>{
      const wrong=pickDistractors(c.r, RP, 3);
      if(wrong.length<3) return null;
      return { id:qid("kn",c.k), kind:"가나 · 읽기",
        lead:"<span class='jp-lead'>"+esc(c.k)+"</span>", sub:"",
        options: shuffle([c.r,...wrong]), answer:c.r, jpFace:false,
        why:`${c.k} 는 [${c.r}] 로 읽어요`,
        item:{j:c.k,k:c.r}, lesson:"가나" };
    });
  },
  /* 한자 뜻·한자음: 한자 → 한국어 뜻 (교재 등장 한자 대상) */
  kanjiMean(){
    const pool=kanjiPool().filter(k=>k.kmean); const MP=pool.map(k=>k.kmean);
    return pool.map(k=>()=>{
      const wrong=pickDistractors(k.kmean, MP, 3);
      if(wrong.length<3) return null;
      return { id:qid("kjm",k.k), kind:"한자 · 뜻",
        lead:"<span class='jp-lead'>"+esc(k.k)+"</span>", sub:"",
        options: shuffle([k.kmean,...wrong]), answer:k.kmean, jpFace:false,
        why:`${k.k} — ${k.kmean} · 한자음 ${(k.kh||[]).join("·")} · 음독 ${(k.on||[]).map(o=>o[0]).join(" ")}`,
        kanji:k.k,
        item:{j:k.k,k:k.kmean+" ("+((k.kh||[]).join("·"))+")"}, lesson:"한자" };
    });
  },
  /* 어휘 속 읽기: 교재 낱말(한자 포함) → 읽기 고르기 */
  kanjiReading(){
    const pool=VOCAB.filter(v=>v.reading && [...(v.word||"")].some(isK)); const RP=pool.map(v=>v.reading);
    return pool.map(v=>()=>{
      const wrong=pickDistractors(v.reading, RP, 3);
      if(wrong.length<3) return null;
      return { id:qid("kjr",v.word,v.reading), kind:"어휘 속 읽기",
        lead:"<span class='jp-lead'>"+esc(v.word)+"</span>",
        sub:"<span class='ko-gloss ko-only'>"+esc(v.meaning_ko||"")+"</span>",
        options: shuffle([v.reading,...wrong]), answer:v.reading, jpFace:true,
        why:`${v.word} 는 「${v.reading}」— ${v.meaning_ko||""}`,
        item:{j:v.word,k:v.reading}, lesson:v._lesson };
    });
  },
  /* 문맥 속 한자 복원: 읽기(히라가나) → 알맞은 한자 표기 고르기 */
  kanjiRestore(){
    const pool=VOCAB.filter(v=>v.reading && [...(v.word||"")].some(isK)); const WP=pool.map(v=>v.word);
    return pool.map(v=>()=>{
      const wrong=pickDistractors(v.word, WP, 3);
      if(wrong.length<3) return null;
      return { id:qid("kjx",v.reading,v.word), kind:"한자 복원",
        lead:"<span class='jp-mid'>"+esc(v.reading)+"</span>",
        sub:"<span class='ko-gloss ko-only'>"+esc(v.meaning_ko||"")+"</span>",
        options: shuffle([v.word,...wrong]), answer:v.word, jpFace:true,
        why:`「${v.reading}」는 ${v.word} — ${v.meaning_ko||""}`,
        item:{j:v.reading,k:v.word}, lesson:v._lesson };
    });
  }
};

const ROUND=20;   // 한 세션 문제 수
/* 유형별 문항은 한 번만 생성해 캐시 (칩 토글마다 수천 객체를 다시 만들지 않도록) */
const QCACHE={};
function questionsFor(kind){
  if(!QCACHE[kind]) QCACHE[kind] = (POOL[kind] ? POOL[kind]() : []).map(g=>g()).filter(Boolean);
  return QCACHE[kind];
}
/* 우선순위: 틀린 횟수가 많을수록 · 상자가 낮을수록 먼저 */
function qScore(q){ return (store.box[q.id]??0) - ((store.wrong[q.id]&&store.wrong[q.id].n)||0)*2; }
function buildQuiz(kinds, lesson, limit){
  let qs=[];
  kinds.forEach(k=>{ qs=qs.concat(questionsFor(k)); });
  if(lesson && lesson!=="all") qs = qs.filter(q=>q.lesson===lesson);
  const seen=new Set(); qs=qs.filter(q=>{ if(seen.has(q.id))return false; seen.add(q.id); return true; });
  qs = shuffle(qs).sort((a,b)=>qScore(a)-qScore(b));
  return limit===0 ? qs : qs.slice(0, limit||ROUND);
}
function quizPoolSize(kinds, lesson){ return buildQuiz(kinds, lesson, 0).length; }
/* 오답노트 전용: 틀린 항목만 모아 출제 */
function wrongQuestions(){
  const ids=new Set(Object.keys(store.wrong));
  if(!ids.size) return [];
  const all=Object.keys(POOL).flatMap(k=>questionsFor(k));
  const seen=new Set();
  return all.filter(q=>ids.has(q.id) && !seen.has(q.id) && seen.add(q.id))
            .sort((a,b)=>((store.wrong[b.id]||{}).n||0)-((store.wrong[a.id]||{}).n||0));
}

  /* 레슨별 진도 */

  const bImp=el("button","chip","⬆ 가져오기");   bImp.onclick=importProgress;
  const bRes=el("button","chip","진도 초기화");   bRes.onclick=resetProgress;
  brow.appendChild(bExp); brow.appendChild(bImp); brow.appendChild(bRes);
  bk.appendChild(brow);

  if(DIVIDERS.length){
    DIVIDERS.forEach(d=>{
      const s=el("div","sec");
      s.appendChild(el("h3",null,`<span class="no">LESSON</span>${esc(d.title||"")}<span class="src">p.${d._page}</span>`));

      m.appendChild(s);
    });
  }
  if(!DIVIDERS.length && !GRAMMAR.length) m.appendChild(el("div","empty","데이터가 비어 있습니다."));

let gOpen=null;
function openGuide(id){ if(typeof Narrator!=="undefined")Narrator.stop(); gOpen=id; current="guide"; drawNav(); render(); }

function guideTable(t){
  if(!t||!(t.rows||[]).length) return null;
  const wrap=el("div","gtable"); const tb=el("table");
  if((t.columns||[]).length){ const tr=el("tr"); t.columns.forEach(c=>tr.appendChild(el("th",null,esc(c)))); tb.appendChild(tr); }
  (t.rows||[]).forEach(r=>{ const tr=el("tr"); r.forEach(c=>tr.appendChild(el("td",null,`<span class="jpface" style="font-family:var(--jp)">${esc(c)}</span>`))); tb.appendChild(tr); });
  wrap.appendChild(tb); return wrap;
}

function vGuide(){
  if(gOpen){ const g=GUIDES.find(x=>x.id===gOpen); if(g) return guideDetail(g); gOpen=null; }
  const m=title("초보 가이드","처음 배우는 사람이 자주 막히는 개념을 골라, 원리·규칙·예문·자주 하는 실수·암기 팁으로 풀었습니다.");

      <span class="gt">${esc(g.title)}</span><span class="gs">${esc(g.summary||"")}</span>`;

function guideDetail(g){
  const m=$("#main"); m.innerHTML="";
  const back=el("button","btn","← 가이드 목록"); back.style.marginBottom="14px";
  back.onclick=()=>{ Narrator.stop(); gOpen=null; render(); };
  m.appendChild(back);

  const hero=el("div","guide-hero");
  hero.id="g-hero";
  const i=GUIDES.findIndex(x=>x.id===g.id)+1;
  hero.innerHTML=`<div class="eyebrow">초보 가이드 · ${String(i).padStart(2,"0")}</div>
    <h2>${esc(g.title)}</h2><p>${esc(g.summary||"")}</p>`;
  m.appendChild(hero);

  if(JA_OK()){
    const player=el("div","dplayer");
    const btn=el("button","btn primary big-play","▶ 선생님처럼 읽어주기");
    const bar=el("div","dbar"); bar.innerHTML="<i></i>"; const barI=bar.querySelector("i");
    const stat=el("div","gen-note");
    player.appendChild(btn); player.appendChild(bar); player.appendChild(stat);
    m.appendChild(player);
    const gq=guideNarration(g);
    let resumeAt=0;
    const setStat=(x,n)=>{ resumeAt=x; barI.style.width=(n?Math.round(100*x/n):0)+"%"; stat.textContent=n?`${x} / ${n}`:""; };
    btn.onclick=()=>{
      if(Narrator.isPlaying()){ Narrator.pause(); btn.textContent="▶ 이어 듣기"; return; }
      const from = resumeAt>=gq.length ? 0 : resumeAt;
      Narrator.play(gq, from, setStat, (ok)=>{ setStat(gq.length,gq.length); resumeAt=0;
        btn.textContent = ok ? "▶ 다시 듣기" : "▶ 다시 시도"; });
      btn.textContent="⏸ 일시정지";
    };
  }

  /* 문장 청크 span — guideNarration의 gChunks와 같은 분할이라 낭독 ref와 1:1로 맞는다 */
  const segHtml=(s,pre)=>gChunks(s).map((c,j)=>`<span class="nseg" id="${pre}c${j}">${esc(c)}</span>`).join(" ");
  if(g.intro){ const p=el("p"); p.style.cssText="font-size:15px;color:var(--sumi-2);line-height:1.85;margin:0 0 20px"; p.innerHTML=segHtml(g.intro,"g-in-"); m.appendChild(p); }

  (g.sections||[]).forEach((s,si)=>{
    const sec=el("div","gsec");
    if(s.heading){ const h4=el("h4",null,esc(s.heading)); h4.id="g-s"+si+"-h"; sec.appendChild(h4); }
    if(s.body){ const b=el("div","body"); b.innerHTML=segHtml(s.body,"g-s"+si+"-"); sec.appendChild(b); }
    const t=guideTable(s.table); if(t) sec.appendChild(t);
    (s.examples||[]).forEach((ex,ei)=>{
      const e=el("div","ex"); e.style.cursor="default"; e.id="g-s"+si+"-e"+ei;
      let h=`<div class="j">${esc(ex.jp)}</div>`;
      if(ex.reading) h+=`<div class="furi" style="opacity:1;max-height:2em">${esc(ex.reading)}</div>`;
      if(ex.ko) h+=`<div class="k">${esc(ex.ko)}</div>`;
      e.innerHTML=h; sec.appendChild(e);
    });
    m.appendChild(sec);
  });

  /* 자주 하는 실수 */
  if((g.mistakes||[]).length){
    const sec=el("div","gsec");
    sec.appendChild(el("h4",null,"자주 하는 실수"));
    const grid=el("div","miss-grid");
    g.mistakes.forEach((ms,mi)=>{
      const row=el("div","miss-row"); row.id="g-m"+mi;
      let inner="";
      if((ms.wrong||"").trim() || (ms.right||"").trim()){
        inner+=`<div class="xo"><div class="x">${esc(ms.wrong||"—")}</div><div class="o">${esc(ms.right||"—")}</div></div>`;
      }
      if(ms.note) inner+=`<div class="mnote">${esc(ms.note)}</div>`;
      row.innerHTML=inner; grid.appendChild(row);
    });
    sec.appendChild(grid);
    m.appendChild(sec);
  }

  /* 암기 팁 */
  (g.tips||[]).forEach((tp,ti)=>{
    const c=el("div","callout tip"); c.id="g-t"+ti;
    c.innerHTML=`<span class="ct">암기 팁</span>${esc(tp)}`;
    m.appendChild(c);
  });

  /* 관련 레슨 */
  if((g.related||[]).length){
    const rel=el("div","rel");
    rel.appendChild(el("span","view-sub","관련 레슨 "));
    g.related.forEach(l=>{
      const a=el("a",null,esc(l));
      a.onclick=()=>{ gLesson=l; current="grammar"; gOpen=null; drawNav(); render(); };
      rel.appendChild(a);
    });
    m.appendChild(rel);
  }
}

/* ── 한자 (japan-hanja 병합 + 커버리지) ── */
let kMode="grid", kGrade="교재", kJlpt="all", kUnknown=false, kQuery="", kPageN=0;
const KPAGE=120;
function vKanji(){
  const m=title("한자","교재에 나오는 한자를 중심으로, 뜻·음훈독·한자음과 교재 속 쓰임을 함께 봅니다.");
  if(!KANJI.length){ m.appendChild(el("div","empty","한자 데이터가 없습니다.")); return; }

  /* 모드 토글: 그리드 / 커버리지 */
  const modes=el("div","chips");
  [["grid","한자 목록"],["cover","교재 커버리지"]].forEach(([k,t])=>{
    const b=el("button","chip",t); b.setAttribute("aria-pressed",kMode===k?"true":"false");
    b.onclick=()=>{kMode=k; vKanji();}; modes.appendChild(b);
  });
  m.appendChild(modes);
  if(kMode==="cover") return kCoverage(m);

  /* 필터 */
  const f=el("div","kfilters");
  const seg=(label,val,cur,set)=>{ const b=el("button","chip",label); b.setAttribute("aria-pressed",cur===val?"true":"false"); b.onclick=()=>{set(val);kPageN=0;vKanji();}; return b; };
  f.appendChild(el("span","gen-note","범위 "));
  f.appendChild(seg("교재만","교재",kGrade,v=>kGrade=v));
  ["1","2","3","4","5","6","8","all"].forEach(g=>f.appendChild(seg(g==="8"?"중등":(g==="all"?"전체":g+"학년"),g,kGrade,v=>kGrade=v)));
  f.appendChild(el("span","gen-note","  JLPT "));
  ["all","5","4","3","2","1"].forEach(j=>f.appendChild(seg(j==="all"?"전체":"N"+j,j,kJlpt,v=>kJlpt=v)));
  const unk=el("button","chip","모르는 것만"); unk.setAttribute("aria-pressed",kUnknown?"true":"false");
  unk.onclick=()=>{kUnknown=!kUnknown;kPageN=0;vKanji();}; f.appendChild(unk);
  m.appendChild(f);

  const search=el("input"); search.type="text"; search.id="ksearch"; search.placeholder="한자·뜻·읽기·한자음 검색";
  search.value=kQuery; search.style.cssText="width:100%;font-family:var(--ko);font-size:16px;border:1px solid var(--line);background:var(--washi-2);padding:9px 13px;border-radius:2px;margin-bottom:12px";
  m.appendChild(search);

  const listWrap=el("div"); m.appendChild(listWrap);
  const draw=()=>{
    listWrap.innerHTML="";
    let list=KANJI.filter(k=>{
      if(kGrade==="교재" && !TEXTBOOK_KANJI.has(k.k)) return false;
      if(kGrade!=="교재" && kGrade!=="all" && String(k.g)!==kGrade) return false;
      if(kJlpt!=="all" && String(k.jlpt||"")!==kJlpt) return false;
      if(kUnknown && (store.box["kjm:"+k.k]??0)>=2) return false;
      if(kQuery){
        const q=kQuery.trim();
        const hay=[k.k,k.kmean,(k.kh||[]).join(""),...(k.on||[]).flat(),...(k.kun||[]).flat()].join(" ");
        if(!hay.includes(q)) return false;
      }
      return true;
    });
    const total=list.length;
    const pages=Math.max(1,Math.ceil(total/KPAGE));
    kPageN=Math.min(kPageN,pages-1);
    const slice=list.slice(kPageN*KPAGE,(kPageN+1)*KPAGE);
    if(!total){ listWrap.appendChild(el("div","empty","조건에 맞는 한자가 없습니다.")); return; }
    const grid=el("div","kgrid");
    slice.forEach(k=>{
      const box=store.box["kjm:"+k.k]??-1;
      const t=el("button","ktile"+(box>=2?" done":(box===0?" weak":"")));
      t.innerHTML=`<span class="gband g-${k.g}"></span><span class="kc">${esc(k.k)}</span>`+
        `<span class="km">${esc(k.kmean||"")}</span><span class="kk">${esc((k.kh||[]).join("·"))} · ${gradeLabel(k.g)}</span>`;
      t.onclick=()=>openLens(k.k);
      grid.appendChild(t);
    });
    listWrap.appendChild(grid);
    const pg=el("div","kpage");
    pg.innerHTML=`<span>${total.toLocaleString()}자 중 ${kPageN*KPAGE+1}–${Math.min(total,(kPageN+1)*KPAGE)}</span>`;
    const prev=el("button","btn","‹ 이전"); prev.disabled=kPageN<=0; prev.onclick=()=>{kPageN--;draw();};
    const next=el("button","btn","다음 ›"); next.disabled=kPageN>=pages-1; next.onclick=()=>{kPageN++;draw();};
    pg.prepend(prev); pg.append(next); listWrap.appendChild(pg);
  };
  search.oninput=()=>{kQuery=search.value;kPageN=0;draw();};
  draw();

  const row=el("div","row"); row.style.marginTop="16px";
  [["한자 뜻 퀴즈",["kanjiMean"]],["어휘 속 읽기",["kanjiReading"]],["한자 복원",["kanjiRestore"]]].forEach(([t,k])=>{
    const b=el("button","btn",t); b.onclick=()=>startQuiz(k,"all",t); row.appendChild(b);
  });
  m.appendChild(row);
}

/* 교재 커버리지: 공식 학년/JLPT 대비 교재가 다루는 한자 비율 */
function kCoverage(m){
  m.appendChild(el("p","cov-note",
    "회색 막대 = 각 구간의 전체 한자 수, 초록 = 교재에 등장, 진한 초록 = 내가 익힌 것(뜻 안정). "+
    "※ JLPT는 공식 한자표가 없어 데이터셋 기준 추정입니다."));
  const bands=[["학년",[["1","1학년"],["2","2학년"],["3","3학년"],["4","4학년"],["5","5학년"],["6","6학년"],["8","중등 상용"]],"g"],
               ["JLPT(추정)",[["5","N5"],["4","N4"],["3","N3"],["2","N2"],["1","N1"]],"jlpt"]];
  bands.forEach(([label,rows,key])=>{
    const s=el("div","sec"); s.appendChild(el("h3",null,label));
    rows.forEach(([val,name])=>{
      const all=KANJI.filter(k=>String(k[key]||"")===val);
      if(!all.length) return;
      const inbook=all.filter(k=>TEXTBOOK_KANJI.has(k.k));
      const learned=inbook.filter(k=>(store.box["kjm:"+k.k]??0)>=2);
      const pctBook=Math.round(100*inbook.length/all.length);
      const pctLearn=Math.round(100*learned.length/all.length);
      const row=el("div","cov-row");
      row.innerHTML=`<span>${name}</span>
        <span class="cov-bar"><i style="width:${pctBook}%"></i><span class="learned" style="width:${pctLearn}%"></span></span>
        <span class="cov-num">${inbook.length}/${all.length}</span>`;

/* 퀴즈 실행 */
function startQuiz(kinds, lesson, label, explicit){
  const qs = explicit && explicit.length ? explicit.slice(0,ROUND) : buildQuiz(kinds,lesson);
  if(!qs.length){ return; }
  let i=0, right=0;
  const m=title(label, "");
  const card=el("div","genko card");
  const prog=el("div","view-sub");
  const fb=el("div","feedback"); fb.setAttribute("aria-live","polite");
  const why=el("div","callout"); why.style.display="none";     // 오답 시 '왜'를 가르쳐 준다
  m.appendChild(prog); m.appendChild(card); m.appendChild(fb); m.appendChild(why);
  const nav=el("div","row"); m.appendChild(nav);

  function draw(){
    if(i>=qs.length){
      card.className="genko card";
      card.innerHTML=`<div class="jp-lead">${right===qs.length?"満点":"お疲れさま"}</div>
        <div class="ko-gloss">${qs.length}문제 중 <b>${right}</b>문제 정답</div>`;
      prog.textContent=""; fb.textContent=""; nav.innerHTML="";
      const again=el("button","btn primary","다시"); again.onclick=()=>startQuiz(kinds,lesson,label);
      const back=el("button","btn","돌아가기"); back.onclick=()=>render();
      nav.appendChild(again); nav.appendChild(back);
      return;
    }
    const q=qs[i];
    prog.textContent=`${q.kind} · ${i+1} / ${qs.length}`;
    card.className="genko card";
    card.innerHTML=`<div>${q.lead}</div>${q.sub||""}`;
    why.style.display="none"; why.innerHTML="";
    const opts=el("div","opts");
    q.options.forEach((o,k)=>{
      const b=el("button","opt");
      b.dataset.val=o;
      b.innerHTML=`<span class="k">${k+1}</span><span class="${q.jpFace?"jpface":""}">${esc(o)}</span>`;
      b.onclick=()=>{
        [...opts.children].forEach(x=>x.disabled=true);
        const ok = o===q.answer;
        b.classList.add(ok?"correct":"wrong");
        if(!ok) [...opts.children].forEach(x=>{ if(x.dataset.val===q.answer) x.classList.add("correct"); });
        card.classList.add(ok?"ok":"no");
        fb.className="feedback "+(ok?"ok":"no");
        fb.textContent = ok? "✓ 正 (정답)" : `✕ 오답 · 정답은 ${q.answer}`;   // 색만이 아니라 기호로도 구분
        if(ok) right++;
        else if(q.why){                                       // 틀렸을 때 '왜'를 설명
          why.style.display="block";
          why.innerHTML=`<span class="ct">이렇게 기억하세요</span>${esc(q.why)}`;
          if(q.jump){ const j=el("button","btn","이 문형 보러가기 →"); j.style.marginTop="8px";
            j.onclick=()=>{ gLesson=q.jump.lesson||"all"; current=q.jump.view; drawNav(); render(); };
            why.appendChild(j); }
          if(q.kanji && KJ.has(q.kanji)){ const j=el("button","btn","한자 자세히 →"); j.style.marginTop="8px";
            j.onclick=()=>openLens(q.kanji); why.appendChild(j); }
          markJa(why);
        }
        grade(q.id, ok, q.item);
        nav.innerHTML="";
        const nx=el("button","btn primary", i+1>=qs.length?"결과":"다음");
        nx.onclick=()=>{ i++; fb.textContent=""; fb.className="feedback"; draw(); };
        nav.appendChild(nx); nx.focus();
      };
      opts.appendChild(b);
    });
    card.appendChild(opts);
    markJa(card);
    nav.innerHTML="";
    const skip=el("button","btn","건너뛰기"); skip.onclick=()=>{ i++; draw(); };
    nav.appendChild(skip);
  }
  draw();
}

let fLesson="all", fMode="vocab";
function vDrill(){
  const m=title("플래시카드","일본어를 먼저 보고, 눌러서 뜻과 읽기를 확인하세요.");
  const c=el("div","chips");
  const modes=[["vocab","낱말"],["pattern","문형"],["example","예문"],["exercise","연습문제"]];
  if(KANJI.length) modes.push(["kanji","한자"]);
  modes.forEach(([k,t])=>{
    const b=el("button","chip",t); b.setAttribute("aria-pressed",fMode===k?"true":"false");
    b.onclick=()=>{fMode=k; vDrill();}; c.appendChild(b);
  });
  m.appendChild(c);
  if(fMode!=="kanji") m.appendChild(lessonChips(()=>vDrill(), ()=>fLesson, v=>fLesson=v));

  let deck=[];
  if(fMode==="vocab") deck=VOCAB.filter(v=>fLesson==="all"||v._lesson===fLesson)
    .map(v=>({front:ruby(v.word,v.reading), raw:v.word, read:v.reading, back:v.meaning_ko, say:v.reading||v.word, id:qid("fv",v.word,v.reading)}));
  if(fMode==="pattern") deck=GRAMMAR.filter(g=>g.pattern&&(fLesson==="all"||g._lesson===fLesson))
    .map(g=>({front:esc(g.pattern), raw:g.pattern, read:g.pattern_reading||"", back:g.meaning_ko||"", say:(g.pattern_reading||g.pattern||"").replace(/[〜~]/g,""), id:qid("fp",g._lesson,g.pattern)}));
  if(fMode==="example") deck=GRAMMAR.filter(g=>fLesson==="all"||g._lesson===fLesson)
    .flatMap(g=>(g.examples||[]).map(ex=>({front:esc(ex.jp), raw:ex.jp, read:ex.reading||"", back:ex.ko||g.meaning_ko||"", say:ex.jp, id:qid("fe",ex.jp)})));
  if(fMode==="exercise") deck=EXERCISE.filter(b=>fLesson==="all"||b._lesson===fLesson)
    .flatMap(b=>(b.items||[]).filter(it=>(it.a||"").trim())
      .map(it=>({front:esc(it.q), raw:it.q, read:"", back:it.a, say:(it.q||"").replace(/[（(].*?[)）]/g,"").replace(/[　_]+/g," "), id:qid("fx",it.q)})));
  if(fMode==="kanji") deck=kanjiPool().map(k=>({
      front:esc(k.k),
      read:[...(k.on||[]).map(o=>o[0]),...(k.kun||[]).map(o=>o[0])].join("  ")||"",
      back:(k.kmean||"")+"  ["+((k.kh||[]).join("·"))+"]",
      raw:k.k,
      say:(k.ex&&k.ex.r)||(k.kun&&k.kun[0]&&k.kun[0][0])||(k.on&&k.on[0]&&k.on[0][0])||k.k,
      id:qid("kjm",k.k) }));

  if(!deck.length){ m.appendChild(el("div","empty","카드가 없습니다.")); return; }
  deck=shuffle(deck).sort((a,b)=>(store.box[a.id]??0)-(store.box[b.id]??0));

  let i=0, open=false;
  const card=el("div","genko card"); const prog=el("div","view-sub");
  m.appendChild(prog); m.appendChild(card);
  const nav=el("div","row"); m.appendChild(nav);

  function draw(){
    const d=deck[i%deck.length];
    prog.textContent=`${(i%deck.length)+1} / ${deck.length}`;
    card.className="genko card";
    card.innerHTML = `<div class="${fMode==="example"?"jp-mid":"jp-lead"}">${d.front} ${sayIcon(d.say,"big")}</div>`;
    if(open){
      card.classList.add("revealed");
      if(d.read) card.appendChild(el("div","gen-note",esc(d.read)));
      if(d.back) card.appendChild(el("div","ko-gloss ko-only",esc(d.back)));
    }else{
      card.appendChild(el("div","gen-note","눌러서 확인"));
      if(store.tts && store.tts.on && d.say) speak(d.say);
    }
    markJa(card);
    card.onclick=()=>{ open=!open; draw(); };
    nav.innerHTML="";
    if(open){
      const no=el("button","btn danger","다시 볼래요");
      no.onclick=()=>{ grade(d.id,false,{j:d.raw||d.say||"",k:d.back}, {counts:false}); i++; open=false; draw(); };
      const ok=el("button","btn primary","알아요");
      ok.onclick=()=>{ grade(d.id,true,{j:d.raw||d.say||"",k:d.back}, {counts:false}); i++; open=false; draw(); };
      nav.appendChild(no); nav.appendChild(ok);
    }else{
      const sk=el("button","btn","다음"); sk.onclick=()=>{ i++; open=false; draw(); };
      nav.appendChild(sk);
    }
  }
  draw();
}

function vSearch(){
  const m=title("검색","문형·낱말·예문·한자를 한 번에 찾습니다.");
  const inp=el("input"); inp.type="text"; inp.id="search"; inp.placeholder="일본어 · 읽기 · 한국어 뜻 · 한자";
  m.appendChild(inp);
  const out=el("div"); m.appendChild(out);
  const run=()=>{
    const q=inp.value.trim(); out.innerHTML="";
    if(q.length<1) return;
    const hit=[];
    KANJI.forEach(k=>{ if([k.k,k.kmean,(k.kh||[]).join(""),...(k.on||[]).flat(),...(k.kun||[]).flat()].some(x=>String(x||"").includes(q)))
      hit.push({kanji:k.k, j:k.k, r:(k.on||[]).map(o=>o[0]).join(" "), k:k.kmean, t:"한자"}); });
    VOCAB.forEach(v=>{ if([v.word,v.reading,v.meaning_ko].some(x=>String(x||"").includes(q)))
      hit.push({j:v.word,r:v.reading,k:v.meaning_ko,t:"낱말",p:v._page}); });
    GRAMMAR.forEach(g=>{
      if([g.pattern,g.meaning_ko,g.title].some(x=>String(x||"").includes(q)))
        hit.push({j:g.pattern||g.title,r:g.pattern_reading,k:g.meaning_ko,t:"문형",p:g._page});
      (g.examples||[]).forEach(ex=>{ if([ex.jp,ex.reading,ex.ko].some(x=>String(x||"").includes(q)))
        hit.push({j:ex.jp,r:ex.reading,k:ex.ko||g.meaning_ko,t:"예문",p:g._page}); });
    });
    if(!hit.length){ out.appendChild(el("div","empty","결과가 없습니다.")); return; }
    const s=el("div","sec");
    s.appendChild(el("h3",null,`결과 ${hit.length}건`));
    hit.slice(0,200).forEach(h=>{
      const e=el("div","ex"); if(h.kanji){ e.style.cursor="pointer"; e.onclick=()=>openLens(h.kanji); }
      e.innerHTML=`<div class="j">${esc(h.j)}</div>`+
        (h.r?`<div class="n">${esc(h.r)}</div>`:"")+
        (h.k?`<div class="k ko-only">${esc(h.k)}</div>`:"")+
        `<div class="n">${h.t}${h.p?" · p."+h.p:""}</div>`;
      s.appendChild(e);
    });
    out.appendChild(s);
  };
  inp.oninput=run; inp.focus();
}

  const tb=$("#tgTts"); tb.hidden=false;
  tb.title="켜면 화면의 일본어를 탭해 발음을 들을 수 있고, 플래시카드는 자동 재생됩니다";
  const sync=()=>{ tb.setAttribute("aria-pressed",String(!!store.tts.on)); tb.textContent = store.tts.on?"🔊 소리 켜짐":"🔊 소리"; };
  sync();
  tb.onclick=()=>{ store.tts.on=!store.tts.on; save(); sync(); if(store.tts.on) speak("こんにちは"); };
}

/* 스피커 버튼 위임 처리 (어디서 렌더되든 동작) */
document.addEventListener("click",e=>{
  const s=e.target.closest(".say");
  if(s){ e.preventDefault(); e.stopPropagation(); speak(s.dataset.say);
    s.classList.add("speaking"); setTimeout(()=>s.classList.remove("speaking"),600); }
});
/* 소리 모드: 화면의 어떤 일본어든 탭하면 발음 (버튼·입력 등 컨트롤 제외, 기존 동작은 유지) */
document.addEventListener("click",e=>{
  if(!store.tts || !store.tts.on) return;
  if(e.target.closest(".say,button,a,input,textarea,select,label")) return;
  let node=e.target;
  for(let d=0; node && d<4; d++, node=node.parentElement){
    const t=node.textContent||"";
    if(/[぀-ヿ一-鿿]/.test(t)){
      if(t.length<=90){ const jp=extractJa(t); if(jp){ speak(jp);
        // 읽는 부분 표시 — 탭한 텍스트를 잠깐 포커싱
        const tgt=node; tgt.classList.add("d-hi"); setTimeout(()=>tgt.classList.remove("d-hi"),900); } }
      return;
    }
  }
},true);

document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){ closeLens(); return; }
  if(e.target.tagName==="INPUT") return;
  const opts=[...document.querySelectorAll(".opt:not(:disabled)")];
  if(/^[1-9]$/.test(e.key) && opts[+e.key-1]) opts[+e.key-1].click();
});
$("#lensBack").onclick=()=>closeLens();

/* 새로고침 시 마지막으로 보던 화면 복원 */
if(store.ui && store.ui.view && VIEWS.some(v=>v.id===store.ui.view)) current=store.ui.view;

drawTally(); drawNav(); render();
</script>
<script>
if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("sw.js").catch(e => console.warn("SW 등록 실패", e));
  });
}
</script>
